type: google.api.Service
config_version: 3
name: geocoding-backend.googleapis.com
title: Geocoding API

apis:
- name: google.maps.geocode.v4.DestinationService
- name: google.maps.geocode.v4.GeocodeService

documentation:
  summary: |-
    Convert addresses into geographic coordinates (geocoding), which you can
    use     to place markers or position the map. This API also allows you to
    convert     geographic coordinates into an address (reverse geocoding).

authentication:
  rules:
  - selector: google.maps.geocode.v4.DestinationService.SearchDestinations
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/maps-platform.destinations,
        https://www.googleapis.com/auth/maps-platform.geocode
  - selector: google.maps.geocode.v4.GeocodeService.GeocodeAddress
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/maps-platform.geocode,
        https://www.googleapis.com/auth/maps-platform.geocode.address
  - selector: google.maps.geocode.v4.GeocodeService.GeocodeLocation
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/maps-platform.geocode,
        https://www.googleapis.com/auth/maps-platform.geocode.location
  - selector: google.maps.geocode.v4.GeocodeService.GeocodePlace
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/maps-platform.geocode,
        https://www.googleapis.com/auth/maps-platform.geocode.place

publishing:
  new_issue_uri: https://issuetracker.google.com/issues/new?component=188871&template=788907
  documentation_uri: https://developers.google.com/maps/documentation/geocoding/overview
  api_short_name: geocode
  github_label: 'api: geocode'
  doc_tag_prefix: geocode
  organization: GEO
  library_settings:
  - version: google.maps.geocode.v4
    launch_stage: PRELAUNCH
    java_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    python_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    node_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    dotnet_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    go_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
  proto_reference_documentation_uri: https://developers.google.com/maps/documentation/geocoding/reference/rpc
