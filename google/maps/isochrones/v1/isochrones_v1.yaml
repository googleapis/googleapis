type: google.api.Service
config_version: 3
name: isochrones.googleapis.com
title: Isochrones API

apis:
- name: google.maps.isochrones.v1.IsochroneService

documentation:
  summary: isochrones.googleapis.com API.

authentication:
  rules:
  - selector: google.maps.isochrones.v1.IsochroneService.GenerateIsochrone
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/maps-platform.isochrones

publishing:
  new_issue_uri: https://issuetracker.google.com/issues/new?component=1950715&template=0
  documentation_uri: https://developers.google.com/maps/documentation/isochrones/overview
  api_short_name: isochrones
  github_label: 'api: isochrones'
  doc_tag_prefix: isochrones
  organization: GEO
  library_settings:
  - version: google.maps.isochrones.v1
    launch_stage: GA
    java_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    php_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    python_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    node_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    dotnet_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    ruby_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    go_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
