type: google.api.Service
config_version: 3
name: mapmanagement.googleapis.com
title: Map Management API

apis:
- name: google.maps.mapmanagement.v2beta.MapManagement

documentation:
  summary: |-
    The Map Management API is a RESTful service that accepts HTTP requests for
    map styling data through a variety of methods. It returns formatted
    configuration data about map styling resources so that you can
    programmatically manage your Cloud-based map styles.

authentication:
  rules:
  - selector: 'google.maps.mapmanagement.v2beta.MapManagement.*'
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform

publishing:
  new_issue_uri: https://issuetracker.google.com/issues/new?component=188871&template=788907
  documentation_uri: https://developers.google.com/maps/documentation/mapmanagement/overview
  api_short_name: mapmanagement
  github_label: 'api: mapmanagement'
  doc_tag_prefix: mapmanagement
  organization: GEO
  library_settings:
  - version: google.maps.mapmanagement.v2beta
    launch_stage: BETA
    java_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    python_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    node_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    dotnet_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    go_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
  proto_reference_documentation_uri: https://developers.google.com/maps/documentation/mapmanagement/reference/rpc/google.maps.mapmanagement.v2beta
