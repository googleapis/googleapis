type: google.api.Service
config_version: 3
name: navigationconnect.googleapis.com
title: Navigation Connect API

apis:
- name: google.maps.navconnect.v1.NavConnectService

documentation:
  summary: Navigation Connect API.

authentication:
  rules:
  - selector: google.maps.navconnect.v1.NavConnectService.CreateTrip
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform
  - selector: google.maps.navconnect.v1.NavConnectService.GetTrip
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform

publishing:
  new_issue_uri: https://issuetracker.google.com/issues/new?component=1180397&template=1812135
  documentation_uri: https://developers.google.com/maps/documentation/mobility/navigationconnect
  api_short_name: navigationconnect
  github_label: 'api: navigationconnect'
  doc_tag_prefix: navigationconnect
  organization: GEO
  library_settings:
  - version: google.maps.navconnect.v1
    launch_stage: BETA
    java_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    cpp_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    python_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    node_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    go_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
