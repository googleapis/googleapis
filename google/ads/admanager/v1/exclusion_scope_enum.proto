syntax = "proto3";

package google.ads.admanager.v1;

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "ExclusionScopeEnumProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// Wrapper message for
// [ExclusionScope][google.ads.admanager.v1.ExclusionScopeEnum.ExclusionScope].
message ExclusionScopeEnum {
  // The scope to which the exclusion label applies.
  enum ExclusionScope {
    // No value specified.
    EXCLUSION_SCOPE_UNSPECIFIED = 0;

    // The exclusion label applies to the entire page.
    PAGE = 1;

    // The exclusion label applies to the entire stream of content.
    STREAM = 2;

    // The exclusion label applies to the entire pod (or group).
    POD = 3;
  }
}
