syntax = "proto3";

package google.ads.admanager.v1;

import "google/ads/admanager/v1/brand_lift_partner_enum.proto";
import "google/ads/admanager/v1/reach_partner_enum.proto";
import "google/ads/admanager/v1/viewability_partner_enum.proto";
import "google/api/field_behavior.proto";

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "ThirdPartyMeasurementSettingsProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// Contains third party auto-pixeling settings for cross-sell Partners.
message ThirdPartyMeasurementSettings {
  // Optional. A field to determine the type of ViewabilityPartner. This field
  // default is NONE.
  optional ViewabilityPartnerEnum.ViewabilityPartner viewability_partner = 1
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. The third party partner ID for YouTube viewability verification.
  optional string viewability_client_id = 2
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. The reporting ID that maps viewability partner data with a
  // campaign (or a group of related campaigns) specific data.
  optional string viewability_reporting_id = 3
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. A field to determine the type of publisher's viewability partner.
  // This field default is NONE.
  optional ViewabilityPartnerEnum.ViewabilityPartner
      publisher_viewability_partner = 4
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. The third party partner ID for YouTube viewability verification
  // for publisher.
  optional string publisher_viewability_client_id = 5
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. The reporting ID that maps viewability partner data with a
  // campaign (or a group of related campaigns) specific data for publisher.
  optional string publisher_viewability_reporting_id = 6
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. A field to determine the type of BrandLiftPartner. This field
  // default is NONE.
  optional BrandLiftPartnerEnum.BrandLiftPartner brand_lift_partner = 10
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. The third party partner ID for YouTube brand lift verification.
  optional string brand_lift_client_id = 11
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. The reporting ID that maps brand lift partner data with a
  // campaign (or a group of related campaigns) specific data.
  optional string brand_lift_reporting_id = 12
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. A field to determine the type of advertiser's ReachPartner. This
  // field default is UNKNOWN.
  optional ReachPartnerEnum.ReachPartner reach_partner = 13
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. The third party partner ID for YouTube reach verification for
  // advertiser.
  optional string reach_client_id = 14 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The reporting ID that maps reach partner data with a campaign (or
  // a group of related campaigns) specific data for advertiser.
  optional string reach_reporting_id = 15
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. A field to determine the type of publisher's ReachPartner. This
  // field default is UNKNOWN.
  optional ReachPartnerEnum.ReachPartner publisher_reach_partner = 16
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. The third party partner ID for YouTube reach verification for
  // publisher.
  optional string publisher_reach_client_id = 17
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. The reporting ID that maps reach partner data with a campaign (or
  // a group of related campaigns) specific data for publisher.
  optional string publisher_reach_reporting_id = 18
      [(google.api.field_behavior) = OPTIONAL];
}
