syntax = "proto3";

package google.ads.admanager.v1;

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "CustomPacingGoalUnitEnumProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// Wrapper message for
// [CustomPacingGoalUnit][google.ads.admanager.v1.CustomPacingGoalUnitEnum.CustomPacingGoalUnit]
message CustomPacingGoalUnitEnum {
  // Options for the unit of the custom pacing goal amounts.
  enum CustomPacingGoalUnit {
    // Default value. This value is unused.
    CUSTOM_PACING_GOAL_UNIT_UNSPECIFIED = 0;

    // The custom pacing goal amounts represent absolute numbers corresponding
    // to the line item's [Goal.unitType][].
    ABSOLUTE = 1;

    // The custom pacing goal amounts represent a millipercent. For example,
    // 15000 millipercent equals 15%.
    MILLI_PERCENT = 2;
  }
}
