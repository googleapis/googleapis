syntax = "proto3";

package google.ads.admanager.v1;

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "LineItemAllowedFormatEnumProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// Wrapper message for
// [LineItemAllowedFormat][google.ads.admanager.v1.LineItemAllowedFormatEnum.LineItemAllowedFormat]
message LineItemAllowedFormatEnum {
  // The formats that a publisher allows on their programmatic video LineItem
  // or ProposalLineItem.
  enum LineItemAllowedFormat {
    // Default value. This value is unused.
    LINE_ITEM_ALLOWED_FORMAT_UNSPECIFIED = 0;

    // Audio format.
    AUDIO = 1;

    // Video format.
    VIDEO = 2;

    // Display format.
    DISPLAY = 3;
  }
}
