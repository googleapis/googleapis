syntax = "proto3";

package google.ads.admanager.v1;

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "LineItemDeliveryForecastSourceEnumProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// Wrapper message for
// [LineItemDeliveryForecastSource][google.ads.admanager.v1.LineItemDeliveryForecastSourceEnum.LineItemDeliveryForecastSource]
message LineItemDeliveryForecastSourceEnum {
  // Strategies for choosing forecasted traffic shapes to pace line items.
  enum LineItemDeliveryForecastSource {
    // Default value. This value is unused.
    LINE_ITEM_DELIVERY_FORECAST_SOURCE_UNSPECIFIED = 0;

    // A user specified custom pacing curve will be used to pace line item
    // delivery.
    CUSTOM_PACING_CURVE = 1;

    // The line item's projected future traffic will be used to pace line item
    // delivery.
    FORECASTING = 2;

    // The line item's historical traffic shape will be used to pace line item
    // delivery.
    HISTORICAL = 3;
  }
}
