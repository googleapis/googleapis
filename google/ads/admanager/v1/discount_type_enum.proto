syntax = "proto3";

package google.ads.admanager.v1;

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "DiscountTypeEnumProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// Wrapper message for
// [DiscountType][google.ads.admanager.v1.DiscountTypeEnum.DiscountType].
message DiscountTypeEnum {
  // Describes the possible discount types on the cost of booking a line item.
  enum DiscountType {
    // No value specified
    DISCOUNT_TYPE_UNSPECIFIED = 0;

    // An absolute value will be discounted from the line item's cost.
    ABSOLUTE_VALUE = 1;

    // A percentage of the cost will be discounted for booking the line item.
    PERCENTAGE = 2;
  }
}
