syntax = "proto3";

package google.ads.admanager.v1;

import "google/api/field_behavior.proto";

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "LineItemDealInfoProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// Data transfer object for the exchange deal info of a line item.
message LineItemDealInfo {
  // Optional. The external deal ID shared between seller and buyer. This field
  // is only present if the deal has been finalized.
  optional int64 external_deal_id = 2 [(google.api.field_behavior) = OPTIONAL];
}
