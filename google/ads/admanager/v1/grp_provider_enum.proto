syntax = "proto3";

package google.ads.admanager.v1;

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "GrpProviderEnumProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// Wrapper message for
// [GrpProvider][google.ads.admanager.v1.GrpProviderEnum.GrpProvider]
message GrpProviderEnum {
  // Represents available GRP providers that a line item will have its target
  // demographic measured by.
  enum GrpProvider {
    // Default value. This value is unused.
    GRP_PROVIDER_UNSPECIFIED = 0;

    // Google's GRP provider.
    GOOGLE = 1;

    // Nielsen's GRP provider.
    NIELSEN = 2;
  }
}
