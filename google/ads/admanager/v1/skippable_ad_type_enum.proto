syntax = "proto3";

package google.ads.admanager.v1;

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "SkippableAdTypeEnumProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// Wrapper message for
// [SkippableAdType][google.ads.admanager.v1.SkippableAdTypeEnum.SkippableAdType]
message SkippableAdTypeEnum {
  // The different types of skippable ads.
  enum SkippableAdType {
    // Default value. This value is unused.
    SKIPPABLE_AD_TYPE_UNSPECIFIED = 0;

    // Any skippable or not skippable. This is only for programmatic case when
    // the creative skippability is decided by the buyside.
    ANY = 1;

    // The ad is not skippable.
    DISABLED = 2;

    // The ad is skippable.
    ENABLED = 3;

    // The ad is an instream select ad.
    INSTREAM_SELECT = 4;
  }
}
