syntax = "proto3";

package google.ads.admanager.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "CreativeSetMessagesProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// A `CreativeSet` is comprised of a master `Creative` and its companion
// `Creative`s.
message CreativeSet {
  option (google.api.resource) = {
    type: "admanager.googleapis.com/CreativeSet"
    pattern: "networks/{network_code}/creativeSets/{creative_set}"
    plural: "creativeSets"
    singular: "creativeSet"
  };

  // Identifier. The resource name of the `CreativeSet`.
  // Format: `networks/{network_code}/creativeSets/{creative_set_id}`
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Required. The name of the `CreativeSet`. This attribute has a maximum
  // length of 255 characters.
  optional string display_name = 3 [(google.api.field_behavior) = REQUIRED];

  // Required. Immutable. The master
  // [Creative](google.ads.admanager.v1.Creative) to which the `CreativeSet` is
  // associated.
  optional string master_creative = 5 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE,
    (google.api.resource_reference) = {
      type: "admanager.googleapis.com/Creative"
    }
  ];

  // Required. The resource names of the companion `Creative`s associated with
  // this `CreativeSet`. Format: `networks/{network_code}/creatives/{creative}`
  repeated string companion_creatives = 7 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "admanager.googleapis.com/Creative"
    }
  ];

  // Output only. The time this `CreativeSet` was last modified.
  optional google.protobuf.Timestamp update_time = 9
      [(google.api.field_behavior) = OUTPUT_ONLY];
}
