syntax = "proto3";

package google.ads.admanager.v1;

import "google/ads/admanager/v1/label_messages.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "LabelServiceProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// Provides methods for handling `Label` objects.
service LabelService {
  option (google.api.default_host) = "admanager.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/admanager,"
      "https://www.googleapis.com/auth/admanager.readonly";

  // Retrieves a `Label` object.
  rpc GetLabel(GetLabelRequest) returns (Label) {
    option (google.api.http) = {
      get: "/v1/{name=networks/*/labels/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Lists `Label` objects.
  rpc ListLabels(ListLabelsRequest) returns (ListLabelsResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=networks/*}/labels"
    };
    option (google.api.method_signature) = "parent";
  }

  // Creates a `Label` object.
  rpc CreateLabel(CreateLabelRequest) returns (Label) {
    option (google.api.http) = {
      post: "/v1/{parent=networks/*}/labels"
      body: "label"
    };
    option (google.api.method_signature) = "parent,label";
  }

  // Creates `Label` objects.
  rpc BatchCreateLabels(BatchCreateLabelsRequest)
      returns (BatchCreateLabelsResponse) {
    option (google.api.http) = {
      post: "/v1/{parent=networks/*}/labels:batchCreate"
      body: "*"
    };
    option (google.api.method_signature) = "parent,requests";
  }

  // Updates a `Label` object.
  rpc UpdateLabel(UpdateLabelRequest) returns (Label) {
    option (google.api.http) = {
      patch: "/v1/{label.name=networks/*/labels/*}"
      body: "label"
    };
    option (google.api.method_signature) = "label,update_mask";
  }

  // Batch updates `Label` objects.
  rpc BatchUpdateLabels(BatchUpdateLabelsRequest)
      returns (BatchUpdateLabelsResponse) {
    option (google.api.http) = {
      post: "/v1/{parent=networks/*}/labels:batchUpdate"
      body: "*"
    };
    option (google.api.method_signature) = "parent,requests";
  }

  // Activates `Label` objects.
  rpc BatchActivateLabels(BatchActivateLabelsRequest)
      returns (BatchActivateLabelsResponse) {
    option (google.api.http) = {
      post: "/v1/{parent=networks/*}/labels:batchActivate"
      body: "*"
    };
    option (google.api.method_signature) = "parent,names";
  }

  // Deactivates `Label` objects.
  rpc BatchDeactivateLabels(BatchDeactivateLabelsRequest)
      returns (BatchDeactivateLabelsResponse) {
    option (google.api.http) = {
      post: "/v1/{parent=networks/*}/labels:batchDeactivate"
      body: "*"
    };
    option (google.api.method_signature) = "parent,names";
  }
}

// Request object for `GetLabel` method.
message GetLabelRequest {
  // Required. The resource name of the Label.
  // Format: `networks/{network_code}/labels/{label_id}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = { type: "admanager.googleapis.com/Label" }
  ];
}

// Request object for `ListLabels` method.
message ListLabelsRequest {
  // Required. The parent, which owns this collection of Labels.
  // Format: `networks/{network_code}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "admanager.googleapis.com/Network"
    }
  ];

  // Optional. The maximum number of `Labels` to return. The service may return
  // fewer than this value. If unspecified, at most 50 `Labels` will be
  // returned. The maximum value is 1000; values greater than 1000 will be
  // coerced to 1000.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A page token, received from a previous `ListLabels` call.
  // Provide this to retrieve the subsequent page.
  //
  // When paginating, all other parameters provided to `ListLabels` must match
  // the call that provided the page token.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Expression to filter the response.
  //  See syntax details at
  //  https://developers.google.com/ad-manager/api/beta/filters
  //
  // <b>Filterable fields:</b>
  // <ul style="list-style-type:none">
  //   <li><code>active</code></li>
  //   <li><code>description</code></li>
  //   <li><code>displayName</code></li>
  //   <li><code>name</code></li>
  //   <li><code>types</code></li>
  // </ul>
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Expression to specify sorting order.
  // See syntax details at
  // https://developers.google.com/ad-manager/api/beta/filters#order
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Number of individual resources to skip while paginating.
  int32 skip = 6 [(google.api.field_behavior) = OPTIONAL];
}

// Response object for `ListLabelsRequest` containing matching `Label` objects.
message ListLabelsResponse {
  // The `Label` objects from the specified network.
  repeated Label labels = 1;

  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;

  // Total number of `Label` objects.
  // If a filter was included in the request, this reflects the total number
  // after the filtering is applied.
  //
  // `total_size` won't be calculated in the response unless it has been
  // included in a response field mask. The response field mask can be provided
  // to the method by using the URL parameter `$fields` or `fields`, or by using
  // the HTTP/gRPC header `X-Goog-FieldMask`.
  //
  // For more information, see
  // https://developers.google.com/ad-manager/api/beta/field-masks
  int32 total_size = 3;
}

// Request object for `CreateLabel` method.
message CreateLabelRequest {
  // Required. The parent resource where this `Label` will be created.
  // Format: `networks/{network_code}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "admanager.googleapis.com/Network"
    }
  ];

  // Required. The `Label` to create.
  Label label = 2 [(google.api.field_behavior) = REQUIRED];
}

// Request object for `BatchCreateLabels` method.
message BatchCreateLabelsRequest {
  // Required. The parent resource where `Labels` will be created.
  // Format: `networks/{network_code}`
  // The parent field in the CreateLabelRequest must match this
  // field.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "admanager.googleapis.com/Network"
    }
  ];

  // Required. The `Label` objects to create.
  // A maximum of 100 objects can be created in a batch.
  repeated CreateLabelRequest requests = 2
      [(google.api.field_behavior) = REQUIRED];
}

// Response object for `BatchCreateLabels` method.
message BatchCreateLabelsResponse {
  // The `Label` objects created.
  repeated Label labels = 1;
}

// Request object for `UpdateLabel` method.
message UpdateLabelRequest {
  // Required. The `Label` to update.
  //
  // The `Label`'s `name` is used to identify the `Label` to update.
  Label label = 1 [(google.api.field_behavior) = REQUIRED];

  // Optional. The list of fields to update.
  google.protobuf.FieldMask update_mask = 2
      [(google.api.field_behavior) = OPTIONAL];
}

// Request object for `BatchUpdateLabels` method.
message BatchUpdateLabelsRequest {
  // Required. The parent resource where `Labels` will be updated.
  // Format: `networks/{network_code}`
  // The parent field in the UpdateLabelRequest must match this
  // field.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "admanager.googleapis.com/Network"
    }
  ];

  // Required. The `Label` objects to update.
  // A maximum of 100 objects can be updated in a batch.
  repeated UpdateLabelRequest requests = 2
      [(google.api.field_behavior) = REQUIRED];
}

// Response object for `BatchUpdateLabels` method.
message BatchUpdateLabelsResponse {
  // The `Label` objects updated.
  repeated Label labels = 1;
}

// Request message for `BatchActivateLabels` method.
message BatchActivateLabelsRequest {
  // Required. Format: `networks/{network_code}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "admanager.googleapis.com/Network"
    }
  ];

  // Required. Resource names for the Label.
  // Format: `networks/{network_code}/labels/{label_id}`
  repeated string names = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = { type: "admanager.googleapis.com/Label" }
  ];
}

// Response message for `BatchActivateLabels` method.
message BatchActivateLabelsResponse {}

// Request message for `BatchDeactivateLabels` method.
message BatchDeactivateLabelsRequest {
  // Required. Format: `networks/{network_code}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "admanager.googleapis.com/Network"
    }
  ];

  // Required. Resource names for the Label.
  // Format: `networks/{network_code}/labels/{label_id}`
  repeated string names = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = { type: "admanager.googleapis.com/Label" }
  ];
}

// Response message for `BatchDeactivateLabels` method.
message BatchDeactivateLabelsResponse {}
