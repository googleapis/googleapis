syntax = "proto3";

package google.ads.admanager.v1;

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "NielsenCtvPacingEnumProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// Wrapper message for
// [NielsenCtvPacing][google.ads.admanager.v1.NielsenCtvPacingEnum.NielsenCtvPacing]
message NielsenCtvPacingEnum {
  // Represents the pacing computation method for impressions on connected
  // devices for a Nielsen measured line item. This only applies when Nielsen
  // measurement is enabled for connected devices.
  enum NielsenCtvPacing {
    // Default value. This value is unused.
    NIELSEN_CTV_PACING_UNSPECIFIED = 0;

    // Indicates that Nielsen impressions on connected devices are included, and
    // we apply coviewing in pacing.
    COVIEW = 1;

    // The value returned if Nielsen measurement is disabled for connected
    // devices.
    NONE = 2;

    // Indicates that Nielsen impressions on connected devices are included, and
    // we apply strict coviewing in pacing.
    STRICT_COVIEW = 3;
  }
}
