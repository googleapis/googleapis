syntax = "proto3";

package google.ads.admanager.v1;

import "google/ads/admanager/v1/rich_media_ads_company_messages.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "RichMediaAdsCompanyServiceProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// Provides methods for handling `RichMediaAdsCompany` objects.
service RichMediaAdsCompanyService {
  option (google.api.default_host) = "admanager.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/admanager,"
      "https://www.googleapis.com/auth/admanager.readonly";

  // Retrieves a `RichMediaAdsCompany` object.
  rpc GetRichMediaAdsCompany(GetRichMediaAdsCompanyRequest)
      returns (RichMediaAdsCompany) {
    option (google.api.http) = {
      get: "/v1/{name=networks/*/richMediaAdsCompanies/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Lists `RichMediaAdsCompany` objects.
  rpc ListRichMediaAdsCompanies(ListRichMediaAdsCompaniesRequest)
      returns (ListRichMediaAdsCompaniesResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=networks/*}/richMediaAdsCompanies"
    };
    option (google.api.method_signature) = "parent";
  }
}

// Request object for `GetRichMediaAdsCompany` method.
message GetRichMediaAdsCompanyRequest {
  // Required. The resource name of the RichMediaAdsCompany.
  // Format:
  // `networks/{network_code}/richMediaAdsCompanies/{rich_media_ads_company_id}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "admanager.googleapis.com/RichMediaAdsCompany"
    }
  ];
}

// Request object for `ListRichMediaAdsCompanies` method.
message ListRichMediaAdsCompaniesRequest {
  // Required. The parent, which owns this collection of RichMediaAdsCompanies.
  // Format: `networks/{network_code}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "admanager.googleapis.com/Network"
    }
  ];

  // Optional. The maximum number of `RichMediaAdsCompanies` to return. The
  // service may return fewer than this value. If unspecified, at most 50
  // `RichMediaAdsCompanies` will be returned. The maximum value is 1000; values
  // greater than 1000 will be coerced to 1000.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A page token, received from a previous
  // `ListRichMediaAdsCompanies` call. Provide this to retrieve the subsequent
  // page.
  //
  // When paginating, all other parameters provided to
  // `ListRichMediaAdsCompanies` must match the call that provided the page
  // token.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Expression to filter the response.
  //  See syntax details at
  //  https://developers.google.com/ad-manager/api/beta/filters
  //
  // <b>Filterable fields:</b>
  // <ul style="list-style-type:none">
  //   <li><code>companyGvlId</code></li>
  //   <li><code>displayName</code></li>
  //   <li><code>gdprStatus</code></li>
  //   <li><code>name</code></li>
  //   <li><code>policyUrl</code></li>
  // </ul>
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Expression to specify sorting order.
  // See syntax details at
  // https://developers.google.com/ad-manager/api/beta/filters#order
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Number of individual resources to skip while paginating.
  int32 skip = 6 [(google.api.field_behavior) = OPTIONAL];
}

// Response object for `ListRichMediaAdsCompaniesRequest` containing matching
// `RichMediaAdsCompany` objects.
message ListRichMediaAdsCompaniesResponse {
  // The `RichMediaAdsCompany` objects from the specified network.
  repeated RichMediaAdsCompany rich_media_ads_companies = 1;

  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;

  // Total number of `RichMediaAdsCompany` objects.
  // If a filter was included in the request, this reflects the total number
  // after the filtering is applied.
  //
  // `total_size` won't be calculated in the response unless it has been
  // included in a response field mask. The response field mask can be provided
  // to the method by using the URL parameter `$fields` or `fields`, or by using
  // the HTTP/gRPC header `X-Goog-FieldMask`.
  //
  // For more information, see
  // https://developers.google.com/ad-manager/api/beta/field-masks
  int32 total_size = 3;
}
