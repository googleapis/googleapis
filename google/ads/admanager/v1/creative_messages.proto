syntax = "proto3";

package google.ads.admanager.v1;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";

option csharp_namespace = "Google.Ads.AdManager.V1";
option go_package = "google.golang.org/genproto/googleapis/ads/admanager/v1;admanager";
option java_multiple_files = true;
option java_outer_classname = "CreativeMessagesProto";
option java_package = "com.google.ads.admanager.v1";
option php_namespace = "Google\\Ads\\AdManager\\V1";
option ruby_package = "Google::Ads::AdManager::V1";

// The Creative resource.
message Creative {
  option (google.api.resource) = {
    type: "admanager.googleapis.com/Creative"
    pattern: "networks/{network_code}/creatives/{creative}"
    plural: "creatives"
    singular: "creative"
  };

  // Identifier. The resource name of the Creative.
  // Format: `networks/{network_code}/creatives/{creative_id}`
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Required. Display name of the `Creative`. This attribute has a maximum
  // length of 255 characters.
  optional string display_name = 8 [(google.api.field_behavior) = REQUIRED];
}
