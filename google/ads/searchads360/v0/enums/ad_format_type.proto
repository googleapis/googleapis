syntax = "proto3";

package google.ads.searchads360.v0.enums;

option csharp_namespace = "Google.Ads.SearchAds360.V0.Enums";
option go_package = "google.golang.org/genproto/googleapis/ads/searchads360/v0/enums;enums";
option java_multiple_files = true;
option java_outer_classname = "AdFormatTypeProto";
option java_package = "com.google.ads.searchads360.v0.enums";
option objc_class_prefix = "GASA360";
option php_namespace = "Google\\Ads\\SearchAds360\\V0\\Enums";
option ruby_package = "Google::Ads::SearchAds360::V0::Enums";

// Proto file describing ad format types.

// Container for enumeration of Google Ads format types.
message AdFormatTypeEnum {
  // Enumerates Google Ads format types.
  //
  // Note that this segmentation is available only for Video and Demand Gen
  // campaigns. For assets, only video assets are supported.
  enum AdFormatType {
    // No value has been specified.
    UNSPECIFIED = 0;

    // Used for return value only. Represents value unknown in this version.
    UNKNOWN = 1;

    // An ad format that promotes a specific entity within a vertical, for
    // example, a hotel ad in the Travel vertical on Search.
    VERTICAL_ADS_PROMOTION = 13;

    // An ad format for a booking link call-to-action within a vertical ad, for
    // example a 'Book Now' link for a hotel ad.
    VERTICAL_ADS_BOOKING_LINK = 14;

    // A standard text ad format. This is currently only used for ads on the
    // Search network.
    TEXT = 15;
  }
}
