syntax = "proto3";

package google.ads.googleads.v23.resources;

import "google/ads/googleads/v23/enums/video_enhancement_source.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

option csharp_namespace = "Google.Ads.GoogleAds.V23.Resources";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v23/resources;resources";
option java_multiple_files = true;
option java_outer_classname = "VideoEnhancementProto";
option java_package = "com.google.ads.googleads.v23.resources";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V23\\Resources";
option ruby_package = "Google::Ads::GoogleAds::V23::Resources";

// Proto file describing the Video Enhancement resource.

// Represents a video that can include both advertiser uploaded videos or
// enhancements generated from the advertiser uploaded videos. Only publicly
// available videos are returned.
//
// Each row in this resource represents either the video uploaded by the
// advertiser or each specific variation of it. In contrast, the `Video`
// resource represents only the advertiser-provided video and would aggregate
// metrics across all its variations (including enhancements).
// {-- next tag to use: 5 --}
message VideoEnhancement {
  option (google.api.resource) = {
    type: "googleads.googleapis.com/VideoEnhancement"
    pattern: "customers/{customer_id}/videoEnhancements/{video_enhancement}"
    plural: "videoEnhancements"
    singular: "videoEnhancement"
  };

  // Output only. The resource name of the video enhancement.
  // Video enhancement resource names have the form:
  //
  // `customers/{customer_id}/videoEnhancements/{video_id}`
  string resource_name = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {
      type: "googleads.googleapis.com/VideoEnhancement"
    }
  ];

  // Output only. Duration of this video, in milliseconds.
  int64 duration_millis = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The source of the video (e.g. advertiser or enhanced by Google
  // Ads).
  google.ads.googleads.v23.enums.VideoEnhancementSourceEnum
      .VideoEnhancementSource source = 3
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Title of this video.
  string title = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
}
