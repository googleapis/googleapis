syntax = "proto3";

package google.ads.googleads.v24.resources;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";

option csharp_namespace = "Google.Ads.GoogleAds.V24.Resources";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v24/resources;resources";
option java_multiple_files = true;
option java_outer_classname = "CartDataSalesViewProto";
option java_package = "com.google.ads.googleads.v24.resources";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V24\\Resources";
option ruby_package = "Google::Ads::GoogleAds::V24::Resources";

// Proto file describing the CartDataSalesView resource.

// Cart data sales view.
//
// Provides information about the products which were purchased if conversions
// with cart data is implemented. Performance metrics like revenue, gross
// profit, lead/cross-sell metrics etc. and Merchant Center attributes such as
// brand, category etc. are available for products defined in an inventory feed
// and sold as a result of Google ads. For purchases attributed to clicks on
// Shopping ads, dimensions of both clicked and sold products can be viewed
// together.
message CartDataSalesView {
  option (google.api.resource) = {
    type: "googleads.googleapis.com/CartDataSalesView"
    pattern: "customers/{customer_id}/cartDataSalesView"
    plural: "cartDataSalesViews"
    singular: "cartDataSalesView"
  };

  // Output only. The resource name of the Cart data sales view.
  // Cart data sales view resource names have the form:
  // `customers/{customer_id}/cartDataSalesView`
  string resource_name = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {
      type: "googleads.googleapis.com/CartDataSalesView"
    }
  ];
}
