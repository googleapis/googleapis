syntax = "proto3";

package google.ads.googleads.v24.resources;

import "google/ads/googleads/v24/common/asset_set_types.proto";
import "google/ads/googleads/v24/enums/asset_set_status.proto";
import "google/ads/googleads/v24/enums/asset_set_type.proto";
import "google/ads/googleads/v24/enums/vertical_ads_item_vertical_type.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

option csharp_namespace = "Google.Ads.GoogleAds.V24.Resources";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v24/resources;resources";
option java_multiple_files = true;
option java_outer_classname = "AssetSetProto";
option java_package = "com.google.ads.googleads.v24.resources";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V24\\Resources";
option ruby_package = "Google::Ads::GoogleAds::V24::Resources";

// An asset set representing a collection of assets.
// Use AssetSetAsset to link an asset to the asset set.
message AssetSet {
  option (google.api.resource) = {
    type: "googleads.googleapis.com/AssetSet"
    pattern: "customers/{customer_id}/assetSets/{asset_set_id}"
  };

  // Merchant ID and Feed Label from Google Merchant Center.
  message MerchantCenterFeed {
    // Required. Merchant ID from Google Merchant Center
    int64 merchant_id = 1 [(google.api.field_behavior) = REQUIRED];

    // Optional. Feed Label from Google Merchant Center.
    optional string feed_label = 2 [(google.api.field_behavior) = OPTIONAL];
  }

  // For Performance Max for travel goals campaigns with a Hotel
  // Center account link. Read-only.
  message HotelPropertyData {
    // Output only. The hotel center ID of the partner.
    optional int64 hotel_center_id = 1
        [(google.api.field_behavior) = OUTPUT_ONLY];

    // Output only. Name of the hotel partner.
    optional string partner_name = 2
        [(google.api.field_behavior) = OUTPUT_ONLY];
  }

  // Travel Feed data. Read-only
  message TravelFeedData {
    // Output only. Id representing a subset of the travel feed.
    int64 subset_id = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

    // Output only. Indicates the vertical type of the travel feed.
    google.ads.googleads.v24.enums.VerticalAdsItemVerticalTypeEnum
        .VerticalAdsItemVerticalType travel_feed_vertical_type = 6
        [(google.api.field_behavior) = OUTPUT_ONLY];

    // Specifies the linked account ID required for different travel vertical
    // feeds. Use the Hotel Center account ID for Hotel and Vacation Rental
    // feeds, the Merchant Center ID for Things to Do feeds, and the Partner
    // Center ID for all other travel vertical feeds.
    oneof travel_feed_id {
      // Output only. The Hotel Center account ID used for a Hotel or Vacation
      // Rental feed.
      int64 hotel_center_account_id = 1
          [(google.api.field_behavior) = OUTPUT_ONLY];

      // Output only. The Merchant Center account ID used for a Things to Do
      // feed.
      int64 merchant_center_id = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

      // Output only. The Partner Center ID used for a travel vertical feed,
      // except for Hotel, Vacation Rental, and Things to Do feeds.
      int64 partner_center_id = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
    }
  }

  // Output only. The ID of the asset set.
  int64 id = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Immutable. The resource name of the asset set.
  // Asset set resource names have the form:
  //
  // `customers/{customer_id}/assetSets/{asset_set_id}`
  string resource_name = 1 [
    (google.api.field_behavior) = IMMUTABLE,
    (google.api.resource_reference) = {
      type: "googleads.googleapis.com/AssetSet"
    }
  ];

  // Required. Name of the asset set. Required. It must have a minimum length of
  // 1 and maximum length of 128.
  string name = 2 [(google.api.field_behavior) = REQUIRED];

  // Required. Immutable. The type of the asset set. Required.
  google.ads.googleads.v24.enums.AssetSetTypeEnum.AssetSetType type = 3 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE
  ];

  // Output only. The status of the asset set. Read-only.
  google.ads.googleads.v24.enums.AssetSetStatusEnum.AssetSetStatus status = 4
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Merchant ID and Feed Label from Google Merchant Center.
  MerchantCenterFeed merchant_center_feed = 5;

  // Immutable. Parent asset set ID for the asset set where the elements of this
  // asset set come from. For example: the sync level location AssetSet id where
  // the elements in LocationGroup AssetSet come from. This field is required
  // and only applicable for Location Group typed AssetSet.
  int64 location_group_parent_asset_set_id = 10
      [(google.api.field_behavior) = IMMUTABLE];

  // Output only. For Performance Max for travel goals campaigns with a Hotel
  // Center account link. Read-only.
  HotelPropertyData hotel_property_data = 11
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Travel Feed data. Read-only
  TravelFeedData travel_feed_data = 12
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Asset set data specific to each asset set type. Not all types have specific
  // data.
  oneof asset_set_source {
    // Location asset set data. This will be used for sync level location
    // set. This can only be set if AssetSet's type is LOCATION_SYNC.
    google.ads.googleads.v24.common.LocationSet location_set = 7;

    // Business Profile location group asset set data.
    google.ads.googleads.v24.common.BusinessProfileLocationGroup
        business_profile_location_group = 8;

    // Represents information about a Chain dynamic location group.
    // Only applicable if the sync level AssetSet's type is LOCATION_SYNC and
    // sync source is chain.
    google.ads.googleads.v24.common.ChainLocationGroup chain_location_group = 9;
  }
}
