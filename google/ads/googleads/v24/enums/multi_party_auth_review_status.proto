syntax = "proto3";

package google.ads.googleads.v24.enums;

option csharp_namespace = "Google.Ads.GoogleAds.V24.Enums";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v24/enums;enums";
option java_multiple_files = true;
option java_outer_classname = "MultiPartyAuthReviewStatusProto";
option java_package = "com.google.ads.googleads.v24.enums";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V24\\Enums";
option ruby_package = "Google::Ads::GoogleAds::V24::Enums";

// The status of a Multi-Party Authorization review.
message MultiPartyAuthReviewStatusEnum {
  // The possible statuses of a Multi-Party Authorization review.
  enum MultiPartyAuthReviewStatus {
    // Not specified.
    UNSPECIFIED = 0;

    // Value unknown in this version.
    UNKNOWN = 1;

    // The Multi-Party Authorization request has been approved by another admin.
    APPROVED = 2;

    // The Multi-Party Authorization request has been sent but not yet approved
    // by another admin.
    PENDING = 3;

    // The Multi-Party Authorization request has been revoked by the requester.
    REVOKED = 4;

    // The Multi-Party Authorization request has been rejected by another admin.
    REJECTED = 5;

    // The Multi-Party Authorization request has expired.
    EXPIRED = 6;
  }
}
