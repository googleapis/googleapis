syntax = "proto3";

package google.ads.googleads.v24.enums;

option csharp_namespace = "Google.Ads.GoogleAds.V24.Enums";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v24/enums;enums";
option java_multiple_files = true;
option java_outer_classname = "ReachPlanCostModelProto";
option java_package = "com.google.ads.googleads.v24.enums";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V24\\Enums";
option ruby_package = "Google::Ads::GoogleAds::V24::Enums";

// Container for enum describing cost models available for reach planning.
message ReachPlanCostModelEnum {
  // The reach plan cost model for an ad format.
  enum ReachPlanCostModel {
    // Not specified.
    UNSPECIFIED = 0;

    // The value is unknown in this version.
    UNKNOWN = 1;

    // Cost per mille (thousand impressions).
    CPM = 2;

    // Cost per view.
    CPV = 3;

    // Cost per click.
    CPC = 4;

    // Cost per action (conversion).
    CPA = 5;
  }
}
