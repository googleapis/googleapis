syntax = "proto3";

package google.ads.googleads.v24.enums;

option csharp_namespace = "Google.Ads.GoogleAds.V24.Enums";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v24/enums;enums";
option java_multiple_files = true;
option java_outer_classname = "ContentCreatorInsightsSupplementalDataProto";
option java_package = "com.google.ads.googleads.v24.enums";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V24\\Enums";
option ruby_package = "Google::Ads::GoogleAds::V24::Enums";

// Proto file describing enums for requesting supplemental data in the Content
// Creator Insights Service.

// Container for enum describing supplemental data for the Content Creator
// Insights Service.
message ContentCreatorInsightsSupplementalDataEnum {
  // Supplemental data for the Content Creator Insights Service.
  enum ContentCreatorInsightsSupplementalData {
    // Not specified.
    UNSPECIFIED = 0;

    // The value is unknown in this version.
    UNKNOWN = 1;

    // Populate local creator data in
    // [ContentCreatorInsightsService.GenerateTrendingInsights][google.ads.googleads.v24.services.ContentCreatorInsightsService.GenerateTrendingInsights]
    // and
    // [ContentCreatorInsightsService.GenerateCreatorInsights][google.ads.googleads.v24.services.ContentCreatorInsightsService.GenerateCreatorInsights].
    // This is only available when requesting trending or creator insights for
    // a content or creator topic. These topics are Knowledge Graph entities
    // tagged with
    // [CONTENT_TRENDING_INSIGHTS][google.ads.googleads.v24.enums.InsightsKnowledgeGraphEntityCapabilitiesEnum.InsightsKnowledgeGraphEntityCapabilities.CONTENT_TRENDING_INSIGHTS]
    // or
    // [CREATOR_TOPIC_INSIGHTS][google.ads.googleads.v24.enums.InsightsKnowledgeGraphEntityCapabilitiesEnum.InsightsKnowledgeGraphEntityCapabilities.CREATOR_TOPIC_INSIGHTS].
    // Local creator discovery is not supported when
    // [GenerateCreatorInsightsRequest.sub_country_locations][google.ads.googleads.v24.services.GenerateCreatorInsightsRequest.sub_country_locations]
    // or
    // [GenerateTrendingInsightsRequest.sub_country_locations][google.ads.googleads.v24.services.GenerateTrendingInsightsRequest.sub_country_locations]
    // is set. Use [AudienceInsightsService.ListAudienceInsightsAttributes][] to
    // get the list of supported Knowledge Graph entities.
    LOCAL_CREATOR_DATA = 3;
  }
}
