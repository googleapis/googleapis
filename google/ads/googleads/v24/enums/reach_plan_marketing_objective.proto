syntax = "proto3";

package google.ads.googleads.v24.enums;

option csharp_namespace = "Google.Ads.GoogleAds.V24.Enums";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v24/enums;enums";
option java_multiple_files = true;
option java_outer_classname = "ReachPlanMarketingObjectiveProto";
option java_package = "com.google.ads.googleads.v24.enums";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V24\\Enums";
option ruby_package = "Google::Ads::GoogleAds::V24::Enums";

// Container for enum describing marketing objectives available for reach
// planning.
message ReachPlanMarketingObjectiveEnum {
  // Marketing objectives available for reach planning.
  enum ReachPlanMarketingObjective {
    // Not specified.
    UNSPECIFIED = 0;

    // The value is unknown in this version.
    UNKNOWN = 1;

    // The objective is to maximize brand visibility and reach as many relevant
    // people as possible, making potential customers aware of the brand or
    // product.
    AWARENESS = 2;

    // The objective is to encourage potential customers to learn more about
    // the brand or products and consider them for a future purchase.
    CONSIDERATION = 3;

    // The objective is to persuade potential customers to take a specific,
    // valuable action, such as making a purchase, signing up for a newsletter,
    // or generating a lead.
    ACTION = 4;
  }
}
