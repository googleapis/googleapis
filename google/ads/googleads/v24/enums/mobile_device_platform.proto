syntax = "proto3";

package google.ads.googleads.v24.enums;

option csharp_namespace = "Google.Ads.GoogleAds.V24.Enums";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v24/enums;enums";
option java_multiple_files = true;
option java_outer_classname = "MobileDevicePlatformProto";
option java_package = "com.google.ads.googleads.v24.enums";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V24\\Enums";
option ruby_package = "Google::Ads::GoogleAds::V24::Enums";

// Proto file describing mobile device platforms.

// Container for enumeration of Google Ads mobile device platforms.
message MobileDevicePlatformEnum {
  // Enum describing the mobile device platform.
  enum MobileDevicePlatform {
    // Not specified.
    UNSPECIFIED = 0;

    // Used for return value only. Represents value unknown in this version.
    // Non-mobile and non-desktop devices will fall into this segment.
    UNKNOWN = 1;

    // Android devices.
    ANDROID = 2;

    // iOS devices.
    IOS = 3;

    // Mobile devices that are not Android or iOS devices.
    OTHER_MOBILE = 4;

    // Desktop devices.
    DESKTOP = 5;
  }
}
