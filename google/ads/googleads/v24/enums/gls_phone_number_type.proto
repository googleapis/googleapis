syntax = "proto3";

package google.ads.googleads.v24.enums;

option csharp_namespace = "Google.Ads.GoogleAds.V24.Enums";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v24/enums;enums";
option java_multiple_files = true;
option java_outer_classname = "GlsPhoneNumberTypeProto";
option java_package = "com.google.ads.googleads.v24.enums";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V24\\Enums";
option ruby_package = "Google::Ads::GoogleAds::V24::Enums";

// Proto file describing the GLS phone number type resource.

// Container for enum describing possible types of GLS phone numbers.
message GlsPhoneNumberTypeEnum {
  // Possible types of GLS phone numbers.
  enum GlsPhoneNumberType {
    // Not specified.
    UNSPECIFIED = 0;

    // Used for return value only. Represents value unknown in this version.
    UNKNOWN = 1;

    // Provider-provided destination number to use for calls originating from a
    // GLS ad unit. This is the default.
    DESTINATION_PHONE_NUMBER_FOR_ADS = 2;

    // Destination phone number that supports SMS.
    DESTINATION_PHONE_NUMBER_FOR_SMS_ONLY = 3;

    // Destination phone number for a provider's WhatsApp account.
    DESTINATION_PHONE_NUMBER_FOR_WHATSAPP_ONLY = 4;
  }
}
