syntax = "proto3";

package google.ads.googleads.v24.errors;

option csharp_namespace = "Google.Ads.GoogleAds.V24.Errors";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v24/errors;errors";
option java_multiple_files = true;
option java_outer_classname = "MultiPartyAuthReviewErrorProto";
option java_package = "com.google.ads.googleads.v24.errors";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V24\\Errors";
option ruby_package = "Google::Ads::GoogleAds::V24::Errors";

// Proto file describing MultiPartyAuthReview errors.

// Container for enum describing possible MultiPartyAuthReview errors.
message MultiPartyAuthReviewErrorEnum {
  // Enum describing possible MultiPartyAuthReview errors.
  enum MultiPartyAuthReviewError {
    // Enum unspecified.
    UNSPECIFIED = 0;

    // The error code is not in this version.
    UNKNOWN = 1;

    // The Multi-Party Authorization review requested was not found.
    ACCESS_INVITATION_NOT_FOUND = 2;

    // The Multi-Party Authorization review is not PENDING.
    ACCESS_INVITATION_INVALID_STATUS = 3;

    // The status transition is not allowed.
    INVALID_STATUS_TRANSITION = 4;

    // The user does not have permission to perform this action.
    PERMISSION_DENIED = 5;
  }
}
