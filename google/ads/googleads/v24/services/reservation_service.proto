syntax = "proto3";

package google.ads.googleads.v24.services;

import "google/ads/googleads/v24/actions/book_campaigns.proto";
import "google/ads/googleads/v24/actions/quote_campaigns.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";

option csharp_namespace = "Google.Ads.GoogleAds.V24.Services";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v24/services;services";
option java_multiple_files = true;
option java_outer_classname = "ReservationServiceProto";
option java_package = "com.google.ads.googleads.v24.services";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V24\\Services";
option ruby_package = "Google::Ads::GoogleAds::V24::Services";

// Service for reservation related operations.
// This service is not publicly available.
service ReservationService {
  option (google.api.default_host) = "googleads.googleapis.com";
  option (google.api.oauth_scopes) = "https://www.googleapis.com/auth/adwords";

  // Proposes quotes for booking campaigns.
  // This request can have a latency of 30 seconds.
  rpc QuoteCampaigns(QuoteCampaignsRequest) returns (QuoteCampaignsResponse) {
    option (google.api.http) = {
      post: "/v24/customers/{customer_id=*}/reservations:quoteCampaigns"
      body: "*"
    };
    option (google.api.method_signature) = "customer_id";
  }

  // Books the requested campaigns.
  // This request can have a latency of 30 seconds.
  rpc BookCampaigns(BookCampaignsRequest) returns (BookCampaignsResponse) {
    option (google.api.http) = {
      post: "/v24/customers/{customer_id=*}/reservations:bookCampaigns"
      body: "*"
    };
    option (google.api.method_signature) = "customer_id";
  }
}

// Request message for
// [ReservationService.QuoteCampaigns][google.ads.googleads.v24.services.ReservationService.QuoteCampaigns].
message QuoteCampaignsRequest {
  // Required. The ID of the customer making the request.
  string customer_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The operation to quote the campaigns.
  google.ads.googleads.v24.actions.QuoteCampaignsOperation operation = 2;
}

// Response message for
// [ReservationService.QuoteCampaigns][google.ads.googleads.v24.services.ReservationService.QuoteCampaigns].
message QuoteCampaignsResponse {
  // The result of the quote campaigns operation.
  google.ads.googleads.v24.actions.QuoteCampaignsResult result = 1;
}

// Request message for
// [ReservationService.BookCampaigns][google.ads.googleads.v24.services.ReservationService.BookCampaigns].
message BookCampaignsRequest {
  // Required. The ID of the customer making the request.
  string customer_id = 1 [(google.api.field_behavior) = REQUIRED];

  // The operation to book the campaigns.
  google.ads.googleads.v24.actions.BookCampaignsOperation operation = 2;
}

// Response message for
// [ReservationService.BookCampaigns][google.ads.googleads.v24.services.ReservationService.BookCampaigns].
message BookCampaignsResponse {
  // The result of the book campaigns operation.
  google.ads.googleads.v24.actions.BookCampaignsResult result = 1;
}
