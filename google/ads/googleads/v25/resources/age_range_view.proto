syntax = "proto3";

package google.ads.googleads.v25.resources;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";

option csharp_namespace = "Google.Ads.GoogleAds.V25.Resources";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v25/resources;resources";
option java_multiple_files = true;
option java_outer_classname = "AgeRangeViewProto";
option java_package = "com.google.ads.googleads.v25.resources";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V25\\Resources";
option ruby_package = "Google::Ads::GoogleAds::V25::Resources";

// Proto file describing the age range view resource.

// An age range view.
//
// Represents the view of a customer's performance metrics (like impressions
// and clicks) aggregated by age range. All statistics are aggregated at the
// ad group level.
//
// Note: While you can segment metrics by age range using `age_range_view` or by
// gender using `gender_view`, the Google Ads API does not support segmenting
// metrics by both age range and gender simultaneously in a single query.
// Analyzing performance across both dimensions combined is not supported in
// the Google Ads API.
message AgeRangeView {
  option (google.api.resource) = {
    type: "googleads.googleapis.com/AgeRangeView"
    pattern: "customers/{customer_id}/ageRangeViews/{ad_group_id}~{criterion_id}"
  };

  // Output only. The resource name of the age range view.
  // Age range view resource names have the form:
  //
  // `customers/{customer_id}/ageRangeViews/{ad_group_id}~{criterion_id}`
  string resource_name = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {
      type: "googleads.googleapis.com/AgeRangeView"
    }
  ];
}
