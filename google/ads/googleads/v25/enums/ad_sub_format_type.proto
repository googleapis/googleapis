syntax = "proto3";

package google.ads.googleads.v25.enums;

option csharp_namespace = "Google.Ads.GoogleAds.V25.Enums";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v25/enums;enums";
option java_multiple_files = true;
option java_outer_classname = "AdSubFormatTypeProto";
option java_package = "com.google.ads.googleads.v25.enums";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V25\\Enums";
option ruby_package = "Google::Ads::GoogleAds::V25::Enums";

// Proto file describing ad sub format types.

// Container for enumeration of Google Ads sub format types.
message AdSubFormatTypeEnum {
  // Enumerates Google Ads sub format types.
  enum AdSubFormatType {
    // Not specified.
    UNSPECIFIED = 0;

    // Unknown.
    UNKNOWN = 1;

    // Category for formats that are not further split into sub formats.
    UNSEGMENTED = 2;

    // Standard length non-skippable instream YouTube ad.
    INSTREAM_NON_SKIPPABLE_STANDARD = 3;

    // Non-skippable instream YouTube ad with a duration up to 30.99 seconds.
    INSTREAM_NON_SKIPPABLE_MAX30_SEC = 4;

    // Non-skippable instream YouTube ad with a duration between 31 and 60
    // seconds.
    INSTREAM_NON_SKIPPABLE_MAX60_SEC = 5;
  }
}
