syntax = "proto3";

package google.ads.googleads.v25.enums;

option csharp_namespace = "Google.Ads.GoogleAds.V25.Enums";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v25/enums;enums";
option java_multiple_files = true;
option java_outer_classname = "CustomerLifecycleOptimizationGoalSubTypeProto";
option java_package = "com.google.ads.googleads.v25.enums";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V25\\Enums";
option ruby_package = "Google::Ads::GoogleAds::V25::Enums";

// Container for enum describing customer lifecycle optimization goal sub types.
message CustomerLifecycleOptimizationGoalSubTypeEnum {
  // The possible sub types of customer lifecycle optimization goal.
  enum CustomerLifecycleOptimizationGoalSubType {
    // Not specified.
    UNSPECIFIED = 0;

    // Used for return value only. Represents value unknown in this version.
    UNKNOWN = 1;

    // New customer acquisition value.
    NEW_CUSTOMER_ACQUISITION_VALUE = 2;

    // New customer acquisition only.
    NEW_CUSTOMER_ACQUISITION_ONLY = 3;

    // Customer retention value.
    CUSTOMER_RETENTION_VALUE = 4;

    // Customer retention only.
    CUSTOMER_RETENTION_ONLY = 5;

    // Loyalty retention value.
    LOYALTY_RETENTION_VALUE = 7;

    // Loyalty retention benefits.
    LOYALTY_RETENTION_BENEFITS = 8;
  }
}
