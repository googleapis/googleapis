syntax = "proto3";

package google.ads.googleads.v25.enums;

option csharp_namespace = "Google.Ads.GoogleAds.V25.Enums";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v25/enums;enums";
option java_multiple_files = true;
option java_outer_classname = "OptimizeAssetsExperimentSubtypeProto";
option java_package = "com.google.ads.googleads.v25.enums";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V25\\Enums";
option ruby_package = "Google::Ads::GoogleAds::V25::Enums";

// Indicates the subtype of an optimize assets experiment.
message OptimizeAssetsExperimentSubtypeEnum {
  // The enum describing optimize assets subtype.
  enum OptimizeAssetsExperimentSubtype {
    // Not specified.
    UNSPECIFIED = 0;

    // The value is unknown in this version.
    UNKNOWN = 1;

    // The experiment is testing adding assets to
    // assetless retail PMax experiment.
    ADD_ASSETS_TO_ASSETLESS_RETAIL = 2;

    // The experiment is testing adding video assets to
    // videoless PMax experiment.
    ADD_VIDEO_ASSETS_TO_VIDEOLESS = 3;

    // The experiment is testing comparing two different sets
    // of assets in a PMax experiment.
    COMPARE_ASSETS = 4;
  }
}
