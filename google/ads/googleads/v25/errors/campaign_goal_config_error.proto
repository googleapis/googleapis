syntax = "proto3";

package google.ads.googleads.v25.errors;

option csharp_namespace = "Google.Ads.GoogleAds.V25.Errors";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v25/errors;errors";
option java_multiple_files = true;
option java_outer_classname = "CampaignGoalConfigErrorProto";
option java_package = "com.google.ads.googleads.v25.errors";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V25\\Errors";
option ruby_package = "Google::Ads::GoogleAds::V25::Errors";

// Proto file describing campaign goal config errors.

// Container for enum describing possible campaign goal config errors.
message CampaignGoalConfigErrorEnum {
  // Enum describing possible campaign goal config errors.
  enum CampaignGoalConfigError {
    // Enum unspecified.
    UNSPECIFIED = 0;

    // The received error code is not known in this version.
    UNKNOWN = 1;

    // Goal is either removed or does not exist for this account.
    GOAL_NOT_FOUND = 3;

    // Campaign is either removed or does not exist.
    CAMPAIGN_NOT_FOUND = 4;

    // If high lifetime value is present then value should be present.
    HIGH_LIFETIME_VALUE_PRESENT_BUT_VALUE_ABSENT = 9;

    // High lifetime value should be greater than value.
    HIGH_LIFETIME_VALUE_LESS_THAN_OR_EQUAL_TO_VALUE = 10;

    // When using customer lifecycle optimization goal, campaign type should be
    // supported.
    CUSTOMER_LIFECYCLE_OPTIMIZATION_CAMPAIGN_TYPE_NOT_SUPPORTED = 11;

    // Customer must be allowlisted to use retention only goal.
    CUSTOMER_NOT_ALLOWLISTED_FOR_RETENTION_ONLY = 12;

    // New customer acquisition customer lifecycle optimization goal targeting
    // only new customers should not have campaign override values set.
    CAMPAIGN_OVERRIDE_VALUES_SET_FOR_NEW_CUSTOMER_ACQUISITION_TARGET_SPECIFIC_OPTION =
        13;

    // New customer acquisition customer lifecycle optimization goal campaign
    // override high lifetime values should only be set for supported campaign
    // type.
    CAMPAIGN_OVERRIDE_HIGH_LIFETIME_VALUE_NOT_SUPPORTED_FOR_CAMPAIGN_TYPE = 14;

    // Error when the campaign is attempting to combine incompatible CLO goals.
    CANNOT_USE_INCOMPATIBLE_CLO_GOALS = 15;

    // At least one mode (either enabling bid adjustments or showing benefits in
    // PLA) must be enabled for loyalty retention goal.
    LOYALTY_RETENTION_GOAL_INVALID_MODE = 16;
  }
}
