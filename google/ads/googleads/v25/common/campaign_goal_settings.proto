syntax = "proto3";

package google.ads.googleads.v25.common;

import "google/ads/googleads/v25/common/goal_common.proto";
import "google/ads/googleads/v25/enums/customer_lifecycle_optimization_mode.proto";

option csharp_namespace = "Google.Ads.GoogleAds.V25.Common";
option go_package = "google.golang.org/genproto/googleapis/ads/googleads/v25/common;common";
option java_multiple_files = true;
option java_outer_classname = "CampaignGoalSettingsProto";
option java_package = "com.google.ads.googleads.v25.common";
option objc_class_prefix = "GAA";
option php_namespace = "Google\\Ads\\GoogleAds\\V25\\Common";
option ruby_package = "Google::Ads::GoogleAds::V25::Common";

// Proto file describing CampaignGoalSettings.

// Campaign Goal settings.
message CampaignGoalSettings {
  // Retention campaign goal settings.
  message CampaignRetentionGoalSettings {
    // Retention goal campaign specific value settings.
    CustomerLifecycleOptimizationValueSettings value_settings_override = 1;

    // Retention goal optimization mode for this campaign.
    //
    // Defaults to TARGET_ALL. Only customers on the allowlist can set
    // target_option.
    google.ads.googleads.v25.enums.CustomerLifecycleOptimizationModeEnum
        .CustomerLifecycleOptimizationMode target_option = 2;
  }

  // New Customer Acquisition campaign goal settings.
  message CampaignNewCustomerAcquisitionGoalSettings {
    // New Customer Acquisition goal campaign specific value settings.
    CustomerLifecycleOptimizationValueSettings value_settings_override = 1;

    // New Customer Acquisition goal optimization mode for this campaign.
    //
    // Defaults to TARGET_ALL. Whether the campaign is targeting new customers
    // only.
    google.ads.googleads.v25.enums.CustomerLifecycleOptimizationModeEnum
        .CustomerLifecycleOptimizationMode target_option = 2;
  }

  // Loyalty retention campaign goal settings.
  message CampaignLoyaltyRetentionGoalSettings {
    // Loyalty retention goal campaign specific value settings.
    CustomerLifecycleOptimizationValueSettings value_settings_override = 1;

    // Whether to adjust bids for loyalty members.
    bool enable_bid_adjustments_for_loyalty_members = 2;

    // Whether to show targeted loyalty member benefits in PLA format in
    // eligible countries.
    bool show_targeted_loyalty_member_benefits_in_pla = 3;
  }
}
