type: google.api.Service
config_version: 3
name: container.googleapis.com
title: Kubernetes Engine API

apis:
- name: google.container.v1.ClusterManager

types:
- name: google.container.v1.GetOpenIDConfigRequest
- name: google.container.v1.GetOpenIDConfigResponse
- name: google.container.v1.SecurityBulletinEvent
- name: google.container.v1.UpgradeAvailableEvent
- name: google.container.v1.UpgradeEvent
- name: google.container.v1.UpgradeInfoEvent

enums:
- name: google.container.v1.UpgradeResourceType

documentation:
  summary: |-
    Builds and manages container-based applications, powered by the open source
    Kubernetes technology.

authentication:
  rules:
  - selector: 'google.container.v1.ClusterManager.*'
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/container
  - selector: google.container.v1.ClusterManager.CheckAutopilotCompatibility
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/container,
        https://www.googleapis.com/auth/container.read-only
  - selector: google.container.v1.ClusterManager.FetchClusterUpgradeInfo
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/container,
        https://www.googleapis.com/auth/container.read-only
  - selector: google.container.v1.ClusterManager.FetchNodePoolUpgradeInfo
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/container,
        https://www.googleapis.com/auth/container.read-only
  - selector: google.container.v1.ClusterManager.GetCluster
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/container,
        https://www.googleapis.com/auth/container.read-only
  - selector: google.container.v1.ClusterManager.GetNodePool
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/container,
        https://www.googleapis.com/auth/container.read-only
  - selector: google.container.v1.ClusterManager.GetOperation
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/container,
        https://www.googleapis.com/auth/container.read-only
  - selector: google.container.v1.ClusterManager.GetServerConfig
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/container,
        https://www.googleapis.com/auth/container.read-only
  - selector: google.container.v1.ClusterManager.ListClusters
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/container,
        https://www.googleapis.com/auth/container.read-only
  - selector: google.container.v1.ClusterManager.ListNodePools
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/container,
        https://www.googleapis.com/auth/container.read-only
  - selector: google.container.v1.ClusterManager.ListOperations
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/container,
        https://www.googleapis.com/auth/container.read-only
  - selector: google.container.v1.ClusterManager.ListUsableSubnetworks
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/container,
        https://www.googleapis.com/auth/container.read-only

publishing:
  library_settings:
  - version: google.container.v1
    java_settings:
      library_package: com.google.cloud.container.v1
      common: {}
