type: google.api.Service
config_version: 3
name: agentidentitycredentials.googleapis.com
title: Agent Identity Credentials API

apis:
- name: google.cloud.agentidentitycredentials.v1beta.AuthProviderCredentialsService

documentation:
  summary: agentidentitycredentials.googleapis.com API.

authentication:
  rules:
  - selector: google.cloud.agentidentitycredentials.v1beta.AuthProviderCredentialsService.FinalizeCredentials
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform
  - selector: google.cloud.agentidentitycredentials.v1beta.AuthProviderCredentialsService.RetrieveCredentials
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform

publishing:
  new_issue_uri: https://issuetracker.google.com/issues/new?component=2084218
  documentation_uri: https://cloud.google.com/agentidentitycredentials/docs/overview
  api_short_name: agentidentitycredentials
  github_label: 'api: agentidentitycredentials'
  doc_tag_prefix: agentidentitycredentials
  organization: CLOUD
  library_settings:
  - version: google.cloud.agentidentitycredentials.v1beta
    launch_stage: BETA
    python_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
  proto_reference_documentation_uri: https://cloud.google.com/agentidentitycredentials/docs/reference/rpc
