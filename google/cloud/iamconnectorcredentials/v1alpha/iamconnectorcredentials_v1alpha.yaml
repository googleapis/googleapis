type: google.api.Service
config_version: 3
name: iamconnectorcredentials.googleapis.com
title: iamconnectorcredentials.googleapis.com API

apis:
- name: google.cloud.iamconnectorcredentials.v1alpha.IAMConnectorCredentialsService

documentation:
  summary: iamconnectorcredentials.googleapis.com API.

authentication:
  rules:
  - selector: google.cloud.iamconnectorcredentials.v1alpha.IAMConnectorCredentialsService.FinalizeCredentials
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform
  - selector: google.cloud.iamconnectorcredentials.v1alpha.IAMConnectorCredentialsService.RetrieveCredentials
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform

publishing:
  new_issue_uri: https://issuetracker.google.com/issues/new?component=190865&template=1161103
  documentation_uri: https://cloud.google.com/iamconnectorcredentials/docs/overview
  api_short_name: iamconnectorcredentials
  github_label: 'api: iamconnectorcredentials'
  doc_tag_prefix: iamconnectorcredentials
  organization: CLOUD
  library_settings:
  - version: google.cloud.iamconnectorcredentials.v1alpha
    launch_stage: ALPHA
    python_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
  proto_reference_documentation_uri: https://cloud.google.com/iamconnectorcredentials/docs/reference/rpc
