type: google.api.Service
config_version: 3
name: agentidentity.googleapis.com
title: Agent Identity API

apis:
- name: google.cloud.agentidentity.v1.AuthProviderService
- name: google.cloud.location.Locations
- name: google.iam.v1.IAMPolicy

documentation:
  rules:
  - selector: google.cloud.location.Locations.GetLocation
    description: Gets information about a location.

  - selector: google.cloud.location.Locations.ListLocations
    description: |-
      Lists information about the supported locations for this service.

      This method lists locations based on the resource scope provided in
      the [ListLocationsRequest.name][google.cloud.location.ListLocationsRequest.name] field: *
      **Global locations**: If `name` is empty, the method lists the
      public locations available to all projects. * **Project-specific
      locations**: If `name` follows the format
      `projects/{project}`, the method lists locations visible to that
      specific project. This includes public, private, or other
      project-specific locations enabled for the project.

      For gRPC and client library implementations, the resource name is
      passed as the `name` field. For direct service calls, the resource
      name is
      incorporated into the request path based on the specific service
      implementation and version.

  - selector: google.iam.v1.IAMPolicy.GetIamPolicy
    description: |-
      Gets the access control policy for a resource. Returns an empty policy
      if the resource exists and does not have a policy set.

  - selector: google.iam.v1.IAMPolicy.SetIamPolicy
    description: |-
      Sets the access control policy on the specified resource. Replaces
      any existing policy.

      Can return `NOT_FOUND`, `INVALID_ARGUMENT`, and `PERMISSION_DENIED`
      errors.

  - selector: google.iam.v1.IAMPolicy.TestIamPermissions
    description: |-
      Returns permissions that a caller has on the specified resource. If the
      resource does not exist, this will return an empty set of
      permissions, not a `NOT_FOUND` error.

      Note: This operation is designed to be used for building
      permission-aware UIs and command-line tools, not for authorization
      checking. This operation may "fail open" without warning.

http:
  rules:
  - selector: google.cloud.location.Locations.GetLocation
    get: '/v1/{name=projects/*/locations/*}'
  - selector: google.cloud.location.Locations.ListLocations
    get: '/v1/{name=projects/*}/locations'
  - selector: google.iam.v1.IAMPolicy.GetIamPolicy
    get: '/v1/{resource=projects/*/locations/*/authProviders/*}:getIamPolicy'
  - selector: google.iam.v1.IAMPolicy.SetIamPolicy
    post: '/v1/{resource=projects/*/locations/*/authProviders/*}:setIamPolicy'
    body: '*'
  - selector: google.iam.v1.IAMPolicy.TestIamPermissions
    post: '/v1/{resource=projects/*/locations/*/authProviders/*}:testIamPermissions'
    body: '*'

authentication:
  rules:
  - selector: 'google.cloud.agentidentity.v1.AuthProviderService.*'
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform
  - selector: google.cloud.location.Locations.GetLocation
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform
  - selector: google.cloud.location.Locations.ListLocations
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform
  - selector: 'google.iam.v1.IAMPolicy.*'
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform

publishing:
  new_issue_uri: https://issuetracker.google.com/issues/new?component=961386
  documentation_uri: https://cloud.google.com/agentidentity/docs/overview
  api_short_name: agentidentity
  github_label: 'api: agentidentity'
  doc_tag_prefix: agentidentity
  organization: CLOUD
  library_settings:
  - version: google.cloud.agentidentity.v1
    launch_stage: GA
    java_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    cpp_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    python_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    node_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    go_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
  proto_reference_documentation_uri: https://cloud.google.com/agentidentity/docs/reference/rpc
