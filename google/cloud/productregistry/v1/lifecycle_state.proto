syntax = "proto3";

package google.cloud.productregistry.v1;

option csharp_namespace = "Google.Cloud.ProductRegistry.V1";
option go_package = "cloud.google.com/go/productregistry/apiv1/productregistrypb;productregistrypb";
option java_multiple_files = true;
option java_outer_classname = "LifecycleStateProto";
option java_package = "com.google.cloud.productregistry.v1";
option php_namespace = "Google\\Cloud\\ProductRegistry\\V1";
option ruby_package = "Google::Cloud::ProductRegistry::V1";

// Enum representing the lifecycle state of the underlying entity.
enum LifecycleState {
  // The default value. This value is used if the lifecycle state is not set.
  LIFECYCLE_STATE_UNSPECIFIED = 0;

  // The entity is in Public Preview. It is available to all
  // customers, but may not be feature-complete or have full support guarantees.
  LIFECYCLE_STATE_PUBLIC_PREVIEW = 1;

  // The entity is in Private General Availability. It is fully
  // supported and stable, but only available to a select group of customers.
  LIFECYCLE_STATE_PRIVATE_GA = 2;

  // The entity is Generally Available. It is fully supported, stable, and
  // available to all customers.
  LIFECYCLE_STATE_GA = 3;

  // The entity is deprecated. It is no longer recommended for use
  // and may be removed in a future version.
  LIFECYCLE_STATE_DEPRECATED = 4;
}
