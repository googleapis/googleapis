type: google.api.Service
config_version: 3
name: vectorsearch.googleapis.com
title: Vector Search API

apis:
- name: google.cloud.location.Locations
- name: google.cloud.vectorsearch.v1.DataObjectSearchService
- name: google.cloud.vectorsearch.v1.DataObjectService
- name: google.cloud.vectorsearch.v1.VectorSearchService
- name: google.longrunning.Operations

types:
- name: google.cloud.vectorsearch.v1.OperationMetadata

documentation:
  summary: |-
    The Vector Search API provides a fully-managed, highly performant, and
    scalable vector database designed to power next-generation search,
    recommendation, and generative AI applications. It allows you to store,
    index, and query your data and its corresponding vector embeddings through
    a simple, intuitive interface. With Vector Search, you can define custom
    schemas for your data, insert objects with associated metadata,
    automatically generate embeddings from your data, and perform fast
    approximate nearest neighbor (ANN) searches to find semantically similar
    items at scale.
  rules:
  - selector: google.cloud.location.Locations.GetLocation
    description: Gets information about a location.

  - selector: google.cloud.location.Locations.ListLocations
    description: |-
      Lists information about the supported locations for this service.

      This method lists locations based on the resource scope provided in
      the [ListLocationsRequest.name] field:

      * **Global locations**: If `name` is empty, the method lists the
      public locations available to all projects. * **Project-specific
      locations**: If `name` follows the format
      `projects/{project}`, the method lists locations visible to that
      specific project. This includes public, private, or other
      project-specific locations enabled for the project.

      For gRPC and client library implementations, the resource name is
      passed as the `name` field. For direct service calls, the resource
      name is
      incorporated into the request path based on the specific service
      implementation and version.

http:
  rules:
  - selector: google.cloud.location.Locations.GetLocation
    get: '/v1/{name=projects/*/locations/*}'
  - selector: google.cloud.location.Locations.ListLocations
    get: '/v1/{name=projects/*}/locations'
  - selector: google.longrunning.Operations.CancelOperation
    post: '/v1/{name=projects/*/locations/*/operations/*}:cancel'
    body: '*'
  - selector: google.longrunning.Operations.DeleteOperation
    delete: '/v1/{name=projects/*/locations/*/operations/*}'
  - selector: google.longrunning.Operations.GetOperation
    get: '/v1/{name=projects/*/locations/*/operations/*}'
  - selector: google.longrunning.Operations.ListOperations
    get: '/v1/{name=projects/*/locations/*}/operations'

authentication:
  rules:
  - selector: google.cloud.location.Locations.GetLocation
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform
  - selector: google.cloud.location.Locations.ListLocations
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform
  - selector: 'google.cloud.vectorsearch.v1.DataObjectSearchService.*'
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform
  - selector: 'google.cloud.vectorsearch.v1.DataObjectService.*'
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform
  - selector: 'google.cloud.vectorsearch.v1.VectorSearchService.*'
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform
  - selector: 'google.longrunning.Operations.*'
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform

publishing:
  new_issue_uri: https://issuetracker.google.com/issues/new?component=1899904
  documentation_uri: https://docs.cloud.google.com/vertex-ai/docs/vector-search-2/overview
  api_short_name: vectorsearch
  github_label: 'api: vectorsearch'
  doc_tag_prefix: vectorsearch
  organization: CLOUD
  library_settings:
  - version: google.cloud.vectorsearch.v1
    launch_stage: GA
    java_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    cpp_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    php_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    python_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    node_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    dotnet_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    ruby_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    go_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
