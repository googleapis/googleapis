syntax = "proto3";

package google.cloud.discoveryengine.v1beta;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/cloud/discoveryengine/v1beta/user_store.proto";
import "google/protobuf/field_mask.proto";

option csharp_namespace = "Google.Cloud.DiscoveryEngine.V1Beta";
option go_package = "cloud.google.com/go/discoveryengine/apiv1beta/discoveryenginepb;discoveryenginepb";
option java_multiple_files = true;
option java_outer_classname = "UserStoreServiceProto";
option java_package = "com.google.cloud.discoveryengine.v1beta";
option objc_class_prefix = "DISCOVERYENGINE";
option php_namespace = "Google\\Cloud\\DiscoveryEngine\\V1beta";
option ruby_package = "Google::Cloud::DiscoveryEngine::V1beta";

// Service for managing User Stores.
service UserStoreService {
  option (google.api.default_host) = "discoveryengine.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/cloud-platform,"
      "https://www.googleapis.com/auth/discoveryengine.readwrite,"
      "https://www.googleapis.com/auth/discoveryengine.serving.readwrite";

  // Gets the User Store.
  rpc GetUserStore(GetUserStoreRequest) returns (UserStore) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/userStores/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Updates the User Store.
  rpc UpdateUserStore(UpdateUserStoreRequest) returns (UserStore) {
    option (google.api.http) = {
      patch: "/v1beta/{user_store.name=projects/*/locations/*/userStores/*}"
      body: "user_store"
    };
    option (google.api.method_signature) = "user_store,update_mask";
  }
}

// Request message for
// [UserStoreService.GetUserStore][google.cloud.discoveryengine.v1beta.UserStoreService.GetUserStore]
message GetUserStoreRequest {
  // Required. The name of the User Store to get.
  // Format:
  // `projects/{project}/locations/{location}/userStores/{user_store_id}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "discoveryengine.googleapis.com/UserStore"
    }
  ];
}

// Request message for
// [UserStoreService.UpdateUserStore][google.cloud.discoveryengine.v1beta.UserStoreService.UpdateUserStore]
// method.
message UpdateUserStoreRequest {
  // Required. The User Store to update.
  // Format:
  // `projects/{project}/locations/{location}/userStores/{user_store_id}`
  UserStore user_store = 1 [(google.api.field_behavior) = REQUIRED];

  // Optional. The list of fields to update.
  google.protobuf.FieldMask update_mask = 2
      [(google.api.field_behavior) = OPTIONAL];
}
