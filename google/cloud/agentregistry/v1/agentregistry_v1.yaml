type: google.api.Service
config_version: 3
name: agentregistry.googleapis.com
title: Agent Registry API

apis:
- name: google.cloud.agentregistry.v1.AgentRegistry
- name: google.cloud.location.Locations
- name: google.longrunning.Operations

types:
- name: google.cloud.agentregistry.v1.OperationMetadata

documentation:
  summary: |-
    Agent Registry is a centralized, unified catalog that lets you store,
    discover, and govern Model Context Protocol (MCP) servers, tools, and AI
    agents within Google Cloud.
  overview: |-
    Agent Registry provides the core infrastructure for your environment,
    bringing together autonomous agents with the consistent data contexts and
    tools that MCP servers offer. By consolidating these services, Agent
    Registry resolves common challenges in complex AI deployments, such as
    fragmented tool access, isolated data, and redundant services.
  rules:
  - selector: google.cloud.location.Locations.GetLocation
    description: Gets information about a location.

  - selector: google.cloud.location.Locations.ListLocations
    description: |-
      Lists information about the supported locations for this service.

      This method lists locations based on the resource scope provided in
      the [ListLocationsRequest.name][google.cloud.location.ListLocationsRequest.name] field: *
      **Global locations**: If `name` is empty, the method lists the
      public locations available to all projects. * **Project-specific
      locations**: If `name` follows the format
      `projects/{project}`, the method lists locations visible to that
      specific project. This includes public, private, or other
      project-specific locations enabled for the project.

      For gRPC and client library implementations, the resource name is
      passed as the `name` field. For direct service calls, the resource
      name is
      incorporated into the request path based on the specific service
      implementation and version.

http:
  rules:
  - selector: google.cloud.location.Locations.GetLocation
    get: '/v1/{name=projects/*/locations/*}'
  - selector: google.cloud.location.Locations.ListLocations
    get: '/v1/{name=projects/*}/locations'
  - selector: google.longrunning.Operations.CancelOperation
    post: '/v1/{name=projects/*/locations/*/operations/*}:cancel'
    body: '*'
  - selector: google.longrunning.Operations.DeleteOperation
    delete: '/v1/{name=projects/*/locations/*/operations/*}'
  - selector: google.longrunning.Operations.GetOperation
    get: '/v1/{name=projects/*/locations/*/operations/*}'
  - selector: google.longrunning.Operations.ListOperations
    get: '/v1/{name=projects/*/locations/*}/operations'

authentication:
  rules:
  - selector: 'google.cloud.agentregistry.v1.AgentRegistry.*'
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/agentregistry.read-only,
        https://www.googleapis.com/auth/agentregistry.read-write,
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/cloud-platform.read-only
  - selector: google.cloud.location.Locations.GetLocation
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/agentregistry.read-write,
        https://www.googleapis.com/auth/cloud-platform
  - selector: google.cloud.location.Locations.ListLocations
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/agentregistry.read-write,
        https://www.googleapis.com/auth/cloud-platform
  - selector: 'google.longrunning.Operations.*'
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/agentregistry.read-write,
        https://www.googleapis.com/auth/cloud-platform
  - selector: google.longrunning.Operations.GetOperation
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/agentregistry.read-only,
        https://www.googleapis.com/auth/agentregistry.read-write,
        https://www.googleapis.com/auth/cloud-platform,
        https://www.googleapis.com/auth/cloud-platform.read-only

publishing:
  new_issue_uri: https://issuetracker.google.com/issues/new?component=1992739
  documentation_uri: https://docs.cloud.google.com/agent-registry/overview
  api_short_name: agentregistry
  github_label: 'api: agentregistry'
  doc_tag_prefix: agentregistry
  organization: CLOUD
  library_settings:
  - version: google.cloud.agentregistry.v1
    launch_stage: GA
    java_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    cpp_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    php_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    python_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    node_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    dotnet_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    ruby_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    go_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
  proto_reference_documentation_uri: https://docs.cloud.google.com/agent-registry/reference/rpc
