type: google.api.Service
config_version: 3
name: commerceproducer.googleapis.com
title: Cloud Commerce Producer API

apis:
- name: google.cloud.commerceproducer.v1beta.CommerceTransaction
- name: google.cloud.location.Locations
- name: google.longrunning.Operations

documentation:
  summary: Partner API for the Cloud Commerce Producer API Early Access.
  overview: |-
    Using this API, partners can:

    *   Manage private offers extended to specific customer billing accounts.
    *   Attach documents to private offers, such as custom EULAs or Statements
    of Work. *   Publish private offers to make them available to customers.

    # Data Model

    The following resources are exposed by this API:

    *   **Service**: Represents a service offered by a partner on Google Cloud
    Marketplace. *   **StandardOffer**: Represents a standard offer for a
    product, which can be used as a base for private offers. *
    **PrivateOffer**: Represents a customized offer extended to a specific
    customer billing account. *   **PrivateOfferDocument**: Represents a
    document attached to a private offer. *   **SkuGroup**: Represents a group
    of SKUs (Stock Keeping Units) used for pricing or commitment. *   **Sku**:
    Represents a SKU (Stock Keeping Unit) used for pricing or commitment.
  rules:
  - selector: google.cloud.location.Locations.GetLocation
    description: Gets information about a location.

  - selector: google.cloud.location.Locations.ListLocations
    description: |-
      Lists information about the supported locations for this service.

      This method lists locations based on the resource scope provided in
      the [ListLocationsRequest.name][google.cloud.location.ListLocationsRequest.name] field: *
      **Global locations**: If `name` is empty, the method lists the
      public locations available to all projects. * **Project-specific
      locations**: If `name` follows the format
      `projects/{project}`, the method lists locations visible to that
      specific project. This includes public, private, or other
      project-specific locations enabled for the project.

      For gRPC and client library implementations, the resource name is
      passed as the `name` field. For direct service calls, the resource
      name is
      incorporated into the request path based on the specific service
      implementation and version.

http:
  rules:
  - selector: google.cloud.location.Locations.GetLocation
    get: '/v1beta/{name=projects/*/locations/*}'
  - selector: google.cloud.location.Locations.ListLocations
    get: '/v1beta/{name=projects/*}/locations'
  - selector: google.longrunning.Operations.CancelOperation
    post: '/v1beta/{name=projects/*/locations/*/operations/*}:cancel'
    body: '*'
  - selector: google.longrunning.Operations.DeleteOperation
    delete: '/v1beta/{name=projects/*/locations/*/operations/*}'
  - selector: google.longrunning.Operations.GetOperation
    get: '/v1beta/{name=projects/*/locations/*/operations/*}'
  - selector: google.longrunning.Operations.ListOperations
    get: '/v1beta/{name=projects/*/locations/*}/operations'

authentication:
  rules:
  - selector: 'google.cloud.commerceproducer.v1beta.CommerceTransaction.*'
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform
  - selector: google.cloud.location.Locations.GetLocation
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform
  - selector: google.cloud.location.Locations.ListLocations
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform
  - selector: 'google.longrunning.Operations.*'
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform

publishing:
  new_issue_uri: https://issuetracker.google.com/issues/new?component=2163857&template=2342151
  documentation_uri: https://docs.cloud.google.com/marketplace/docs/partners/commerce-producer-api/reference
  api_short_name: commerceproducer
  github_label: 'api: commerceproducer'
  doc_tag_prefix: commerceproducer
  organization: CLOUD
  library_settings:
  - version: google.cloud.commerceproducer.v1beta
    launch_stage: BETA
    java_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    python_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    node_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    ruby_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    go_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
  proto_reference_documentation_uri: https://docs.cloud.google.com/marketplace/docs/partners/commerce-producer-api/reference
