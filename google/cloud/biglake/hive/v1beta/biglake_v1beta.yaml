type: google.api.Service
config_version: 3
name: biglake.googleapis.com
title: Lakehouse API

apis:
- name: google.cloud.biglake.hive.v1beta.HiveMetastoreService

documentation:
  summary: |-
    The Lakehouse API (formerly BigLake API) provides access to a serverless,
    fully managed, and highly available metastore that provides a single
    source of truth for your data lakehouse. It lets multiple
    engines—including Apache Spark, Google Managed Spark, Apache Flink, Trino
    and BigQuery—share tables and metadata for key open formats (Apache
    Iceberg, Apache Hive), and query the same copy of data. Plus, through the
    Lakehouse runtime catalog federation seamlessly unite your lakehouse
    ecosystem, letting Iceberg compatible engines on Google Cloud (BigQuery,
    Google Managed Spark) discover and analyze enterprise data across
    Snowflake, Databricks, and AWS Glue.

authentication:
  rules:
  - selector: 'google.cloud.biglake.hive.v1beta.HiveMetastoreService.*'
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/bigquery,
        https://www.googleapis.com/auth/cloud-platform

publishing:
  new_issue_uri: https://issuetracker.google.com/issues/new?component=187149&template=1019829
  documentation_uri: https://cloud.google.com/bigquery/docs/iceberg-tables#create-using-biglake-metastore
  api_short_name: biglake
  github_label: 'api: biglake'
  doc_tag_prefix: biglake
  organization: CLOUD
  library_settings:
  - version: google.cloud.biglake.hive.v1beta
    launch_stage: BETA
    java_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    cpp_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    python_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    go_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
