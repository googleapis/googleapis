  // Gets a RagMetadata.
  rpc GetRagMetadata(GetRagMetadataRequest) returns (RagMetadata) {
    option (google.api.http) = {
      get: "/v1beta1/{name=projects/*/locations/*/ragCorpora/*/ragFiles/*/ragMetadata/*}"
