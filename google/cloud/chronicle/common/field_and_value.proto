syntax = "proto3";

package google.cloud.chronicle.common;

import "google/api/field_behavior.proto";

option csharp_namespace = "Google.Cloud.Chronicle.Common";
option go_package = "cloud.google.com/go/chronicle/common/commonpb;commonpb";
option java_multiple_files = true;
option java_outer_classname = "FieldAndValueProto";
option java_package = "google.cloud.chronicle.common";
option php_namespace = "Google\\Cloud\\Chronicle\\Common";
option ruby_package = "Google::Cloud::Chronicle::Common";

// Indicator value with field path to identity an entity.
message FieldAndValue {
  // Value type of the entity.
  enum ValueType {
    // Unspecified.
    VALUE_TYPE_UNSPECIFIED = 0;

    // Asset ip address.
    ASSET_IP_ADDRESS = 100;

    // Asset mac address.
    MAC = 101;

    // Asset hostname.
    HOSTNAME = 102;

    // Asset product id. Product specific ID for EDR/HIDS/AV products, etc.
    PRODUCT_SPECIFIC_ID = 103;

    // Domain name.
    DOMAIN_NAME = 200;

    // Resolved ip address.
    RESOLVED_IP_ADDRESS = 201;

    // EDR process id.
    PROCESS_ID = 300;

    // File full command line.
    FULL_COMMAND_LINE = 301;

    // File name.
    FILE_NAME = 302;

    // File path.
    FILE_PATH = 303;

    // Hash md5.
    HASH_MD5 = 304;

    // Hash sha256.
    HASH_SHA256 = 305;

    // Hash sha1.
    HASH_SHA1 = 306;

    // Operating system process id.
    RAW_PID = 307;

    // Process id for the parent that spawned a process.
    PARENT_PROCESS_ID = 308;

    // User email.
    EMAIL = 400;

    // User username.
    USERNAME = 401;

    // User windows sid.
    WINDOWS_SID = 402;

    // User employee id.
    EMPLOYEE_ID = 403;

    // User product object id. Product specific object ID for LDAP-like systems.
    PRODUCT_OBJECT_ID = 404;

    // Cloud resource name.
    CLOUD_RESOURCE_NAME = 500;

    // Resource product object id.
    RESOURCE_PRODUCT_OBJECT_ID = 501;
  }

  // Required. Indicator value that is used to identify or find the entity.
  string value = 1 [(google.api.field_behavior) = REQUIRED];

  oneof type {
    // A UDM field path which identifies the type of the indicator to be used
    // to find the entity.
    // This path is not used exclusively to "search" for the entity, but rather
    // to identify the type of indicator, which can be inferred from the path.
    string field_path = 2;

    // An explicit type of the indicator to be used to find the entity.
    ValueType value_type = 4;
  }

  // Optional. Entity namespace.
  // Namespace is only applicable to asset entities.
  string entity_namespace = 3 [(google.api.field_behavior) = OPTIONAL];
}
