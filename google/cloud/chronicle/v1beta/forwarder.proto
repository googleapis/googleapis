syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "ForwarderProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";

// Forwarder Service exposes APIs to create and manage Chronicle forwarders.
service ForwarderService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // Create a forwarder.
  rpc CreateForwarder(CreateForwarderRequest) returns (Forwarder) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/instances/*}/forwarders"
      body: "forwarder"
    };
    option (google.api.method_signature) = "parent,forwarder";
  }

  // Get a forwarder by forwarder ID.
  rpc GetForwarder(GetForwarderRequest) returns (Forwarder) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/forwarders/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // List all forwarders for the instance.
  rpc ListForwarders(ListForwardersRequest) returns (ListForwardersResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/forwarders"
    };
    option (google.api.method_signature) = "parent";
  }

  // Update a forwarder.
  rpc UpdateForwarder(UpdateForwarderRequest) returns (Forwarder) {
    option (google.api.http) = {
      patch: "/v1beta/{forwarder.name=projects/*/locations/*/instances/*/forwarders/*}"
      body: "forwarder"
    };
    option (google.api.method_signature) = "forwarder,update_mask";
  }

  // Delete a forwarder by forwarder ID.
  rpc DeleteForwarder(DeleteForwarderRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1beta/{name=projects/*/locations/*/instances/*/forwarders/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Generates a forwarder's configuration files.
  rpc GenerateForwarderFiles(GenerateForwarderFilesRequest)
      returns (GenerateForwarderFilesResponse) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/forwarders/*}:generateForwarderFiles"
    };
    option (google.api.method_signature) = "name";
  }

  // Create a collector.
  rpc CreateCollector(CreateCollectorRequest) returns (Collector) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/instances/*/forwarders/*}/collectors"
      body: "collector"
    };
    option (google.api.method_signature) = "parent,collector";
  }

  // Get a collector by collector ID.
  rpc GetCollector(GetCollectorRequest) returns (Collector) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/forwarders/*/collectors/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // List all collectors for the forwarder.
  rpc ListCollectors(ListCollectorsRequest) returns (ListCollectorsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*/forwarders/*}/collectors"
    };
    option (google.api.method_signature) = "parent";
  }

  // Update a collector.
  rpc UpdateCollector(UpdateCollectorRequest) returns (Collector) {
    option (google.api.http) = {
      patch: "/v1beta/{collector.name=projects/*/locations/*/instances/*/forwarders/*/collectors/*}"
      body: "collector"
    };
    option (google.api.method_signature) = "collector,update_mask";
  }

  // Delete a collector by collector ID.
  rpc DeleteCollector(DeleteCollectorRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1beta/{name=projects/*/locations/*/instances/*/forwarders/*/collectors/*}"
    };
    option (google.api.method_signature) = "name";
  }
}

// CreateForwarder request message.
message CreateForwarderRequest {
  // Required. The parent resource where this Forwarder will be created.
  // Format: projects/{project}/locations/{location}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/Forwarder"
    }
  ];

  // Required. Forwarder to create.
  Forwarder forwarder = 2 [(google.api.field_behavior) = REQUIRED];
}

// GetForwarder request message.
message GetForwarderRequest {
  // Required. The ID of the forwarder to retrieve.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/forwarders/{forwarder}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Forwarder"
    }
  ];
}

// ListForwarders request message.
message ListForwardersRequest {
  // Required. The parent resource where the Forwarder is located.
  // Format: projects/{project}/locations/{location}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/Forwarder"
    }
  ];

  // The maximum number of forwarders to return, though the service may return
  // fewer than this value.
  // If unspecified, at most 50 forwarders will be returned.
  // The maximum value is 1000; values above 1000 will be coerced to 1000.
  int32 page_size = 2;

  // A page token, received from a previous `ListForwarders` call. Provide this
  // to retrieve the subsequent page.
  string page_token = 3;
}

// ListForwarders response message.
message ListForwardersResponse {
  // List of forwarders.
  repeated Forwarder forwarders = 1;

  // A token, which can be sent as `page_token` to retrieve the next page. If
  // this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// UpdateForwarder request message.
message UpdateForwarderRequest {
  // Required. Forwarder to update.
  Forwarder forwarder = 1 [(google.api.field_behavior) = REQUIRED];

  // Required. Specifies which forwarder fields to update.
  google.protobuf.FieldMask update_mask = 2
      [(google.api.field_behavior) = REQUIRED];
}

// DeleteForwarder request message.
message DeleteForwarderRequest {
  // Required. The ID of the forwarder to retrieve.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/forwarders/{forwarder}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Forwarder"
    }
  ];
}

// GenerateForwarderFiles request message.
message GenerateForwarderFilesRequest {
  // Required. The ID of the forwarder.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/forwarders/{forwarder}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Forwarder"
    }
  ];
}

// GenerateForwarderFiles response message.
message GenerateForwarderFilesResponse {
  // Contents of file used by Forwarder containing config-related settings.
  string config = 1;

  // Contents of file used by Forwarder containing API credential(s).
  string auth = 2;
}

// CreateCollector request message.
message CreateCollectorRequest {
  // Required. The parent resource where the Collector will be created.
  // // Format:
  // projects/{project}/locations/{location}/instances/{instance}/forwarders/{forwarder}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/Collector"
    }
  ];

  // Required. Collector to create.
  Collector collector = 2 [(google.api.field_behavior) = REQUIRED];
}

// GetCollector request message.
message GetCollectorRequest {
  // Required. The ID of the collector to retrieve.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/forwarders/{forwarder}/collectors/{collector}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Collector"
    }
  ];
}

// ListCollectors request message.
message ListCollectorsRequest {
  // Required. The parent resource where the Collector is located.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/forwarders/{forwarder}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/Collector"
    }
  ];

  // The maximum number of collectors to return, though the service may return
  // fewer than this value.
  // If unspecified, at most 50 collectors will be returned.
  // The maximum value is 1000; values above 1000 will be coerced to 1000.
  int32 page_size = 2;

  // A page token, received from a previous `ListCollectors` call. Provide this
  // to retrieve the subsequent page.
  string page_token = 3;
}

// ListCollectors response message.
message ListCollectorsResponse {
  // List of collectors.
  repeated Collector collectors = 1;

  // A token, which can be sent as `page_token` to retrieve the next page. If
  // this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// UpdateCollector request message.
message UpdateCollectorRequest {
  // Required. Collector to update.
  Collector collector = 1 [(google.api.field_behavior) = REQUIRED];

  // Required. Specifies which collector fields to update.
  google.protobuf.FieldMask update_mask = 2
      [(google.api.field_behavior) = REQUIRED];
}

// DeleteCollector request message.
message DeleteCollectorRequest {
  // Required. The ID of the collector to retrieve.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/forwarders/{forwarder}/collectors/{collector}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Collector"
    }
  ];
}

// Forwarder which sends data via Ingestion API.
message Forwarder {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/Forwarder"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/forwarders/{forwarder}"
  };

  // Life-Cycle States of a Forwarder.
  enum State {
    // The default value. This value is used if the state is omitted.
    STATE_UNSPECIFIED = 0;

    // Forwarder is allowed to upload data.
    ACTIVE = 1;

    // Forwarder is not allowed to upload data.
    SUSPENDED = 2;
  }

  // Immutable. The resource ID of the Forwarder.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/forwarders/{forwarder}
  string name = 1 [
    (google.api.field_behavior) = IMMUTABLE,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Forwarder"
    }
  ];

  // User-specified forwarder name.
  string display_name = 2;

  // Forwarder configuration settings.
  ForwarderConfig config = 3;

  // Output only. Current state of a Forwarder.
  State state = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the Forwarder is created
  google.protobuf.Timestamp create_time = 5
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the Forwarder is updated
  google.protobuf.Timestamp update_time = 6
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// ForwarderConfig contains fields which manage the configuration of a given
// Forwarder. Some settings, such as Metadata and Regex Filters, can interact
// with individual Collector configurations.
message ForwarderConfig {
  // Determines if uploaded data will be compressed.
  bool upload_compression = 1;

  // Metadata applied at the Forwarder level. This can be used in conjunction
  // with, or be overridden by, Metadata applied at the Collector level. Refer
  // to each Metadata field for further information.
  ForwarderMetadata metadata = 2;

  // RegexFilters applied at the Forwarder level, which can be overridden by
  // filters defined at the Collector level.
  repeated RegexFilter regex_filters = 3;

  // Server settings for load balancing and high availability config.
  ServerSettings server_settings = 4;
}

// ForwarderMetadata can be applied at the Forwarder or Collector level.
message ForwarderMetadata {
  // Namespace is specified at the Forwarder and/or Collector level. If a
  // namespace is provided for both, the Collector's namespace takes precedence.
  string asset_namespace = 1;

  // Arbitrary labels specified at the Forwarder and/or Collector level. If
  // both are provided, the labels are merged and the Collector's keys take
  // precedence over if the keys overlap.
  map<string, string> labels = 2;
}

// RegexFilters can be applied at the Forwarder and/or Collector level. Filters
// defined at both levels are merged, and the Collector's filters take
// precedence if there are conflicting descriptions.
message RegexFilter {
  // Filter Behaviors
  enum Behavior {
    // Attempting to set this default value will result in a validation error.
    BEHAVIOR_UNSPECIFIED = 0;

    // Allow the filtered line to be uploaded.
    ALLOW = 1;

    // Block the filtered line from being uploaded.
    BLOCK = 2;
  }

  // Describes what is being filtered and why.
  string description = 1;

  // The regular expression used to match against each incoming line.
  string regexp = 2;

  // Filter behavior to apply when a match is found.
  Behavior behavior = 3;
}

// Collectors detail the configuration for a specific data type.
message Collector {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/Collector"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/forwarders/{forwarder}/collectors/{collector}"
  };

  // States of a collector.
  enum State {
    // The default value. This value is used if the state is omitted.
    STATE_UNSPECIFIED = 0;

    // Collector is allowed to accept data.
    ACTIVE = 1;

    // Collector is not allowed to accept data.
    SUSPENDED = 2;
  }

  // Collector type.
  enum Type {
    // Default/Unset value.
    TYPE_UNSPECIFIED = 0;

    // File input.
    FILE = 1;

    // Kafka input.
    KAFKA = 2;

    // Pcap input.
    PCAP = 3;

    // Splunk input.
    SPLUNK = 4;

    // Webproxy input.
    WEBPROXY = 5;

    // Syslog input.
    SYSLOG = 6;
  }

  // Immutable. The resource ID of the Collector.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/forwarders/{forwarder}/collectors/{collector}
  string name = 1 [
    (google.api.field_behavior) = IMMUTABLE,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Collector"
    }
  ];

  // User-specified collector name.
  string display_name = 2;

  // Collector configuration settings.
  CollectorConfig config = 3;

  // Output only. State of the collector.
  State state = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Type of the collector.
  Type type = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Indicates if the timezone should be overridden, this field will
  // be used for self serve timezone override functionality and the logic is
  // handled in the RPC's
  bool override_timezone = 6 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The timezone to override.this field will be used for self serve
  // timezone override functionality and the logic is handled in the RPC's ,We
  // can't add audit for this file as it is location field and we can't add
  // audit for location fields.
  string time_zone = 7 [(google.api.field_behavior) = OPTIONAL];
}

// CollectorConfig.
// Default configuration values will be applied during resource creation for the
// following fields when they are missing or zero-valued:
// - max_seconds_per_batch
// - max_bytes_per_batch
message CollectorConfig {
  // Ingestion settings of the collector.
  oneof settings {
    // File settings.
    FileSettings file_settings = 7;

    // Kafka settings.
    KafkaSettings kafka_settings = 8;

    // PCAP settings.
    PcapSettings pcap_settings = 9;

    // Splunk settings.
    SplunkSettings splunk_settings = 10;

    // Syslog settings.
    SyslogSettings syslog_settings = 11;

    // WebProxy settings.
    WebProxySettings webproxy_settings = 12;
  }

  // Required. Type of logs collected.
  string log_type = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/LogType"
    }
  ];

  // Metadata applied at the Collector level. This can be used in conjunction
  // with, or take precedence over, Metadata applied at the Forwarder
  // level. Refer to each Metadata field for further information.
  ForwarderMetadata metadata = 2;

  // Filters applied at the collector level, which can override filters defined
  // at the Forwarder level.
  repeated RegexFilter regex_filters = 3;

  // Disk Buffering configuration at the collector level.
  DiskBuffer disk_buffer = 4;

  // Maximum number of seconds between Forwarder batch uploads.
  int32 max_seconds_per_batch = 5;

  // Maximum number of bytes queued before Forwarder batch upload.
  int64 max_bytes_per_batch = 6;
}

// FileSettings for a Collector.
message FileSettings {
  // Path of file to monitor.
  string file_path = 1;
}

// KafkaSettings for a Collector.
// Default configuration values will be applied during resource creation for the
// following fields when they are missing or zero-valued:
// - timeout
message KafkaSettings {
  // Username/Password for Kafka instance.
  UsernamePasswordAuth authentication = 1;

  // Kafka Topic.
  string topic = 2;

  // Kafka Group ID.
  string group_id = 3;

  // Kafka Timeout value, which will be truncated to seconds.
  google.protobuf.Duration timeout = 4;

  // Kafka Brokers.
  repeated string brokers = 5;

  // TLS Settings.
  TLSSettings tls_settings = 6;
}

// PcapSettings for a Collector.
message PcapSettings {
  // Interface to listen for PCAP data.
  string network_interface = 1;

  // Berkeley Packet Filter (BPF) for PCAP handle.
  string berkeley_packet_filter = 2;
}

// WebProxySettings for a Collector.
message WebProxySettings {
  // Interface to listen for WebProxy data.
  string network_interface = 1;

  // Berkeley Packet Filter (BPF) for WebProxy handle.
  string berkeley_packet_filter = 2;
}

// SplunkSettings for a Collector.
// Default configuration values will be applied during resource creation for the
// following fields when they are missing or zero-valued:
// - minimum_window_size
// - maximum_window_size
message SplunkSettings {
  // Username/Password for Splunk instance.
  UsernamePasswordAuth authentication = 1;

  // Host or IP for Splunk instance REST API.
  string host = 2;

  // Port associated with the Splunk instance, used with the host field.
  int32 port = 8;

  // Minimum time range, truncated to seconds, for the Splunk query.
  google.protobuf.Duration minimum_window_size = 3;

  // Maximum time range, truncated to seconds, for the Splunk query.
  google.protobuf.Duration maximum_window_size = 4;

  // Query used to filter records within Splunk.
  string query_string = 5;

  // Query mode for Splunk. Currently, only a value of "realtime" is supported,
  // For details about real-time searches in Splunk, please see the Splunk
  // documentation.
  string query_mode = 6;

  // Ignore Certificate.
  bool cert_ignored = 7;
}

// SyslogSettings for a Collector.
// Default configuration values will be applied during resource creation for the
// following fields when they are missing or zero-valued:
// - buffer_size
// - connection_timeout
message SyslogSettings {
  // Protocol on which a syslog collector can listen.
  enum Protocol {
    // Attempting to set this default value will result in a validation error.
    PROTOCOL_UNSPECIFIED = 0;

    // Syslog collector will listen for data using TCP.
    TCP = 1;

    // Syslog collector will listen for data using UDP.
    UDP = 2;
  }

  // Syslog collector will listen using this protocol.
  Protocol protocol = 1;

  // IP Address or Hostname (will be resolved to an IP) on which the Forwarder's
  // syslog collector will listen.
  string address = 2;

  // Port on which the Forwarder's syslog collector will listen.
  int32 port = 3;

  // Protocol Buffer Size.
  int64 buffer_size = 4;

  // The time, truncated to seconds, after which TCP connections will drop-off
  // after being inactive.
  google.protobuf.Duration connection_timeout = 5;

  // TLS Settings.
  TLSSettings tls_settings = 6;
}

// DiskBuffering configuration applied at the collector level.
message DiskBuffer {
  // Describes whether disk buffering is enabled on the collector.
  bool enabled = 1;

  // Directory path for files written.
  string directory_path = 2;

  // Maximum Buffered File Size.
  int64 max_file_buffer_bytes = 3;
}

// Server settings for load balancing and high availability configuration.
// Default configuration values will be applied during resource creation for the
// following fields when they are missing or zero-valued:
// - graceful_timeout
// - drain_timeout
message ServerSettings {
  // HTTP settings for the Forwarder's server.
  // Default configuration values will be applied during resource creation for
  // the following fields when they are missing or zero-valued:
  // - port
  // - host
  // - read_timeout
  // - read_header_timeout
  // - write_timeout
  // - idle_timeout
  message ForwarderHttpSettings {
    // User-configurable routes settings for the Forwarder's HTTP Server
    // Default configuration values will be applied during resource creation for
    // the following fields when they are missing or zero-valued:
    // - available_status_code
    // - ready_status_code
    // - unready_status_code
    message RouteSettings {
      // Status code returned when a liveness check is received and the
      // forwarder is available.
      int32 available_status_code = 1;

      // Status code returned when it is ready to accept traffic.
      int32 ready_status_code = 2;

      // Status code returned when it is not ready to accept traffic.
      int32 unready_status_code = 3;
    }

    // Port number that the HTTP server listens on for health checks from the
    // load balancer.
    int32 port = 1;

    // IP address, or hostname that can be resolved to IP addresses, that the
    // server should listen on.
    string host = 2;

    // Maximum amount of time, truncated to seconds, allowed to read the entire
    // request, both the header and the body.
    google.protobuf.Duration read_timeout = 3;

    // Maximum amount of time, truncated to seconds, allowed to read request
    // headers.
    google.protobuf.Duration read_header_timeout = 4;

    // Maximum amount of time, truncated to seconds, allowed to send a response.
    google.protobuf.Duration write_timeout = 5;

    // Maximum amount of time, truncated to seconds, to wait for the next
    // request when idle connections are enabled.
    google.protobuf.Duration idle_timeout = 6;

    // Route-specific settings for the HTTP server.
    RouteSettings route_settings = 7;
  }

  // Describes whether server functionality is enabled on the Forwarder.
  bool enabled = 1;

  // A timeout value, truncated to seconds, after which the forwarder returns a
  // bad readiness/health check and still accepts new connections.
  google.protobuf.Duration graceful_timeout = 2;

  // A timeout value, truncated to seconds, after which the forwarder waits for
  // active connections to successfully close on their own before being closed
  // by the server.
  google.protobuf.Duration drain_timeout = 3;

  // HTTP-specific server settings.
  ForwarderHttpSettings http_settings = 4;
}

// TLS Settings information for Collectors with TLS support (e.g. Kafka, Syslog)
message TLSSettings {
  // TLS Certificate.
  string certificate = 1;

  // TLS Certificate Key.
  string certificate_key = 2;

  // Minimum TLS Version.
  string minimum_tls_version = 3;

  // Disables SSL certification verification.
  bool insecure_skip_verification = 4;
}

// Username/Password based authentication information.
message UsernamePasswordAuth {
  // Username of an identity used for authentication.
  string username = 1;

  // Password of the account identified by username.
  string password = 2;
}
