syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/cloud/chronicle/v1beta/user_data_entries.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "UserDataProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";
option (google.api.resource_definition) = {
  type: "chronicle.googleapis.com/User"
  pattern: "projects/{project}/locations/{location}/instances/{instance}/users/{user}"
};

// API for interacting with UserDataService.
service UserDataService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // Endpoint for adding a new entry to the specified collection of user
  // data
  rpc CreateSearchQuery(CreateSearchQueryRequest) returns (SearchQuery) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/instances/*/users/*}/searchQueries"
      body: "search_query"
    };
    option (google.api.method_signature) =
        "parent,search_query,search_query_id";
  }

  // Endpoint for getting a user's Saved query entry
  rpc GetSearchQuery(GetSearchQueryRequest) returns (SearchQuery) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/users/*/searchQueries/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Endpoint for deleting a user data saved query entry
  rpc DeleteSearchQuery(DeleteSearchQueryRequest)
      returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1beta/{name=projects/*/locations/*/instances/*/users/*/searchQueries/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Endpoint for listing the user data saved queries owned by the
  // specified user
  rpc ListSearchQueries(ListSearchQueriesRequest)
      returns (ListSearchQueriesResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*/users/*}/searchQueries"
    };
    option (google.api.method_signature) = "parent";
  }

  // Endpoint for updating user data saved query
  rpc UpdateSearchQuery(UpdateSearchQueryRequest) returns (SearchQuery) {
    option (google.api.http) = {
      patch: "/v1beta/{search_query.name=projects/*/locations/*/instances/*/users/*/searchQueries/*}"
      body: "search_query"
    };
    option (google.api.method_signature) = "search_query,update_mask";
  }

  // Endpoint for adding a new saved column set to the specified instance.
  rpc CreateSavedColumnSet(CreateSavedColumnSetRequest)
      returns (SavedColumnSet) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/instances/*}/savedColumnSets"
      body: "saved_column_set"
      additional_bindings {
        post: "/v1beta/{parent=projects/*/locations/*/instances/*/users/*}/savedColumnSets"
        body: "saved_column_set"
      }
    };
    option (google.api.method_signature) = "parent,saved_column_set";
  }

  // Endpoint for getting a user's saved column set.
  rpc GetSavedColumnSet(GetSavedColumnSetRequest) returns (SavedColumnSet) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/savedColumnSets/*}"
      additional_bindings {
        get: "/v1beta/{name=projects/*/locations/*/instances/*/users/*/savedColumnSets/*}"
      }
    };
    option (google.api.method_signature) = "name";
  }

  // Endpoint for deleting a saved column set.
  rpc DeleteSavedColumnSet(DeleteSavedColumnSetRequest)
      returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1beta/{name=projects/*/locations/*/instances/*/savedColumnSets/*}"
      additional_bindings {
        delete: "/v1beta/{name=projects/*/locations/*/instances/*/users/*/savedColumnSets/*}"
      }
    };
    option (google.api.method_signature) = "name";
  }

  // Endpoint for listing the saved column sets. It will return all
  // private + public saved column sets for the requested user and all public
  // saved column sets for the other users within the instance.
  rpc ListSavedColumnSets(ListSavedColumnSetsRequest)
      returns (ListSavedColumnSetsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/savedColumnSets"
      additional_bindings {
        get: "/v1beta/{parent=projects/*/locations/*/instances/*/users/*}/savedColumnSets"
      }
    };
    option (google.api.method_signature) = "parent";
  }

  // Endpoint for updating user data saved column set
  rpc UpdateSavedColumnSet(UpdateSavedColumnSetRequest)
      returns (SavedColumnSet) {
    option (google.api.http) = {
      patch: "/v1beta/{saved_column_set.name=projects/*/locations/*/instances/*/savedColumnSets/*}"
      body: "saved_column_set"
      additional_bindings {
        patch: "/v1beta/{saved_column_set.name=projects/*/locations/*/instances/*/users/*/savedColumnSets/*}"
        body: "saved_column_set"
      }
    };
    option (google.api.method_signature) = "saved_column_set,update_mask";
  }
}

// Request for UserDataService CreateSearchQuery
message CreateSearchQueryRequest {
  // Required. The ID of the user this Search Query will be created for.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/users/{user}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/SearchQuery"
    }
  ];

  // Required. The query to create.
  string search_query_id = 2 [(google.api.field_behavior) = REQUIRED];

  // Required. The query to create.
  SearchQuery search_query = 3 [(google.api.field_behavior) = REQUIRED];
}

// Request for UserDataService DeleteSearchQuery
message DeleteSearchQueryRequest {
  // Required. The ID of the Search Query to delete.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/users/{user}/searchQuery/{searchQuery}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/SearchQuery"
    }
  ];
}

// Request for UserDataService ListSearchQueries
message ListSearchQueriesRequest {
  // Required. The ID of the user to list Search Queries for.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/users/{user}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/SearchQuery"
    }
  ];

  // Optional. The maximum number of SearchQueries to return. The service may
  // return fewer than this value. If unspecified, at most 100 rules will be
  // returned. The maximum value is 1000; values above 1000 will be coerced to
  // 1000.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A page token, received from a previous `ListSearchQueries` call.
  // Provide this to retrieve the subsequent page.
  //
  // When paginating, all other parameters provided to `ListSearchQueries`
  // must match the call that provided the page token.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Response for UserDataService ListSearchQueries
message ListSearchQueriesResponse {
  // List of saved queries
  repeated SearchQuery search_queries = 1;

  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request for UserDataService UpdateSearchQuery
message UpdateSearchQueryRequest {
  // Required. The query to update.
  //
  // The query's `name` field is used to identify the query to update.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/users/{user}/searchQuery/{searchQuery}
  SearchQuery search_query = 1 [(google.api.field_behavior) = REQUIRED];

  // Optional. The field mask to specify which fields to update.
  google.protobuf.FieldMask update_mask = 2
      [(google.api.field_behavior) = OPTIONAL];
}

// Reguest for UserPreferenceService GetSearchQueryRequest
message GetSearchQueryRequest {
  // Required. The name of the preference set to retrieve.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/users/{user}/searchQueries/{searchQuery}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/SearchQuery"
    }
  ];
}

// Request for UserDataService CreateSavedColumnSet.
message CreateSavedColumnSetRequest {
  // Required. The ID of the instance this saved column set will be created for.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}
  // projects/{project}/locations/{location}/instances/{instance}/users/{user}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/SavedColumnSet"
    }
  ];

  // Required. The saved column set to create.
  SavedColumnSet saved_column_set = 3 [(google.api.field_behavior) = REQUIRED];
}

// Reguest to get SavedColumnSet.
message GetSavedColumnSetRequest {
  // Required. The name of the saved column set to retrieve.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/savedColumnSets/{saved_column_set}
  // projects/{project}/locations/{location}/instances/{instance}/users/{user}/savedColumnSets/{saved_column_set}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/SavedColumnSet"
    }
  ];
}

// Request for UserDataService DeleteSavedColumnSet.
message DeleteSavedColumnSetRequest {
  // Required. The ID of the saved column sets to delete.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/savedColumnSets/{saved_column_set}
  // projects/{project}/locations/{location}/instances/{instance}/users/{user}/savedColumnSets/{saved_column_set}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/SavedColumnSet"
    }
  ];
}

// Request for UserDataService ListSavedColumnSets.
message ListSavedColumnSetsRequest {
  // Required. The ID of the instance to list SavedColumnSets for.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}
  // projects/{project}/locations/{location}/instances/{instance}/users/{user}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/SavedColumnSet"
    }
  ];

  // Optional. The maximum number of SavedColumnSets to return. The service may
  // return fewer than this value. If unspecified, at most 100 saved column sets
  // will be returned. The maximum value is 1000; values above 1000 will be
  // coerced to 1000.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A page token, received from a previous `ListColumnSets` call.
  // Provide this to retrieve the subsequent page.
  //
  // When paginating, all other parameters provided to `ListColumnSets`
  // must match the call that provided the page token.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Response for UserDataService ListSavedQueries.
message ListSavedColumnSetsResponse {
  // List of saved column sets.
  repeated SavedColumnSet saved_column_sets = 1;

  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request for UserDataService UpdateSavedColumnSet
message UpdateSavedColumnSetRequest {
  // Required. The saved column set to update.
  // The saved_column_set's `name` field is used to identify the column.
  // set to update. Format:
  // projects/{project}/locations/{location}/instances/{instance}/savedColumnSets/{saved_column_set}
  // projects/{project}/locations/{location}/instances/{instance}/users/{user}/savedColumnSets/{saved_column_set}
  SavedColumnSet saved_column_set = 1 [(google.api.field_behavior) = REQUIRED];

  // Optional. The field mask to specify which fields to update.
  google.protobuf.FieldMask update_mask = 2
      [(google.api.field_behavior) = OPTIONAL];
}
