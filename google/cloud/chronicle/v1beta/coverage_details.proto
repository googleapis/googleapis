syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "backstory/udm.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "CoverageDetailsProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";

// CoverageDetailsService exposes endpoints that report which curated rules
// provide detection coverage for ThreatCollection data (such as Campaigns).
service CoverageDetailsService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // List coverage details for threat collection and rule combinations.
  rpc ListCoverageDetails(ListCoverageDetailsRequest)
      returns (ListCoverageDetailsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/coverageDetails"
    };
    option (google.api.method_signature) = "parent";
  }
}

// Provides coverage details for a threat collection and rule combination.
message CoverageDetails {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/CoverageDetails"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/coverageDetails/{coverage_details}"
    plural: "coverageDetails"
    singular: "coverageDetails"
  };

  // Identifier. The resource name of the coverage details.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/coverageDetails/{coverage_details}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Output only. Resource name of the matching ThreatCollection
  string threat_collection = 2 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/ThreatCollection"
    }
  ];

  // Output only. Resource name of the matching Rule
  string rule = 3 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = { type: "chronicle.googleapis.com/Rule" }
  ];

  // Output only. MITRE ATT&CK TTPs used in the campaign that were detected by
  // this rule.
  backstory.AttackDetails covered_attack_details = 4
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Request parameters for ListCoverageDetails.
message ListCoverageDetailsRequest {
  // Required. The instance to list coverage details for.
  // Format: projects/{project}/locations/{location}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/CoverageDetails"
    }
  ];

  // Optional. The maximum number of CoverageDetails to return. The service may
  // return fewer than this value. If unspecified, at most 1000 CoverageDetails
  // will be returned. The maximum value is 10000; values above 10000 will be
  // coerced to 10000.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A page token, received from a previous `ListCoverageDetails`
  // call. Provide this to retrieve the subsequent page.
  //
  // When paginating, all other parameters provided to `ListCoverageDetails`
  // must match the call that provided the page token.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A filter that can be used to retrieve specific coverage details.
  // Supported filters:
  // - Search literal (https://google.aip.dev/160#literals) matching on coverage
  // details for specified threat collections.
  // - Filtering by a specific field value in the format: `field:value`.
  //   Supported fields:
  //   - threat_collection
  // Can use `OR` for multiple threat collections.
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Response containing a list of coverage details.
message ListCoverageDetailsResponse {
  // Output only. The list of coverage details sorted by coverage details' name
  // in ascending order.
  repeated CoverageDetails coverage_details = 1
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. A token that can be sent as `page_token` to retrieve the next
  // page. If this field is omitted, there are no subsequent pages.
  string next_page_token = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The total number of coverage details that match the request.
  // The count returned by pagination may be less than
  // the `total_size` that matches.
  int32 total_size = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}
