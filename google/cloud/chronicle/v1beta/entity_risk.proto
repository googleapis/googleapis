syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "EntityRiskProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";

// A service providing functionality to support Entity Risk Lens view.
service EntityRiskService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // Queries the instance to get the Risk Configurations used for the
  // computation of Entity Risk Score. Returns custom config if they exists or
  // return defaults in the system.
  rpc GetRiskConfig(GetRiskConfigRequest) returns (RiskConfig) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/riskConfig}"
    };
    option (google.api.method_signature) = "name";
  }

  // Updates RiskConfig used for the computation of Entity Risk Score.
  rpc UpdateRiskConfig(UpdateRiskConfigRequest) returns (RiskConfig) {
    option (google.api.http) = {
      patch: "/v1beta/{risk_config.name=projects/*/locations/*/instances/*/riskConfig}"
      body: "risk_config"
    };
    option (google.api.method_signature) = "risk_config";
  }
}

// Configurations used for the computation of Entity Risk Scores in given
// instance.
message RiskConfig {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/RiskConfig"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/riskConfig"
    plural: "riskConfigs"
    singular: "riskConfig"
  };

  // Since this is a singleton resource, name includes the name of their parent
  // followed by one static-segment e.g.  '.../instances/12345/riskConfig'
  string name = 1;

  // Default Risk Score for detections.
  float default_detection_risk_score = 2;

  // Default Risk Score for alerts.
  float default_alert_risk_score = 3;

  // Default Weighting Factor for Risk Scoring algortihms.
  float default_weighting_factor = 4;

  // Default Closed Alert Coefficient
  float default_closed_alert_coefficient = 5;
}

message GetRiskConfigRequest {
  // Required. The instance ID.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/riskConfig
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/RiskConfig"
    }
  ];
}

// Request message for UpdateRiskConfig method
message UpdateRiskConfigRequest {
  // Required. RiskConfig to update.
  //
  // The riskConfigs's `name` field is used to identify the config to update.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/riskConfig
  RiskConfig risk_config = 1 [(google.api.field_behavior) = REQUIRED];
}
