syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/cloud/chronicle/v1beta/enrichment.proto";
import "google/type/interval.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "EnrichmentControlProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";

// EnrichmentControlService provides APIs for controlling enrichment.
// Enrichment is the process of populating UDM events with more useful
// information.
service EnrichmentControlService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // Create an EnrichmentControl resource.
  rpc CreateEnrichmentControl(CreateEnrichmentControlRequest)
      returns (EnrichmentControl) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/instances/*}/enrichmentControls"
      body: "enrichment_control"
    };
    option (google.api.method_signature) = "parent,enrichment_control";
  }

  // Get an EnrichmentControl.
  rpc GetEnrichmentControl(GetEnrichmentControlRequest)
      returns (EnrichmentControl) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/enrichmentControls/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // List all EnrichmentControls.
  rpc ListEnrichmentControls(ListEnrichmentControlsRequest)
      returns (ListEnrichmentControlsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/enrichmentControls"
    };
    option (google.api.method_signature) = "parent";
  }

  // Disable an EnrichmentControl. Disabling an enrichment control involves
  // updating the end time of the most recent record associated with that
  // EnrichmentControl resource to the disabling time and return the updated
  // EnrichmentControl resource.
  rpc DisableEnrichmentControl(DisableEnrichmentControlRequest)
      returns (EnrichmentControl) {
    option (google.api.http) = {
      post: "/v1beta/{name=projects/*/locations/*/instances/*/enrichmentControls/*}:disable"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }
}

// An EnrichmentControl resource represents a control to an enrichment.
// Enrichment is the process of populating UDM events with more useful
// information.
// An enrichment control can have multiple records. Each record has a time range
// and a description.
// When an enrichment control is created for the first time, a new
// EnrichmentControl resource is generated, along with an initial record whose
// time range begins at the creation time. For subsequent creation requests for
// the same control, the existing EnrichmentControl resource is returned, and
// a new record with a start time of the current creation time is added.
// Disabling an enrichment control involves updating the end time of the most
// recent record associated with that EnrichmentControl resource to the
// disabling time.
message EnrichmentControl {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/EnrichmentControl"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/enrichmentControls/{enrichment_control}"
    plural: "enrichmentControls"
    singular: "enrichmentControl"
  };

  // Identifier. The resource name of the EnrichmentControl.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/enrichmentControls/{enrichment_control}
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Required. The options to control the enrichment.
  EnrichmentControlOption enrichment_control_option = 2
      [(google.api.field_behavior) = REQUIRED];

  // Optional. A human-readable name for this enrichment control.
  string display_name = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A human-readable description for this enrichment control.
  string description = 5 [(google.api.field_behavior) = OPTIONAL];

  // Output only. The records of the enrichment control.
  repeated EnrichmentControlRecord records = 6
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// The options to control the enrichment.
message EnrichmentControlOption {
  // Required. The type of enrichment to be controlled.
  google.cloud.chronicle.v1beta.EnrichmentType enrichment_type = 2
      [(google.api.field_behavior) = REQUIRED];

  // Required. LogType of the events to be enriched. Apply to all log types if
  // ALL_TYPE. LogType resource format:
  // projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}
  string target_log_type = 3 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/LogType"
    }
  ];

  // Required. The enrichment source that an enrichment is from. An enrichment
  // source can be either a log type or an external enrichment source that does
  // not have a log type.
  google.cloud.chronicle.v1beta.EnrichmentSource enrichment_source = 4
      [(google.api.field_behavior) = REQUIRED];
}

// The activity record of an enrichment control.
message EnrichmentControlRecord {
  // Output only. The time range of the events to apply the enrichment control.
  // If the end time is not set, it means the control will apply to all events
  // after the start time.
  google.type.Interval time_range = 1
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. A human-readable description for this enrichment control
  // record.
  string description = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Request message for creating an enrichment control.
message CreateEnrichmentControlRequest {
  // Required. The parent resource where this enrichment control will be
  // created. Format:
  // projects/{project}/locations/{location}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/EnrichmentControl"
    }
  ];

  // Required. The enrichment control to create.
  EnrichmentControl enrichment_control = 2
      [(google.api.field_behavior) = REQUIRED];
}

// Request message for getting an enrichment control.
message GetEnrichmentControlRequest {
  // Required. The name of the enrichment control to retrieve.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/enrichmentControls/{enrichment_control}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/EnrichmentControl"
    }
  ];
}

// Request message for listing all enrichment controls.
message ListEnrichmentControlsRequest {
  // Required. The parent, which owns this collection of enrichment controls.
  // Format: projects/{project}/locations/{location}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/EnrichmentControl"
    }
  ];

  // Optional. The maximum number of enrichment controls to return. The service
  // may return fewer than this value. If unspecified, at most 100 enrichment
  // controls will be returned. The maximum value is 1000; values above 1000
  // will be coerced to 1000.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A page token, received from a previous `ListEnrichmentControls`
  // call. Provide this to retrieve the subsequent page.
  //
  // When paginating, all other parameters provided to `ListEnrichmentControls`
  // must match the call that provided the page token.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for listing enrichment controls.
message ListEnrichmentControlsResponse {
  // The enrichment controls from the specified chronicle instance.
  repeated EnrichmentControl enrichment_controls = 1;

  // A token that can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// Request message to disable an enrichment control.
message DisableEnrichmentControlRequest {
  // Required. The name of the enrichment control to disable.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/enrichmentControls/{enrichment_control}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/EnrichmentControl"
    }
  ];
}
