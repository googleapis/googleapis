    // Microsoft Graph Alert settings.
    MicrosoftGraphAlertSettings microsoft_graph_alert_settings = 9;

    // Microsoft Security center alert settings.
    MicrosoftSecurityCenterAlertSettings
        microsoft_security_center_alert_settings = 10;

    // Mimecast mail settings.
    MimecastMailSettings mimecast_mail_settings = 11;

    // Office 365 settings.
    Office365Settings office365_settings = 12;

    // Proofpoint mail settings.
    ProofpointMailSettings proofpoint_mail_settings = 13;

    // Recorded Future IOC settings.
    RecordedFutureIocSettings recorded_future_ioc_settings = 14;

    // Workday settings.
    WorkdaySettings workday_settings = 15;

    // PAN IOC settings.
    PanIocSettings pan_ioc_settings = 16;

    // Okta settings.
    OktaSettings okta_settings = 17;

    // Okta user context settings.
    OktaUserContextSettings okta_user_context_settings = 18;

    // Fox-IT STIX settings.
    FoxITStixSettings fox_it_stix_settings = 19;

