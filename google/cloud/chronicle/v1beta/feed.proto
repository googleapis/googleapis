// FeedsService contains procedures for managing Chronicle third-party feeds.
service FeedsService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // Fetch Chronicle's service account used for ingesting data from Cloud
  // Storage buckets.
  rpc FetchServiceAccountForCustomer(FetchServiceAccountForCustomerRequest)
      returns (FeedServiceAccount) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/feedServiceAccounts:fetchServiceAccountForCustomer"
    };
    option (google.api.method_signature) = "parent";
  }

  // Creates a feed.
  rpc CreateFeed(CreateFeedRequest) returns (Feed) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/instances/*}/feeds"
      body: "feed"
    };
    option (google.api.method_signature) = "parent,feed";
  }

  // Gets a feed.
  rpc GetFeed(GetFeedRequest) returns (Feed) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/feeds/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Deletes a feed.
  rpc DeleteFeed(DeleteFeedRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1beta/{name=projects/*/locations/*/instances/*/feeds/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Enable feed for ingestion.
  rpc EnableFeed(EnableFeedRequest) returns (Feed) {
    option (google.api.http) = {
      post: "/v1beta/{name=projects/*/locations/*/instances/*/feeds/*}:enable"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Disable feed for ingestion. Make FeedState ARCHIVED.
  rpc DisableFeed(DisableFeedRequest) returns (Feed) {
    option (google.api.http) = {
      post: "/v1beta/{name=projects/*/locations/*/instances/*/feeds/*}:disable"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Lists all feeds for the customer.
  rpc ListFeeds(ListFeedsRequest) returns (ListFeedsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/feeds"
    };
    option (google.api.method_signature) = "parent";
  }

  // Lists Packs for which feeds can be configured.
  rpc ListFeedPacks(ListFeedPacksRequest) returns (ListFeedPacksResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/feedPacks"
    };
    option (google.api.method_signature) = "parent";
  }

  // Gets a feed pack.
  rpc GetFeedPack(GetFeedPackRequest) returns (FeedPack) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/feedPacks/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Updates the full feed.
  rpc UpdateFeed(UpdateFeedRequest) returns (Feed) {
    option (google.api.http) = {
      patch: "/v1beta/{feed.name=projects/*/locations/*/instances/*/feeds/*}"
      body: "feed"
    };
    option (google.api.method_signature) = "feed,update_mask";
  }

  // List all FeedSourceTypeSchemas.
  rpc ListFeedSourceTypeSchemas(ListFeedSourceTypeSchemasRequest)
      returns (ListFeedSourceTypeSchemasResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/feedSourceTypeSchemas"
    };
    option (google.api.method_signature) = "parent";
  }

  // List all LogTypeSchemas compatible with a given
  // FeedSourceType.
  rpc ListLogTypeSchemas(ListLogTypeSchemasRequest)
      returns (ListLogTypeSchemasResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*/feedSourceTypeSchemas/*}/logTypeSchemas"
    };
    option (google.api.method_signature) = "parent";
  }

  // Import logs coming from https push feeds.
  rpc ImportPushLogs(ImportPushLogsRequest) returns (google.api.HttpBody) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/instances/*/feeds/*}:importPushLogs"
      body: "*"
    };
    option (google.api.method_signature) = "parent";
  }

  // Generates a new secret for https push feeds which do not support jwt
  // tokens. Secrets once generated should be copied and stored in safe place
  // to be used while configuring https push feeds.Please note that you can
  // always generate a new secret again for a feed using this API but it will
  // invalidate the previously generated secret for the feed.
  rpc GenerateSecret(GenerateSecretRequest) returns (GenerateSecretResponse) {
    option (google.api.http) = {
      post: "/v1beta/{name=projects/*/locations/*/instances/*/feeds/*}:generateSecret"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }
}

// The type of URIs specified in the source URIs.
enum URISourceType {
  // If encountered, will throw an `INVALID_ARGUMENT` error.
  URI_SOURCE_TYPE_UNSPECIFIED = 0;

  // The type of files pointed to by `source_uris` are files.
  FILES = 1;

  // The type of files pointed to by `source_uris` are folders and Xenon
  // should not descend into subfolders of those folders.
  FOLDERS = 2;

  // The type of files pointed to by `source_uris` are folders and Xenon
  // should descend into subfolders of those folders.
  FOLDERS_RECURSIVE = 3;
}

// Source deletion option controls whether source files should be deleted after
// transferring.
enum SourceDeletionOption {
  // If encountered, will be treated as `SOURCE_DELETION_NEVER`.
  SOURCE_DELETION_OPTION_UNSPECIFIED = 0;

  // Never delete files from the source.
  SOURCE_DELETION_NEVER = 1;

  // After the fetch completes, if there are no errors, delete files and any
  // directories made empty by the file deletion from the source.
  SOURCE_DELETION_ON_SUCCESS = 2;

  // After the fetch completes, if there are no errors, delete files (leaving
  // any directories) from the source.
  SOURCE_DELETION_ON_SUCCESS_FILES_ONLY = 3;
}

// Source deletion option determines whether source files should be deleted
// after transferring.
enum SourceDeletionOptionV2 {
  // If encountered, will be treated as `SOURCE_DELETION_NEVER`.
  SOURCE_DELETION_OPTION_V2_UNSPECIFIED = 0;

  // Never delete files from the source.
  NEVER = 1;

  // After the fetch completes, if there are no errors, delete files and any
  // directories made empty by the file deletion from the source.
  ON_SUCCESS = 2;
}

