syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/cloud/chronicle/v1beta/entity.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "ThreatCollectionProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";

// ThreatCollectionService exposes endpoints to consume threat collections.
service ThreatCollectionService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // Lists threat collections, which contain reports and tracked threat
  // campaigns from Google Threat Intelligence.
  rpc ListThreatCollections(ListThreatCollectionsRequest)
      returns (ListThreatCollectionsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/threatCollections"
    };
    option (google.api.method_signature) = "parent";
  }

  // Gets a threat collection by resource name.
  rpc GetThreatCollection(GetThreatCollectionRequest)
      returns (ThreatCollection) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/threatCollections/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Gets a batch (list) of ioc match metadata for a list of threat collections.
  rpc FetchIocMatchMetadata(FetchIocMatchMetadataRequest)
      returns (FetchIocMatchMetadataResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/threatCollections:fetchIocMatchMetadata"
    };
    option (google.api.method_signature) = "parent";
  }

  // Gets a list of entity metadata for a threat collection.
  rpc FetchThreatCollectionEntityMetadata(
      FetchThreatCollectionEntityMetadataRequest)
      returns (FetchThreatCollectionEntityMetadataResponse) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/threatCollections/*}:fetchEntityMetadata"
    };
    option (google.api.method_signature) = "name";
  }

  // List related threat collections for a threat artifact.
  rpc FetchRelatedThreatCollections(FetchRelatedThreatCollectionsRequest)
      returns (FetchRelatedThreatCollectionsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/threatCollections:fetchRelated"
    };
    option (google.api.method_signature) = "parent";
  }

  // Get the set of threat collection filter options.
  rpc GetThreatCollectionFilterSet(GetThreatCollectionFilterSetRequest)
      returns (ThreatCollectionFilterSet) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/threatCollectionFilterSet}"
    };
    option (google.api.method_signature) = "name";
  }
}

// Request parameters for ListThreatCollections.
message ListThreatCollectionsRequest {
  // Required. The parent resource of the threat collections.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/ThreatCollection"
    }
  ];

  // Optional. The maximum number of threat collections to return.
  // The default is 10, and the maximum value is 40.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A page token, received from a previous `ListThreatCollections`
  // call. Provide this to retrieve the subsequent page. When paginating, all
  // other parameters provided to `ListThreatCollections` must match the call
  // that provided the page token.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A filter that can be used to retrieve specific threat collection.
  // Supported filters:
  // - Search literal (https://google.aip.dev/160#literals) to perform an open
  //   search matching on the threat collection's display name or description.
  // - Filtering by a specific field value in the format: `field:value`.
  //   Supported fields:
  //   - display_name
  //   - description
  //   - create_time
  //   - update_time
  // Filters can be combined using `AND`, `OR`, `NOT`.
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The order to sort the returned threat collections by.
  // The default is `create_time desc`.
  // Fields that are supported for sorting are:
  // - create_time
  // - update_time
  // - first_seen_time
  // - last_seen_time
  // - display_name
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Request to get a threat collection by resource name.
message GetThreatCollectionRequest {
  // Required. The name of the threat collection to retrieve.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/threatCollections/{threat_collection}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/ThreatCollection"
    }
  ];
}

// Response containing a list of threat collections.
message ListThreatCollectionsResponse {
  // Output only. List of threat collections. This is sorted by creation time in
  // descending order by default.
  repeated ThreatCollection threat_collections = 1
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. A token that can be sent as `page_token` to retrieve the next
  // page. If this field is omitted, there are no subsequent pages.
  string next_page_token = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// A threat collection from Google Threat Intelligence which represents either a
// threat campaign or a threat report.
message ThreatCollection {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/ThreatCollection"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/threatCollections/{threat_collection}"
    plural: "threatCollections"
    singular: "threatCollection"
  };

  // Types of threat collections currently supported.
  enum ThreatCollectionType {
    // Threat collection type is unspecified.
    THREAT_COLLECTION_TYPE_UNSPECIFIED = 0;

    // Threat collection type is campaign.
    CAMPAIGN = 1;

    // Threat collection type is report.
    REPORT = 2;
  }

  // Output only. Identifier. The resource name of this ThreatCollection.
  string name = 1 [
    (google.api.field_behavior) = IDENTIFIER,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Output only. Display name of the threat collection.
  string display_name = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Description of the threat collection.
  // For campaigns, this is the description/context about the campaign.
  // For reports, this is the ML-autogenerated summary of the report's content,
  // generated by GTI.
  string description = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Type of the threat collection.
  ThreatCollectionType threat_collection_type = 4
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time when the threat collection was created.
  google.protobuf.Timestamp create_time = 6
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time when the threat collection was last modified.
  google.protobuf.Timestamp update_time = 9
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Alternative display names of the threat collection.
  // For example, 'CAMP.22.007' for an individual campaign threat collection.
  repeated string alt_names = 11 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The resource names of the threat actors or malware related to
  // this ThreatCollection. Format:
  // projects/{project}/locations/{location}/instances/{instance}/iocAssociations/{ioc_association}
  repeated string associations = 12 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/IocAssociation"
    }
  ];

  // Output only. The resource names of the Iocs that are related to this
  // ThreatCollection. Format:
  // projects/{project}/locations/{location}/instances/{instance}/iocs/{ioc}
  repeated string iocs = 13 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = { type: "chronicle.googleapis.com/Ioc" }
  ];

  // Output only. The sectors that are targeted by the threat collection.
  repeated string targeted_sectors = 14
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The regions that are targeted by the threat collection,
  // represented as ISO-3166-2 country codes.
  repeated string targeted_regions = 15
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The full Report content. Only available for
  // ThreatCollectionType.REPORT.
  string content = 16 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The summary of the content of the report. Only available for
  // ThreatCollectionType.REPORT.
  string executive_summary = 17 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Request to get a list of ioc match metadata for a list of threat collections.
message FetchIocMatchMetadataRequest {
  // Required. The parent resource of the ioc match metadata.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Instance"
    }
  ];

  // Required. The GTI IDs of the ThreatCollections to fetch IOC match
  // metadata for (e.g. "campaign--604aff2a-754f-5b8d-8d37-c00711ffab43").
  repeated string threat_collections = 2
      [(google.api.field_behavior) = REQUIRED];
}

// Request to get a list of entity metadata for a threat collection.
message FetchThreatCollectionEntityMetadataRequest {
  // Required. The resource name of the ThreatCollection to fetch entity
  // metadata for. Format:
  // projects/{project}/locations/{location}/instances/{instance}/threatCollections/{threat_collection}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/ThreatCollection"
    }
  ];

  // Optional. The page size for the number of entities to return.
  // Default and maximum size is 1000.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A page token, received from a previous `FetchEntityMetadata`
  // call. Provide this to retrieve the subsequent page. When paginating, all
  // other parameters provided to `FetchEntityMetadata` must match the call that
  // provided the page token.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Request to list related threat collections for a threat artifact.
message FetchRelatedThreatCollectionsRequest {
  // The threat resource to get the related ThreatCollections (GTI Campaigns or
  // Reports) for.
  oneof threat_resource {
    // Optional. The name of the IocAssociation (Threat Actor or Malware Family)
    // resource to get related threat collections for. Format:
    // projects/{project}/locations/{location}/instances/{instance}/iocAssociations/{ioc_association}
    string ioc_association = 2 [
      (google.api.field_behavior) = OPTIONAL,
      (google.api.resource_reference) = {
        type: "chronicle.googleapis.com/IocAssociation"
      }
    ];

    // Optional. The name of the ioc resource to get related threat collections
    // for. Format:
    // projects/{project}/locations/{location}/instances/{instance}/iocs/{ioc}
    string ioc = 3 [
      (google.api.field_behavior) = OPTIONAL,
      (google.api.resource_reference) = { type: "chronicle.googleapis.com/Ioc" }
    ];

    // Optional. The name of the ThreatCollection (GTI Campaign or Report)
    // resource to get related threat collections for. Format:
    // projects/{project}/locations/{location}/instances/{instance}/threatCollections/{threat_collection}
    string threat_collection = 4 [
      (google.api.field_behavior) = OPTIONAL,
      (google.api.resource_reference) = {
        type: "chronicle.googleapis.com/ThreatCollection"
      }
    ];
  }

  // Required. The parent resource of the threat collections.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Instance"
    }
  ];

  // Required. The type (Campaign or Report) of related threat collections to
  // return.
  ThreatCollection.ThreatCollectionType threat_collection_type = 5
      [(google.api.field_behavior) = REQUIRED];

  // Optional. The maximum number of threat collections to return.
  // The default is 10, and the maximum value is 40.
  int32 page_size = 6 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A page token, received from a previous
  // `FetchRelatedThreatCollections` call. Provide this to retrieve the
  // subsequent page. When paginating, all other parameters provided to
  // `FetchRelatedThreatCollections` must match the call that provided
  // the page token.
  string page_token = 7 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The order to sort the returned threat collections by. Default is
  // descending last_modification_date. The supported order syntax matches the
  // fields defined in the GTI API docs here:
  // https://gtidocs.virustotal.com/reference/list-threats#allowed-orders
  //
  // Supported orders:
  // - name: sorts objects alphabetically by name, ascending + or descending -.
  // Name in this context refers to the display_name for a threat collection.
  // - creation_date: sorts objects descending - (default) by most recently
  // created objects first, or ascending + by oldest created objects first.
  // This refers to the create_time field for a threat collection.
  // - last_modification_date: sorts objects descending - by most recently
  // modified objects first, or ascending + by firstly modified objects first.
  // This refers to the update_time field for a threat collection.
  string order_by = 8 [(google.api.field_behavior) = OPTIONAL];
}

// Response containing a list of ioc match metadata.
message FetchIocMatchMetadataResponse {
  // Output only. The list of ioc match metadata requested.
  repeated IocMatchMetadata ioc_match_metadata = 1
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Response containing a list of entity metadata.
message FetchThreatCollectionEntityMetadataResponse {
  // Output only. A list of entity risks scores with information typing them to
  // the threat collection. Ordered by entity.risk_score.
  repeated ThreatCollectionEntityMetadata entity_metadata = 1
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. A token that can be sent as `page_token` to retrieve the next
  // page. If this field is omitted, there are no subsequent pages.
  string next_page_token = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The total number of entities that match the request.
  // The size of the `entity_metadata` returned by pagination may be less than
  // the `total_size` that matches.
  int32 total_size = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Response containing a list of threat collections for a given threat artifact.
message FetchRelatedThreatCollectionsResponse {
  // Output only. The list of ThreatCollections.
  repeated ThreatCollection threat_collections = 1
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. A token that can be sent as `page_token` to retrieve the next
  // page. If this field is omitted, there are no subsequent pages.
  string next_page_token = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The total number of ThreatCollections that match the request.
  // The count of `threat_collections` returned by pagination may be less than
  // the `total_size` that matches.
  int32 total_size = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// IOC match metadata for a threat collection.
message IocMatchMetadata {
  // The GTI ID of the ThreatCollection that has IOC matches
  // (e.g. "campaign--604aff2a-754f-5b8d-8d37-c00711ffab43").
  string threat_collection = 1;

  // Number of ioc matches that correlates to the threat_collection
  int32 ioc_matches_count = 2;
}

// Entity metadata for a threat collection.
message ThreatCollectionEntityMetadata {
  // An Asset or User entity which contains an entity indicator and risk_score
  // data associated with it.
  Entity entity = 1;

  // A list of references associated with the entity.
  repeated ThreatCollectionEntityMetadataReference references = 2;
}

// A link between a threat collection and an Asset or User entity in a threat
// collection's entity metadata.
message ThreatCollectionEntityMetadataReference {
  // Possible reference types.
  oneof reference_type {
    // The resource name of the Ioc associated with the entity. Format:
    // projects/{project}/locations/{location}/instances/{instance}/iocs/{ioc}
    string ioc = 1 [
      (google.api.resource_reference) = { type: "chronicle.googleapis.com/Ioc" }
    ];
  }
}

// Request for the set of threat collection filter options.
message GetThreatCollectionFilterSetRequest {
  // Required. The resource name.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/threatCollectionFilterSet
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/ThreatCollectionFilterSet"
    }
  ];
}

// Represents threat collection filters and their available values to be used
// when requesting a filtered list of threat collections.
message ThreatCollectionFilterSet {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/ThreatCollectionFilterSet"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/threatCollectionFilterSet"
    plural: "threatCollectionFilterSet"
    singular: "threatCollectionFilterSet"
  };

  // Represents a threat collection filter and its available values to be used
  // when requesting a filtered list of threat collections.
  message Filter {
    // Threat collection filter option.
    // Example: 'filter=(source_region:"US")'.
    // "source_region" is the filter_key.
    // "US" is the value.
    message FilterOption {
      // Output only. Display name of the filter option. Example: "United
      // States".
      string display_name = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

      // Output only. The filtering key used to use when requesting a filtered
      // list of threat collections. Example: "source_region".
      string filter_key = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

      // Output only. Value of the filter to use when requesting a filtered list
      // of threat collections. Example: "US".
      string value = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

      // Output only. Nested list of options for a given filter option.
      repeated FilterOption options = 4
          [(google.api.field_behavior) = OUTPUT_ONLY];
    }

    // Output only. Display name of the filter. Example: "Source Regions".
    string display_name = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

    // Output only. List of options under this filter.
    repeated FilterOption options = 2
        [(google.api.field_behavior) = OUTPUT_ONLY];
  }

  // Output only. Identifier. Resource name for threat collection filters, in
  // the format
  // projects/{project}/locations/{location}/instances/{instance}/threatCollectionFilterSet.
  string name = 1 [
    (google.api.field_behavior) = IDENTIFIER,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Output only. List of filters that threat collections feed supports.
  repeated Filter filters = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
}
