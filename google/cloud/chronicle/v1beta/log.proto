syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "LogProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";

// LogService interface exposes methods relating to log types and logs.
service LogService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // Lists all LogTypes.
  rpc ListLogTypes(ListLogTypesRequest) returns (ListLogTypesResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/logTypes"
    };
    option (google.api.method_signature) = "parent";
  }
}

// enum for getting a ParserType.
enum ParserType {
  // Unspecified parser type.
  PARSER_TYPE_UNSPECIFIED = 0;

  // Custom parser.
  CUSTOM_PARSER = 1;

  // Prebuilt parser.
  PREBUILT_PARSER = 2;
}

// A Log type represents a data label for data customers send to Chronicle.
message LogType {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/LogType"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}"
  };

  // Output only. The resource name of this log type.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}
  string name = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. the custom log type label
  string custom_log_type_label = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Required. The display name of this log type. This is the tag used in YARA-l
  // rules and search queries.
  string display_name = 3 [(google.api.field_behavior) = REQUIRED];

  // Output only. Whether a LogType is a 'Golden' log type or not. LogTypes that
  // support rapid customer onboarding are considered 'Golden' log types.
  bool golden = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Required. This is what users see in the UI to identify the logtype
  // while creating feed.
  string product_source = 5 [(google.api.field_behavior) = REQUIRED];

  // Required. Whether the log type is custom or globally available.
  bool is_custom = 7 [(google.api.field_behavior) = REQUIRED];

  // Required. The log type could be custom logtype but still be using prebuilt
  // parser. If this is set to true that means that there is a custom parser for
  // this log type. ( deprecated )
  bool has_custom_parser = 8 [(google.api.field_behavior) = REQUIRED];

  // Required. The last time the log type was ingested.
  google.protobuf.Timestamp last_ingested_time = 9
      [(google.api.field_behavior) = REQUIRED];

  // Output only. The number of feeds that are ingested for this log type.
  // This field is populated from FeedManagementService and will be -1 if the
  // feed count cannot be determined due to an error.
  int32 feed_count = 10 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Required. The type of parser used for this log type. (custom/prebuilt/-)
  ParserType parser_type = 11 [(google.api.field_behavior) = REQUIRED];

  // Output only. The time of the most recent log collection for this log type.
  // If there has been no log collection yet, this field will not be set.
  google.protobuf.Timestamp collection_time = 12
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Represents a telemetry log.
message Log {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/Log"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}/logs/{log}"
  };

  // Label for a user configured custom metadata key.
  message LogLabel {
    // The value of the label.
    string value = 1;

    // Indicates whether this label can be used for Data RBAC.
    bool rbac_enabled = 2;
  }

  // Output only. The resource name of this log.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}/logs/{log}
  string name = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Required. Raw data for the log entry.
  bytes data = 2 [(google.api.field_behavior) = REQUIRED];

  // Required. Timestamp of the log entry.
  google.protobuf.Timestamp log_entry_time = 3
      [(google.api.field_behavior) = REQUIRED];

  // Required. The time at which the log entry was collected. Must be after the
  // log_entry_time.
  google.protobuf.Timestamp collection_time = 4
      [(google.api.field_behavior) = REQUIRED];

  // Optional. The user-configured environment namespace to identify the data
  // domain the logs originated from. This namespace will be used as a tag to
  // identify the appropriate data domain for indexing and enrichment
  // functionality.
  string environment_namespace = 5 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The user-configured custom metadata labels.
  map<string, LogLabel> labels = 6 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Metadata in JSON format.
  google.protobuf.Struct additionals = 7
      [(google.api.field_behavior) = OPTIONAL];
}

// Request message for listing log types.
message ListLogTypesRequest {
  // Required. The parent, which owns this collection of log types.
  // Format: projects/{project}/locations/{location}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/LogType"
    }
  ];

  // The maximum number of log types to return. The service may return fewer
  // than this value.
  int32 page_size = 2;

  // A page token, received from a previous `ListLogTypes` call.
  // Provide this to retrieve the subsequent page.
  //
  // When paginating, all other parameters provided to `ListLogTypes` must match
  // the call that provided the page token.
  string page_token = 3;

  // Optional. A filter which should follow the guidelines of AIP-160
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The sorting order for the list of log types.
  // The only field supported for sorting is `data_size`.
  // Data size is the total size for each log type that have been ingested for
  // the customer for lifetime. The valid values are "data_size", "data_size
  // asc", "data_size desc". If just "data_size" is specified, it defaults to
  // ascending order of data size. If nothing is specified,
  // results are returned in ascending order of name.
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for listing log types.
message ListLogTypesResponse {
  // The log types from the specified chronicle instance.
  repeated LogType log_types = 1;

  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}
