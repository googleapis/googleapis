syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "DataExportProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";

// Service for providing functionality for managing Data exports
service DataExportService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // Creates a new DataExport.
  rpc CreateDataExport(CreateDataExportRequest) returns (DataExport) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/instances/*}/dataExports"
      body: "data_export"
    };
    option (google.api.method_signature) = "parent,data_export";
  }

  // Gets a DataExport.
  rpc GetDataExport(GetDataExportRequest) returns (DataExport) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/dataExports/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Cancels a DataExport.
  rpc CancelDataExport(CancelDataExportRequest) returns (DataExport) {
    option (google.api.http) = {
      post: "/v1beta/{name=projects/*/locations/*/instances/*/dataExports/*}:cancel"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Lists Data Export requests.
  rpc ListDataExports(ListDataExportsRequest)
      returns (ListDataExportsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/dataExports"
    };
    option (google.api.method_signature) = "parent";
  }

  // Fetches the service account for Data Export for a chronicle instance.
  rpc FetchServiceAccountForDataExport(FetchServiceAccountForDataExportRequest)
      returns (FetchServiceAccountForDataExportResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/dataExports:fetchServiceAccountForDataExport"
    };
    option (google.api.method_signature) = "parent";
  }
}

// Represents the stage/status of the data export request.
enum Stage {
  // Unspecified stage.
  STAGE_UNSPECIFIED = 0;

  // The request is still in the queue and yet to be processed.
  IN_QUEUE = 1;

  // The request is being processed.
  PROCESSING = 2;

  // The system wasn't able to process the request successfully.
  FINISHED_FAILURE = 3;

  // The system processed the request successfully.
  FINISHED_SUCCESS = 4;

  // The request has been cancelled by the system.
  CANCELLED = 6;
}

// DataExport resource.
message DataExport {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/DataExport"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/dataExports/{id}"
    plural: "dataExports"
    singular: "dataExport"
  };

  // Identifier. Name of the DataExport.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Required. Start, inclusive time from the range.
  google.protobuf.Timestamp start_time = 2
      [(google.api.field_behavior) = REQUIRED];

  // Required. Last, exclusive time from the range.
  google.protobuf.Timestamp end_time = 3
      [(google.api.field_behavior) = REQUIRED];

  // Optional. Log type to export.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}
  string log_type = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/LogType"
    }
  ];

  // Required. Link to the destination Cloud Storage bucket.
  string gcs_bucket = 6 [(google.api.field_behavior) = REQUIRED];

  // Output only. Status of the current export.
  DataExportStatus data_export_status = 8
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Option to indicate export of all log types.
  bool export_all_logs = 9 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The specific log types to include in the Data Export request.
  // Each string must be a resource name for a LogType.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}
  // This field is optional.
  // If empty, all available log types for the specified data
  // source(s) and time range(s) will be included in the export.
  repeated string include_log_types = 10 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/LogType"
    }
  ];

  // Output only. The estimated export volume in bytes,
  // estimated at job creation/updation
  int64 estimated_volume = 11 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Actual volume of data exported, measured upon job completion.
  optional int64 exported_volume = 12
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp indicating when the DataExport resource was created.
  google.protobuf.Timestamp create_time = 13
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp indicating the last time the DataExport
  // resource was updated, including status changes.
  google.protobuf.Timestamp update_time = 14
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. The namespaces used to filter the export.
  repeated string namespaces = 15 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The ingestion labels used to filter the export.
  repeated DataIngestionLabel ingestion_labels = 16
      [(google.api.field_behavior) = OPTIONAL];
}

// Represents a data ingestion label.
message DataIngestionLabel {
  // Required. The key.
  string key = 1 [(google.api.field_behavior) = REQUIRED];

  // Required. The value.
  string value = 2 [(google.api.field_behavior) = REQUIRED];
}

// Represents a data export status.
message DataExportStatus {
  // Output only. The stage/status of a given data export request.
  Stage stage = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The progress in percentage, only applicable for stage
  // "PROCESSING".
  int32 progress_percentage = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The error message if the stage is FINISHED_FAILURE
  string error = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. List of exported glob patterns for the export request.
  repeated string exported_glob_patterns = 4
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Indicates whether the data export is filtered by RBAC.
  optional bool data_rbac_filtered = 5
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Request message for CreateDataExport.
message CreateDataExportRequest {
  // Required. The parent resource where this dataexport will be created.
  // Format: projects/{project}/locations/{region}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/DataExport"
    }
  ];

  // Required. The Data Export to create.
  DataExport data_export = 2 [(google.api.field_behavior) = REQUIRED];
}

// Request message for GetDataExportRequest.
message GetDataExportRequest {
  // Required. The name of the dataexport to retrieve.
  // Format:
  // projects/{project}/locations/{region}/instances/{instance}/dataexports/{id}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/DataExport"
    }
  ];
}

// Request message for CancelDataExport.
message CancelDataExportRequest {
  // Required. The name of the dataexport to cancel.
  // Format:
  // projects/{project}/locations/{region}/instances/{instance}/dataexports/{id}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/DataExport"
    }
  ];
}

// Request message for ListDataExports.
message ListDataExportsRequest {
  // Required. The parent resource whose Data Export requests are to be
  // listed. Format:
  // projects/{project}/locations/{location}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/DataExport"
    }
  ];

  // Optional. The maximum number of DataExport to return.
  // The service may return fewer than this value.
  // If unspecified, at most 50 DataExport will be returned.
  // The maximum value is 100; values above 100 will be coerced to 100.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A page token, received from a previous `ListDataExports` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Filter for ListDataExports, following AIP-160 (go/aip/160).
  // Filterable fields:
  //   - data_export_id (String)
  //   - include_log_type (String)
  //   - start_time (Timestamp)
  //   - end_time (Timestamp)  //
  // - Match one of several Data Export IDs:
  //   'data_export_id = "id-abc-123" OR data_export_id = "id-def-456"'
  //
  // - Match Data Exports containing any of the given Log Types:
  //   'include_log_type: "AKAMAI_DHCP" OR include_log_type: "GCP_DNS"'
  //   (':' is the HAS operator for repeated fields, Enums are strings)
  //
  // - Filter by Time Range (RFC-3339 format):
  //   'start_time >= "2025-07-04T10:00:00Z" AND end_time <=
  //   "2025-07-04T12:00:00Z"'
  //
  // - Combined Filter:
  //   '(include_log_type: "GCP_DNS") AND start_time >= "2025-07-01T00:00:00Z"'
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for ListDataExports.
message ListDataExportsResponse {
  // The list of Data Export requests.
  repeated DataExport data_exports = 1;

  // A token to retrieve next page of results.
  string next_page_token = 2;
}

// Request message for FetchServiceAccountForDataExport.
message FetchServiceAccountForDataExportRequest {
  // Required. The parent resource for which to fetch the service account.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}
  string parent = 1 [(google.api.field_behavior) = REQUIRED];
}

// Response message for FetchServiceAccountForDataExport.
message FetchServiceAccountForDataExportResponse {
  // Output only. The email address of the service account.
  string service_account_email = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
}
