syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/cloud/chronicle/v1beta/entity.proto";
import "google/cloud/chronicle/v1beta/log.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "IngestionProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";

// IngestionService exposes endpoints to ingest Entities, Events and Logs.
service IngestionService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // ImportEntities import the entities. Note that, All entities need to
  // be valid for the request to be successful. An error in one entity will
  // cause the entire request to be rejected.
  rpc ImportEntities(ImportEntitiesRequest) returns (ImportEntitiesResponse) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/instances/*}/entities:import"
      body: "*"
    };
    option (google.api.method_signature) = "parent";
  }

  // Import log telemetry.
  rpc ImportLogs(ImportLogsRequest) returns (ImportLogsResponse) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/instances/*/logTypes/*}/logs:import"
      body: "*"
    };
    option (google.api.method_signature) = "parent";
  }
}

// Request message for importing entities.
message ImportEntitiesRequest {
  // An import source with the entities to import included inline.
  message EntitiesInlineSource {
    // Required. The entities being imported.
    repeated Entity entities = 1 [(google.api.field_behavior) = REQUIRED];

    // Required. The logtype of the log this entity is created from.
    string log_type = 2 [
      (google.api.field_behavior) = REQUIRED,
      (google.api.resource_reference) = {
        type: "chronicle.googleapis.com/LogType"
      }
    ];
  }

  oneof source {
    // Required. Entities to be imported are specified inline.
    EntitiesInlineSource inline_source = 2
        [(google.api.field_behavior) = REQUIRED];
  }

  // Required. The parent, which owns this collection of entities.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Instance"
    }
  ];
}

// Request message for importing logs.
message ImportLogsRequest {
  // A import source with the logs to import included inline.
  message LogsInlineSource {
    // Required. The logs being imported.
    repeated Log logs = 1 [(google.api.field_behavior) = REQUIRED];

    // Optional. The forwarder sending the import request. This value determines
    // the SecOps CollectorID.
    string forwarder = 2 [
      (google.api.field_behavior) = OPTIONAL,
      (google.api.resource_reference) = {
        type: "chronicle.googleapis.com/Forwarder"
      }
    ];

    // Optional. Source file name. Populated for certain types of files
    // processed by the outofband processor which may have metadata encoded in
    // it for use by the parser.
    string source_filename = 3 [(google.api.field_behavior) = OPTIONAL];
  }

  oneof source {
    // Required. Logs to be imported are specified inline.
    LogsInlineSource inline_source = 2 [(google.api.field_behavior) = REQUIRED];
  }

  // Required. The parent, which owns this collection of logs.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/Log"
    }
  ];

  // Optional. Opaque hint to help parsing the log.
  string hint = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for importing logs.
message ImportLogsResponse {}

// Response message for ImportEntities.
message ImportEntitiesResponse {}
