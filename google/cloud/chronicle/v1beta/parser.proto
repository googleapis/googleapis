  ParserExtension dynamic_parsing_config = 6
      [(google.api.field_behavior) = OPTIONAL];

  // sample logs used for while running the parser
  repeated bytes log = 2;

  // Optional. Flag whether the Statedump filter is enabled or not for a config.
  // If enabled, the intermediate state of the parsing will be returned as part
  // of the output. Useful for debugging purposes.
  bool statedump_allowed = 5 [(google.api.field_behavior) = OPTIONAL];

