  bool continue_on_error = 7 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for RunParser.
message RunParserResponse {
  // Result generated when normalizing a log.
  message ParserLogResult {
    // Normalized events generated from a log.
    message ParsedEvents {
      // Events generated when normalizing the log.
      repeated ParsedEvent events = 1;
    }

    // EventInfo is a wrapper containing a UDM or Entity.
    message ParsedEvent {
      oneof event_info {
        // A UDM event.
        backstory.UDM event = 1;

        // An Entity.
        backstory.Entity entity = 2;
      }
    }

    // StatedumpResult represents statedump filter output generated from a log.
    message StatedumpResult {
      // Label represents a tag for the statedump filter.
      string label = 1;

      // StatedumpResult represents output for the corresponding label.
      string statedump_result = 2;
    }

    // parsed result.
    oneof result {
      // Parsed events when normalizing a log.
      ParsedEvents parsed_events = 2;

      // Error message when normalizing the log.
      google.rpc.Status error = 3;
    }

    // Log entry.
    bytes log = 1;

    // Statedump filter output.
    repeated StatedumpResult statedump_results = 4;

    google.protobuf.Struct parsed_fields = 6;

    google.protobuf.Struct failed_fields_and_errors = 7;
  }

  // Results produced after running a parser over log.
  repeated ParserLogResult run_parser_results = 1;
}

