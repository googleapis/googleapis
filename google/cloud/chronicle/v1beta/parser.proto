// Message to represent LowCodeParser.
message LowCodeParser {
  // Represents the mapping logic of input to output.
  FieldExtractors field_extractors = 1;

  // The log used to create this low code parser in the UI.
  bytes log = 2;
}

// A representation of a parser extension as a set of field extractors.
message FieldExtractors {
  // List of FieldExtractors.
  repeated FieldExtractor extractors = 1;

  // Output only. CBN snippet generated from field extractors.
  bytes transformed_cbn_snippet = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Format of the log. Ex. CSV,JSON,XML.
  LogFormat log_format = 3;

  // Whether to append repeated fields or not.
  // When false, repeated fields will be replaced.
  bool append_repeated_fields = 7;

  // Pre-process configuration.
  PreProcessConfig preprocess_config = 4;
}

// A representation of a parser extension as dynamic parsing config.
message DynamicParsingConfig {
  // Optional. List of fields to be parsed.
  repeated LogField opted_fields = 1 [(google.api.field_behavior) = OPTIONAL];
}

// A representation of a log field.
message LogField {
  // Optional. Path of the log field.
  string path = 1 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Sample value of the log field.
  string sample_value = 2 [(google.api.field_behavior) = OPTIONAL];
}

// PreProcessConfig holds the GROK expression to extract the syslog header.
message PreProcessConfig {
  // GROK Regex to extract the structured part of the log.
  // syntax documentation:
  // www.elastic.co/guide/en/logstash/current/plugins-filters-grok.html
  string grok_regex = 1;

  // Target field name for the structured part of the log.
  // This should match a SEMANTIC identifier from the grok expression.
  string target = 2;
}

// An extractor for a single log field.
message FieldExtractor {
  // Comparison operator used in precondition field.
  enum ComparisonOperator {
    // Comparison operator was unspecified.
    COMPARISON_OPERATOR_UNSPECIFIED = 0;

    // Comparison operator is equals "==".
    EQUALS = 1;

    // Comparison operator is not equals.
    NOT_EQUALS = 2;
  }

  // Precondition path could be a json path, xml path or csv column name
  // depending on log format. It refers to a section or substring in raw log.
  string precondition_path = 1;

  // Precondition value.
  string precondition_value = 2;

  // Operator used for precondition.
  ComparisonOperator precondition_op = 3;

  // Field path could be a json path, xml path or csv column name
  // depending on log format. It refers to a section or substring in raw log.
  // This is required if the FieldExtractor is used to specify the parser
  // extension.
  string field_path = 4;

  // Path in generated event which is to be populated. This is required if the
  // FieldExtractor is used to specify the parser extension.
  string destination_path = 5;

  // Value to be mapped to the destination path directly.
  string value = 6;
}

// Changelogs of a parser.
message Changelogs {
  // Represents a single change entry.
  message ChangeEntry {
    // Time at which changelog was created.
    google.protobuf.Timestamp create_time = 1;

    // The changelog message.
    string change_message = 2;

    // Optional. Flag whether the entry is added or deleted.
    // This will be true in case of rollback and false in case of upgrade.
    bool deleted = 4 [(google.api.field_behavior) = OPTIONAL];

    // Optional. The parser version for which the changelog is created.
    string parser_version = 5 [(google.api.field_behavior) = OPTIONAL];
  }

  // all the changelog of a parser.
  repeated ChangeEntry entries = 1;
}

// ParserVersionInfo gives the version information of the parser and related
// properties like pinned etc.
message ParserVersionInfo {
  // Output only. The version of the parser.
  string version = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Required. Signifies if the parser is disabled for auto upgrade. If true,
  // the parser will not be upgraded by the auto upgrade process.
  bool auto_upgrade_disabled = 2 [(google.api.field_behavior) = REQUIRED];

  // Output only. Signifies if rollback is available for this parser version.
  bool rollback_available = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The resource name of latest Parser for this logtype.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}/parsers/{parser}/{id}
  string latest_parser = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The version for the latest available stable version of the
  // parser.
  string latest_parser_version = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// A suggested event type and it's confidence value.
message EventTypesSuggestion {
  // The suggested event_type.
  backstory.Metadata.EventType event_type = 1;

  // Confidence value for respective event_type, value ranges from 0-1.
  float confidence_value = 2;
}

// Request message for UpdateParser.
message UpdateParserRequest {
  // Required. The parser.name field is used to identify the parser to update.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}/parsers/{parser}
  // The parser to update.
  Parser parser = 1 [(google.api.field_behavior) = REQUIRED];

  // Optional. The list of fields to update.
  // 1. If update_mask is not included in the request, error will be returned.
  // 2. If update_mask is present and paths includes only "*" then all fields
  // which are supported by UpdateParserRequest will be updated irrespective
  // of whether they are present in the request or not. Fields which are not
  // present in the request will be set to nil/false value.
  // 3. To update partial attributes in Parser, the relevant attributes
  // should be provided like Parser.<path> for each attribute. For eg
  // to update auto_upgrade_off, parser.version_info.auto_upgrade_off should
  // be provided in the paths of the update_mask. If attribute is present in
  // paths but not present in the request, it will be set to false.
  // 4. If only `parser` is provided in the paths, all the attributes in
  // parser will be updated.
  // Supported paths are -
  // version_info.auto_upgrade_off
  // state
  google.protobuf.FieldMask update_mask = 2
      [(google.api.field_behavior) = OPTIONAL];
}

// Request message for FetchParserCandidates.
message FetchParserCandidatesRequest {
  // Required. The name, which owns this collection of parsers.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}/parsers/{parser}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Parser"
    }
  ];

  // Required. Customer action for which the customer needs candidates.
  ParserAction parser_action = 2 [(google.api.field_behavior) = REQUIRED];
}

// Response message for FetchParserCandidates.
message FetchParserCandidatesResponse {
  // Output only. The candidates to which customer can move to.
  repeated Parser candidates = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
}
