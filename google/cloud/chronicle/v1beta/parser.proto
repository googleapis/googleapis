syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "backstory/entity.proto";
import "backstory/udm.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/rpc/status.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "ParserProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";

// ParserService exposes resources and endpoints related to log parsing.
service ParserService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // Create a parser.
  rpc CreateParser(CreateParserRequest) returns (Parser) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/instances/*/logTypes/*}/parsers"
      body: "parser"
    };
    option (google.api.method_signature) = "parent,parser";
  }

  // Get a parser.
  rpc GetParser(GetParserRequest) returns (Parser) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/logTypes/*/parsers/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // List all parsers.
  // `-` can be used as wildcard value for {log_type}
  rpc ListParsers(ListParsersRequest) returns (ListParsersResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*/logTypes/*}/parsers"
    };
    option (google.api.method_signature) = "parent";
  }

  // Delete a parser.
  rpc DeleteParser(DeleteParserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1beta/{name=projects/*/locations/*/instances/*/logTypes/*/parsers/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // RunParser runs the parser against a log and returns normalized events or
  // any error that occurred during the normalization.
  rpc RunParser(RunParserRequest) returns (RunParserResponse) {
    option (google.api.http) = {
      post: "/v1beta/{logtype=projects/*/locations/*/instances/*/logTypes/*}:runParser"
      body: "*"
    };
    option (google.api.method_signature) = "logtype";
  }

  // ActivateParser switches the customer to use requested parser,
  // This will set the Parser state to ACTIVE.
  // This method prevents parser activation when the customer:
  // 1. Is currently using a Custom parser, but wants to
  //    activate a Prebuilt release parser
  //      - DeactivateParser is the preferred method here.
  // 2. Wants to activate a Prebuilt release_candidate parser.
  //      - ActivateReleaseCandidateParser is the preferred method here.
  rpc ActivateParser(ActivateParserRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1beta/{name=projects/*/locations/*/instances/*/logTypes/*/parsers/*}:activate"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // DeactivateParser deactivates the requested parser, and activates the
  // prebuilt release parser. This method can be used to:
  // 1. Deactivate the custom parser.
  // 2. Deactivate the release candidate parser.
  rpc DeactivateParser(DeactivateParserRequest)
      returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1beta/{name=projects/*/locations/*/instances/*/logTypes/*/parsers/*}:deactivate"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // ActivateReleaseCandidateParser makes the release candidate parser live for
  // that customer.
  // The name refers to release candidate parser that needs to be activated.
  rpc ActivateReleaseCandidateParser(ActivateReleaseCandidateParserRequest)
      returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1beta/{name=projects/*/locations/*/instances/*/logTypes/*/parsers/*}:activateReleaseCandidateParser"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // CopyPrebuiltParser makes a copy of a prebuilt parser.
  rpc CopyPrebuiltParser(CopyPrebuiltParserRequest) returns (Parser) {
    option (google.api.http) = {
      post: "/v1beta/{name=projects/*/locations/*/instances/*/logTypes/*/parsers/*}:copy"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Get a validation report.
  rpc GetValidationReport(GetValidationReportRequest)
      returns (ValidationReport) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/logTypes/*/parsers/*/validationReports/*}"
      additional_bindings {
        get: "/v1beta/{name=projects/*/locations/*/instances/*/logTypes/*/parserExtensions/*/validationReports/*}"
      }
    };
    option (google.api.method_signature) = "name";
  }

  // List parsing errors of a validation report.
  rpc ListParsingErrors(ListParsingErrorsRequest)
      returns (ListParsingErrorsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*/logTypes/*/parsers/*/validationReports/*}/parsingErrors"
      additional_bindings {
        get: "/v1beta/{parent=projects/*/locations/*/instances/*/logTypes/*/parserExtensions/*/validationReports/*}/parsingErrors"
      }
    };
    option (google.api.method_signature) = "parent";
  }

  // Create a parser extension.
  rpc CreateParserExtension(CreateParserExtensionRequest)
      returns (ParserExtension) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/instances/*/logTypes/*}/parserExtensions"
      body: "parser_extension"
    };
    option (google.api.method_signature) = "parent,parser_extension";
  }

  // Get a parser extension.
  rpc GetParserExtension(GetParserExtensionRequest) returns (ParserExtension) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/logTypes/*/parserExtensions/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // List all parser extensions.
  rpc ListParserExtensions(ListParserExtensionsRequest)
      returns (ListParserExtensionsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*/logTypes/*}/parserExtensions"
    };
    option (google.api.method_signature) = "parent";
  }

  // ActivateParserExtension switches the customer to use requested parser
  // extension, This will set the extension state to ACTIVE.
  rpc ActivateParserExtension(ActivateParserExtensionRequest)
      returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1beta/{name=projects/*/locations/*/instances/*/logTypes/*/parserExtensions/*}:activate"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Delete a parser extension.
  rpc DeleteParserExtension(DeleteParserExtensionRequest)
      returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1beta/{name=projects/*/locations/*/instances/*/logTypes/*/parserExtensions/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // ExtractSyslog extracts structured part of log from a unstructured log
  // by running a grok regex over it. The target field indicates the structured
  // part.
  // For a raw log: "123.249.198.123 structured_part"
  // And preprocess config this:
  // regex: "%{IP:Principal_ip} %{GREEDYDATA:data}", target: "data"
  // This will generate:
  // map<string, string> {"data": "structured_part"}
  rpc ExtractSyslog(ExtractSyslogRequest) returns (ExtractSyslogResponse) {
    option (google.api.http) = {
      post: "/v1beta/{instance=projects/*/locations/*/instances/*}:extractSyslog"
      body: "*"
    };
    option (google.api.method_signature) = "instance";
  }

  // GenerateUDMKeyValueMappings generates key value mapping of a raw log.
  // For a JSON raw log
  // {
  //   "menu": {
  //       "id": "file",
  //       "popup": {
  //               "value": "New",
  //           }
  //       }
  // }
  // The generated key value mappings will be:
  //   "menu.id": "file"
  //   "menu.popup.value": "New"
  rpc GenerateUDMKeyValueMappings(GenerateUDMKeyValueMappingsRequest)
      returns (GenerateUDMKeyValueMappingsResponse) {
    option (google.api.http) = {
      post: "/v1beta/{instance=projects/*/locations/*/instances/*}:generateUdmKeyValueMappings"
      body: "*"
    };
    option (google.api.method_signature) = "instance";
  }

  // GenerateEventTypesSuggestions generates event types suggestions that can be
  // mapped by a lowcode parser.
  rpc GenerateEventTypesSuggestions(GenerateEventTypesSuggestionsRequest)
      returns (GenerateEventTypesSuggestionsResponse) {
    option (google.api.http) = {
      post: "/v1beta/{logtype=projects/*/locations/*/instances/*/logTypes/*}:generateEventTypesSuggestions"
      body: "*"
    };
    option (google.api.method_signature) = "logtype";
  }

  // Get a parser vaildation report.
  rpc GetExtensionValidationReport(GetExtensionValidationReportRequest)
      returns (ExtensionValidationReport) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/logTypes/*/parserExtensions/*/extensionValidationReports/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // List all parser validation reports for a parser extension.
  rpc ListExtensionValidationReports(ListExtensionValidationReportsRequest)
      returns (ListExtensionValidationReportsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*/logTypes/*/parserExtensions/*}/extensionValidationReports"
    };
    option (google.api.method_signature) = "parent";
  }

  // List validation errors of a parser extension validation report.
  rpc ListValidationErrors(ListValidationErrorsRequest)
      returns (ListValidationErrorsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*/logTypes/*/parserExtensions/*/extensionValidationReports/*}/validationErrors"
    };
    option (google.api.method_signature) = "parent";
  }

  // LegacySubmitParserExtension creates validates and then makes the extension
  // live.
  rpc LegacySubmitParserExtension(LegacySubmitParserExtensionRequest)
      returns (ParserExtension) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/instances/*/logTypes/*}:legacySubmitParserExtension"
      body: "*"
    };
    option (google.api.method_signature) = "parent,parser_extension";
  }

  // Update a parser.
  rpc UpdateParser(UpdateParserRequest) returns (Parser) {
    option (google.api.http) = {
      patch: "/v1beta/{parser.name=projects/*/locations/*/instances/*/logTypes/*/parsers/*}"
      body: "parser"
    };
    option (google.api.method_signature) = "parser,update_mask";
  }

  // FetchParserCandidates fetches the parser candidates for a given log type.
  rpc FetchParserCandidates(FetchParserCandidatesRequest)
      returns (FetchParserCandidatesResponse) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/logTypes/*/parsers/*}:fetchParserCandidates"
    };
    option (google.api.method_signature) = "name";
  }
}

// Specifies the amount of detail to return for a parser.
enum ParserView {
  // The default / unset value.
  // The API will default to the FULL view for backward compatibility.
  PARSER_VIEW_UNSPECIFIED = 0;

  // Include basic metadata about the parser, but not the full contents like
  // config.
  BASIC_VIEW = 1;

  // Include everything.
  FULL_VIEW = 2;
}

// Log format of the raw log. valid log formats are JSON, XML and CSV.
enum LogFormat {
  // Log format was unspecified.
  LOG_FORMAT_UNSPECIFIED = 0;

  // Log format was JSON.
  JSON = 1;

  // Log format was CSV.
  CSV = 2;

  // Log format was XML.
  XML = 3;
}

// ParserAction represents the action that the customer can take on a parser.
enum ParserAction {
  // The action is not specified.
  PARSER_ACTION_UNSPECIFIED = 0;

  // The action is to upgrade the parser.
  PARSER_ACTION_UPGRADE = 1;

  // The action is to rollback the parser.
  PARSER_ACTION_ROLLBACK = 2;

  // The action is to opt in to preview.
  PARSER_ACTION_OPT_IN_TO_PREVIEW = 3;

  // The action is to opt out of preview.
  // This action is only valid for parsers which have been opted into preview.
  PARSER_ACTION_OPT_OUT_OF_PREVIEW = 4;
}

// Parser converts a raw log to UDM Events.
message Parser {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/Parser"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}/parsers/{id}"
  };

  // Information about the creator of the parser.
  message Creator {
    // Source represents the source of the parser.
    enum Source {
      // Source is unspecified.
      SOURCE_UNSPECIFIED = 0;

      // A prebuilt parser, present in Google's system.
      GOOGLE = 1;

      // The custom parser copied from a prebuilt parser and present in Google's
      // system.
      CUSTOM_GOOGLE_OVERRIDE = 2;

      // The custom parser, made by a partner.
      PARTNER = 3;

      // The customer parser, made by the customer.
      CUSTOMER = 4;
    }

    // Output only. The customer who created it, This can represent the partner
    // as well. In case of prebuilt parser this will be empty.
    string customer = 1 [
      (google.api.field_behavior) = OUTPUT_ONLY,
      (google.api.resource_reference) = {
        type: "chronicle.googleapis.com/Instance"
      }
    ];

    // Output only. The name of the author, who created this parser.
    string author = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

    // Output only. The source of the parser.
    Source source = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
  }

  // Type represents type of the parser.
  enum Type {
    // Type is unspecified.
    TYPE_UNSPECIFIED = 0;

    // The parser is specific to a customer or partner.
    CUSTOM = 1;

    // The parser is created and managed by Google Cloud in Chronicle.
    PREBUILT = 2;
  }

  // ReleaseStage represents the possible release stages of the parser.
  enum ReleaseStage {
    // The release stage is not specified.
    RELEASE_STAGE_UNSPECIFIED = 0;

    // The parser is RELEASED and can be used in production.
    RELEASE = 1;

    // The prebuilt parser is a release candidate.
    RELEASE_CANDIDATE = 2;

    // The prebuilt parser is a rollback candidate.
    ROLLBACK_CANDIDATE = 3;

    // The parser has been ARCHIVED.
    ARCHIVED = 4;

    // The parser has been marked faulty, and is available for auto deletion.
    FAULTY = 5;

    // Archived parser which is currently in use.
    // This is possible if customer has pinned parser which was later archived.
    ARCHIVED_IN_USE = 6;
  }

  // ValidationStage represents the possible validation states of the parser.
  enum ValidationStage {
    // The validation stage is not specified.
    VALIDATION_STAGE_UNSPECIFIED = 0;

    // The custom parser is submitted for validation.
    NEW = 1;

    // The custom parser is currently going through the validation pipeline
    VALIDATING = 2;

    // The custom parser has successfully passed the validation.
    PASSED = 3;

    // The custom parser has failed validation.
    FAILED = 4;

    // The parser is no good, It is available for auto deletion.
    DELETE_CANDIDATE = 5;

    // Internal error occurred during validation.
    INTERNAL_ERROR = 6;

    // Validation was skipped.
    VALIDATION_SKIPPED = 7;
  }

  // State of the parser.
  enum State {
    // State is unspecified.
    STATE_UNSPECIFIED = 0;

    // The parser is active.
    ACTIVE = 1;

    // The parser is inactive.
    INACTIVE = 2;
  }

  // Config of the parser.
  oneof config {
    // if the parser is built using config
    // documentation:
    // https://cloud.google.com/chronicle/docs/preview/parser-extensions/parsing-overview
    bytes cbn = 3;

    // if the parser is built using the low code feature.
    LowCodeParser low_code = 4;
  }

  oneof stage {
    // Output only. The release stage of the parser
    // After internal validations the prebuilt parser will directly start as
    // Release Candidate. The release_stage of prebuilt parsers are changed
    // after every release cycle:
    // The prebuilt Release Candidate parser is promoted as Release parser.
    // The existing prebuilt Release parser is moved to Rollback state.
    // and existing prebuilt rollback parser is moved to Archived.
    // In case of custom parser:
    // When the customer submits a validation passed custom parser it starts as
    // Release state.
    // And existing one is moved to Rollback stage.
    // And the existing rollback is moved to Archived.
    // In case a release or release candidate parser is found faulty,
    // the parser is marked FAULTY,
    // if it is release parser then rollback candidate is moved to release.
    ReleaseStage release_stage = 10 [(google.api.field_behavior) = OUTPUT_ONLY];

    // Output only. The validation stage of the parser
    // When a customer submits a new parser for validation, it starts with a
    // new stage.
    // When parser is picked for validation, it changes to Validation state.
    // If validation failed it is marked as failed, and
    // existing failed is moved to delete_candidate stage.
    // If passes it is moved to passed stage.
    // If customer opts to submit it, the parser is moved to Release State.
    ValidationStage validation_stage = 11
        [(google.api.field_behavior) = OUTPUT_ONLY];
  }

  // Output only. name of the parser resource.
  string name = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Creator of the parser.
  Creator creator = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Time at which parser was created.
  google.protobuf.Timestamp create_time = 6
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Represents all the changes made into this parser.
  Changelogs changelogs = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Extension applied over the parser, if any.
  string parser_extension = 9 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/ParserExtension"
    }
  ];

  // Output only. Dynamic parsing config applied over the parser, if any.
  string dynamic_parsing_config = 16 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/ParserExtension"
    }
  ];

  // Output only. The type of the parser
  Type type = 12 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The state of the parser
  State state = 13 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The Validation report generated during parser validation.
  string validation_report = 14 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/ValidationReport"
    }
  ];

  // Optional. Flag to bypass parser validation when no logs are found.
  // If enabled, the parser won't be be rejected during the validation
  // phase when no logs are found.
  bool validated_on_empty_logs = 15 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The version information of the parser.
  ParserVersionInfo version_info = 17 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If true, bypasses parser validation.
  // If enabled, the parser won't be rejected during the validation
  // phase and validation will be skipped.
  bool validation_skipped = 18 [(google.api.field_behavior) = OPTIONAL];
}

// ValidationReport describes the validation status of a parser/extension when
// it was created.
message ValidationReport {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/ValidationReport"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}/parsers/{parser}/validationReports/{validation_report}"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}/parserExtensions/{extension}/validationReports/{validation_report}"
  };

  // Stats represents the statistics generated by running the parser/extension
  // over a set of sample logs.
  message Stats {
    // Count of log entries parsed.
    int64 log_entry_count = 1;

    // Count of log entries which successfully created valid events.
    int64 successfully_normalized_log_count = 2;

    // Count of log entries which failed to create a valid event.
    int64 failed_log_count = 3;

    // Count of log entries which were skipped in parsing because they were
    // invalid.
    int64 invalid_log_count = 4;

    // Count of times "on_error" was encountered while parsing.
    // An `on_error` field is used in CBN config to catch an error and handle.
    // `on_error_count` counts the number of times errors were handled while
    // parsing the logs.
    int64 on_error_count = 5;

    // Count of events generated.
    int64 event_count = 6;

    // Count of events created of type GENERIC_EVENT.
    int64 generic_event_count = 7;

    // Stats to account for events created.
    // It stores invalid event reasons and the count corresponding to it.
    map<string, int64> event_category_counts = 8;

    // Stats to account for number of logs dropped.
    // When we drop a log line from parsing, we specify a drop tag.
    // We tag it to identify the reason of drop.
    // `drop_tag_counts` stores the reason for drop and the count corresponding
    // to it.
    map<string, int64> drop_tag_counts = 9;

    // Max time taken to parse a log entry.
    google.protobuf.Duration max_parse_duration = 10;

    // Average parse time taken to parse a log entry.
    google.protobuf.Duration avg_parse_duration = 11;

    // Percentage of log lines that successfully generated at least 1 valid
    // event.
    int64 normalization_percentage = 12;

    // Percentage of events that have event_type as GENERIC_EVENT.
    int64 generic_event_percentage = 13;
  }

  // Validation Errors encountered during parser/extension creation.
  message ParsingValidationErrors {
    // Any parsing errors encountered while parsing a log entry, this has
    // cap of size 10.
    repeated string parsing_errors = 1 [(google.api.resource_reference) = {
      type: "chronicle.googleapis.com/ParsingError"
    }];

    // Error for invalid config.
    string invalid_config_error = 2;

    // True, if there are more validation errors.
    bool has_more_parsing_error = 3;
  }

  // Verdict represents verdict of the parser validation.
  enum Verdict {
    // The verdict is unspecified.
    VERDICT_UNSPECIFIED = 0;

    // The validation has passed.
    PASS = 1;

    // The validation has failed.
    FAIL = 2;

    // Validation was skipped.
    SKIPPED = 3;
  }

  // Output only. name of the validation report resource.
  string name = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Verdict of the validation.
  Verdict verdict = 2;

  // Stats of the validation.
  Stats stats = 3;

  // Errors occurred during validation.
  ParsingValidationErrors error = 4;
}

// Parsing error encountered while validating the parser extension.
message ParsingError {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/ParsingError"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}/parsers/{parser}/validationReports/{validation_report}/parsingErrors/{id}"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}/parserExtensions/{extension}/validationReports/{validation_report}/parsingErrors/{id}"
  };

  // Output only. The name of this Parsing Error .
  // Output only. The resource name of the parsing error.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/validationReports/{validation_report}/parsingErrors/{id}
  string name = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Data of the Log entry that caused the error.
  bytes log_data = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Error message when parsing the log.
  google.rpc.Status error = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// ParserExtension provides extensibility semantics for a log parser.
message ParserExtension {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/ParserExtension"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}/parserExtensions/{parser_extension_id}"
  };

  // State of parser extension.
  enum State {
    // The state for this parser extension was not specified.
    STATE_UNSPECIFIED = 0;

    // The parser extension has been newly submitted and is waiting to be
    // validated.
    NEW = 1;

    // The parser extension is currently going through the validation
    // pipeline.
    VALIDATING = 2;

    // The parser extension is live in production. Only configs that have
    // successfully passed the validation stage will be set to LIVE.
    LIVE = 3;

    // Validation completed, but the parser extension was rejected with
    // errors.
    REJECTED = 5;

    // An error occurred when processing this parser extension.
    INTERNAL_ERROR = 6;

    // Extension is validated.
    VALIDATED = 7;

    // Extension is archived and is no more being used.
    ARCHIVED = 8;

    // Extension validation was skipped.
    VALIDATION_SKIPPED = 9;
  }

