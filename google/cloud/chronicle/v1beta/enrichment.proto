syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "EnrichmentProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";

// EnrichmentService provides APIs for enrichment related operations.
service EnrichmentService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // Get the EnrichmentCombination.
  rpc GetEnrichmentCombination(GetEnrichmentCombinationRequest)
      returns (EnrichmentCombination) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/enrichmentCombination}"
    };
    option (google.api.method_signature) = "name";
  }
}

// The type of enrichment. It can be expanded to include more types in the
// future.
enum EnrichmentType {
  // Unspecified.
  ENRICHMENT_TYPE_UNSPECIFIED = 0;

  // ALL enrichment types.
  ALL_ENRICHMENT_TYPES = 1;

  // Asset enrichment.
  ASSET_ENRICHMENT = 2;

  // User enrichment.
  USER_ENRICHMENT = 3;

  // Process enrichment.
  PROCESS_ENRICHMENT = 4;

  // Google Threat Intel enrichment.
  GOOGLE_THREAT_INTEL_ENRICHMENT = 5;

  // GeoIP enrichment.
  GEO_IP_ENRICHMENT = 6;
}

// Request message for getting the enrichment combination.
message GetEnrichmentCombinationRequest {
  // Required. The name of the enrichment combination to retrieve.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/enrichmentCombination
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/EnrichmentCombination"
    }
  ];
}

// EnrichmentCombination resource represents the combination of enrichment. It
// is a singleton resource that contains all the enrichment combination records.
message EnrichmentCombination {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/EnrichmentCombination"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/enrichmentCombination"
    plural: "enrichmentCombination"
    singular: "enrichmentCombination"
  };

  // Identifier. The resource name of the enrichment combination.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/enrichmentCombination
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Output only. All the enrichment combination records.
  repeated EnrichmentCombinationRecord enrichment_combination_records = 2
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// EnrichmentCombinationRecord represents a record of enrichment combination.
message EnrichmentCombinationRecord {
  // Required. The type of enrichment.
  EnrichmentType enrichment_type = 1 [(google.api.field_behavior) = REQUIRED];

  // Required. The log type of an event that is enriched.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}
  string enrichment_target_log_type = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/LogType"
    }
  ];

  // The enrichment source that an enrichment is from. For source that comes
  // from external and does not have a log type, for example, `GEO_IP_SERVICE`,
  // the `ExternalEnrichmentSource` field should be set.
  EnrichmentSource enrichment_source = 3;
}

// The enrichment source that an enrichment is from. For source that comes from
// external and does not have a log type, for example, `GEO_IP_SERVICE`, the
// `ExternalEnrichmentSource` field should be set.
message EnrichmentSource {
  // The external enrichment sources that do not have a log type associated with
  // it.
  enum ExternalEnrichmentSource {
    // Unspecified.
    EXTERNAL_ENRICHMENT_SOURCE_UNSPECIFIED = 0;

    // GeoIP service.
    GEO_IP_SERVICE = 1;
  }

  // The source of an enrichment can be either a log type or an external
  // enrichment source that does not have a log type.
  oneof source {
    // Required. Raw LogType of an enrichment source.
    // Format:
    // projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}
    string log_type = 3 [
      (google.api.field_behavior) = REQUIRED,
      (google.api.resource_reference) = {
        type: "chronicle.googleapis.com/LogType"
      }
    ];

    // Required. Represents an enrichment source from external that does not
    // have a log type. For example, GEO_IP_SERVICE for enrichment from the
    // GeoIP service.
    ExternalEnrichmentSource external_enrichment_source = 4
        [(google.api.field_behavior) = REQUIRED];
  }
}
