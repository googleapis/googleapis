syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/cloud/chronicle/backstory/udm.proto";
import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "google/type/date.proto";
import "google/type/interval.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "EventProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";

// EventService contains apis for finding events.
service EventService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // Gets an event given a name.
  rpc GetEvent(GetEventRequest) returns (Event) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/events/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Gets a batch (list) of events given a list of names and a parent.
  rpc BatchGetEvents(BatchGetEventsRequest) returns (BatchGetEventsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/events:batchGet"
    };
    option (google.api.method_signature) = "parent";
  }

  // Performs a UDM search that returns matching events for the query.
  rpc UdmSearch(UdmSearchRequest) returns (UdmSearchResponse) {
    option (google.api.http) = {
      get: "/v1beta/{instance=projects/*/locations/*/instances/*}:udmSearch"
    };
    option (google.api.method_signature) = "instance";
  }

  // Validates UDM search query by compiling the query.
  rpc ValidateQuery(ValidateQueryRequest) returns (ValidateQueryResponse) {
    option (google.api.http) = {
      get: "/v1beta/{instance=projects/*/locations/*/instances/*}:validateQuery"
    };
    option (google.api.method_signature) = "instance";
  }

  // Gets available product sources along with their stats.
  rpc QueryProductSourceStats(QueryProductSourceStatsRequest)
      returns (QueryProductSourceStatsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{instance=projects/*/locations/*/instances/*}:queryProductSourceStats"
    };
    option (google.api.method_signature) = "instance";
  }

  // Finds ingested UDM field values that match a query.
  rpc FindUdmFieldValues(FindUdmFieldValuesRequest)
      returns (FindUdmFieldValuesResponse) {
    option (google.api.http) = {
      get: "/v1beta/{instance=projects/*/locations/*/instances/*}:findUdmFieldValues"
    };
    option (google.api.method_signature) = "instance";
  }
}

// The type of the query in the request.
enum QueryType {
  // The default query type.
  QUERY_TYPE_UNSPECIFIED = 0;

  // Unified Data Model Query.
  QUERY_TYPE_UDM_QUERY = 1;

  // Raw Log Query.
  QUERY_TYPE_RAW_LOG_QUERY = 2;

  // Dashboards Query.
  QUERY_TYPE_DASHBOARD_QUERY = 3;

  // Stats Query.
  QUERY_TYPE_STATS_QUERY = 4;

  // DataTable Query.
  QUERY_TYPE_DATA_TABLE_QUERY = 5;

  // Entity Query.
  QUERY_TYPE_ENTITY_GRAPH_QUERY = 6;

  // UDM_Datatable Joins  Query.
  QUERY_TYPE_UDM_DATATABLE_JOIN = 7;

  // Joins in Stats Query.
  QUERY_TYPE_JOIN_STATS_QUERY = 8;

  // Joins Query.
  QUERY_TYPE_JOIN_QUERY = 9;

  // Detections Query.
  QUERY_TYPE_DETECTION_QUERY = 10;

  // Multistage Query.
  QUERY_TYPE_MULTISTAGE = 11;

  // Multistage Joins Query.
  QUERY_TYPE_MULTISTAGE_JOINS = 12;

  // Case Query.
  QUERY_TYPE_CASE_QUERY = 13;

  // Case History Query.
  QUERY_TYPE_CASE_HISTORY_QUERY = 14;
}

// The language the query is written in.
enum QueryLanguage {
  // The default query language.
  QUERY_LANGUAGE_UNSPECIFIED = 0;

  // The query is written in YARA-L 2.
  QUERY_LANGUAGE_YL2 = 1;

  // The query is written in GoogleSQL.
  QUERY_LANGUAGE_SQL = 2;
}

// Event is a resource that contains information about a telemetry event.
message Event {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/Event"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/events/{event}"
  };

  // The resource name of the event.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/events/{event}
  // where 'event' is URL-encoded Base64. The unencoded value of 'event' can
  // also be found in udm.metadata.id.
  string name = 1;

  // Event data in UDM format.
  backstory.UDM udm = 2;
}

// Request message to retrieve a event.
message GetEventRequest {
  // Required. The ID of the event to retrieve.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/events/{event}
  // where 'event' is URL-encoded Base64.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = { type: "chronicle.googleapis.com/Event" }
  ];
}

// Request message to retrieve a batch of events.
message BatchGetEventsRequest {
  // Required. Parent that owns this batch of events.
  // Format: projects/{project}/locations/{region}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/Event"
    }
  ];

  // Required. Event names to retrieve, in URL-encoded Base64.
  repeated string names = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = { type: "chronicle.googleapis.com/Event" }
  ];
}

// Response message for BatchGetEvents. This is a list of events.
message BatchGetEventsResponse {
  // Retrieved events.
  repeated Event events = 1;
}

// Request to get a list of events matching the query.
message UdmSearchRequest {
  // Specifies the dialect a UDM Search Query is written in.
  enum QueryDialect {
    // Defaults to YL2.
    QUERY_DIALECT_UNSPECIFIED = 0;

    // YL2 query dialect.
    YL2 = 1;

    // SQL query dialect.
    SQL = 2;
  }

  // Required. Chronicle instance this request is sent to.
  // Format: projects/{project}/locations/{location}/instances/{instance}
  string instance = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Instance"
    }
  ];

  // Required. The boolean query to search for.
  // Example: 'ip=/172.*/ AND metadata.event_type!="NETWORK_CONNECTION" AND (
  // target.ip = "3.225.179.73" OR target.ip = "23.47.48.70")'
  string query = 2 [(google.api.field_behavior) = REQUIRED];

  // Required. Time range to search for [Inclusive start time, exclusive end
  // time).
  google.type.Interval time_range = 3 [(google.api.field_behavior) = REQUIRED];

  // Maximum number of results to be returned for the query.
  // Anything over 10000 will be coerced to 10000.
  int32 limit = 4;

  // Optional. Specifieshe language that the query string is written in.
  QueryDialect query_dialect = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Returns results matching the query and time range in UdmSearchRequest.
message UdmSearchResponse {
  // Stats results when the query is for statistics
  message StatsData {
    // Represents a single value in the set of values returned as the stats
    // query result.
    message StatsColumnValue {
      // Value of the column based on data type
      oneof value {
        // True if the value is NULL.
        bool null_val = 1;

        // Boolean value.
        bool bool_val = 2;

        // Bytes value.
        bytes bytes_val = 3;

        // Double value.
        double double_val = 4;

        // Integer value (signed).
        int64 int64_val = 5;

        // Un-signed integer value.
        uint64 uint64_val = 6;

        // String value. Enum values are returned as strings.
        string string_val = 7;

        // Timestamp values.
        google.protobuf.Timestamp timestamp_val = 8;

        // Date values.
        google.type.Date date_val = 9;

        // For any proto values that are not any of the above.
        google.protobuf.Any proto_val = 10;
      }
    }

    // Singular vs list of values in a column.
    message StatsColumnType {
      // Store list of values in a column.
      message StatsList {
        // List of values in one cell of the column.
        repeated StatsColumnValue values = 1;
      }

      // Store single value or list of values in a column.
      oneof type {
        // Single value in a column.
        StatsColumnValue value = 1;

        // List of values in a column e.g. IPs
        StatsList list = 2;
      }
    }

    // Represents a single column in the set of columns returned as the stats
    // query result.
    message StatsColumnData {
      // Used to store column names.
      string column = 1;

      // Store list of values in a column.
      repeated StatsColumnType values = 2;
    }

    // Result rows that are queried.
    repeated StatsColumnData results = 1;

    // If true, there are too many results to return and some have been omitted.
    bool too_many_results = 2;

    // Indicates to the frontend that the result is a join-stats result.
    bool has_join = 3;

    // Indicates to the frontend that the result contains a data-table.
    bool has_data_table = 4;
  }

  // List of matched events.
  repeated Event events = 1;

  // Too many events matched the search criterion, some results have been
  // omitted.
  bool more_data_available = 2;

  // Stats response for the query.
  StatsData stats = 3;
}

// Request to validate raw_query's syntax.
message ValidateQueryRequest {
  // The dialect a UDM Search Query is written in.
  enum Dialect {
    // Unknown dialect.
    DIALECT_UNSPECIFIED = 0;

    // Legacy Structured Query dialect.
    DIALECT_LEGACY = 1;

    // UDM Search dialect.
    DIALECT_UDM_SEARCH = 2;

    // Stats Query Dialect
    DIALECT_STATS = 3;

    // SQL Dialect
    DIALECT_SQL = 4;
  }

  // Required. The name of the parent resource, which is the SecOps instance
  // this request is sent to. Format:
  // projects/{project}/locations/{location}/instances/{instance}
  string instance = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Instance"
    }
  ];

  // Query to compile and validate.
  // Example: 'ip=/172.*/ AND metadata.event_type!="NETWORK_CONNECTION" AND (
  // target.ip = "3.225.179.73" OR target.ip = "23.47.48.70")'
  string raw_query = 2;

  // Query dialect.
  Dialect dialect = 3;

  // Optional. If true, allows for unreplaced $placeholder values. Otherwise,
  // they would result in error.
  bool allow_unreplaced_placeholders = 4
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. If true, the query is a federated query.
  bool is_federated_query = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Captures the position of the error in the query.
message CompilationErrorPosition {
  // The start line of the error in the query.
  int32 start_line = 1;

  // The start column of the error in the query.
  int32 start_column = 2;

  // The end line of the error in the query.
  int32 end_line = 3;

  // The end column of the error in the query.
  int32 end_column = 4;
}

// Returns syntax error, if request's raw_query is invalidated.
message ValidateQueryResponse {
  // Error type encountered during compilation of search query.
  enum ErrorType {
    // The default error type.
    ERROR_TYPE_UNSPECIFIED = 0;

    // The query has invalid type.
    INVALID_QUERY_TYPE = 1;

    // The field path in the query is invalid.
    INVALID_FIELD_PATH_TYPE = 2;

    // The query contains unclosed bracket.
    UNCLOSED_BRACKET_TYPE = 3;

    // General backend error.
    BACKEND_ERROR_TYPE = 4;

    // The query contains unclosed quotes.
    UNCLOSED_QUOTES_TYPE = 5;

    // The query is too large to be processed.
    QUERY_TOO_LARGE_TYPE = 6;
  }

  // The type of the error.
  ErrorType error_type = 1;

  // The parse error message.
  string error_text = 2;

  // Query type obtained from the request
  QueryType query_type = 3;

  // Captures the position of the error in the query.
  CompilationErrorPosition error_position = 4;
}

// Request to list log source and associated data size in query time range.
message QueryProductSourceStatsRequest {
  // Required. Chronicle instance this request is sent to.
  // Format: projects/{project}/locations/{location}/instances/{instance}
  string instance = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Instance"
    }
  ];

  // Optional. Time range for finding product sources [inclusive start time,
  // exclusive end time). If not povided, returns log sources for all retained
  // logs.
  google.type.Interval time_range = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Product source and data size for it.
message ProductSourceStat {
  // Product source.
  string product_source = 1;

  // Data size in bytes for specific product sources.
  int64 data_size_bytes = 2;

  // If there is no estimation data.
  // By default it is false.
  bool no_data = 3;
}

// Return list of available log source and their stats.
message QueryProductSourceStatsResponse {
  // Amount of data per log source.
  repeated ProductSourceStat product_source_stats = 1;
}

// Request to find ingested UDM field values that match a query.
message FindUdmFieldValuesRequest {
  // Required. Chronicle instance this request is sent to.
  // Format: projects/{project}/locations/{location}/instances/{instance}
  string instance = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Instance"
    }
  ];

  // Required. The partial UDM field value to match.
  string query = 2 [(google.api.field_behavior) = REQUIRED];

  // Optional. The maximum number of value matches to return. The service may
  // return fewer matches than this value. If unspecified, defaults to 250. The
  // maximum value is 1000; values above 1000 will be coerced to 1000. This
  // field replaces the deprecated `page_size` field.
  int32 limit = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Ingested UDM field values that match a query.
message FindUdmFieldValuesResponse {
  // A UDM field value that matches the query.
  message ValueMatch {
    // The UDM field containing the matching value.
    string field_path = 1;

    // The matching value.
    string value = 2;

    // The approximate time of the last ingestion of the value.
    google.protobuf.Timestamp ingestion_time = 3;

    // The index within `value` where the matching text starts.
    int32 match_start = 4;

    // The index within `value` where the matching text ends (exclusive).
    int32 match_end = 5;
  }

  // A UDM field that might contain a value that matches the query.
  message FieldMatch {
    // The UDM field that might contain a matching value.
    string field_path = 1;
  }

  // Values that match the query.
  repeated ValueMatch value_matches = 1;

  // Fields that might contain a matching value.
  repeated FieldMatch field_matches = 2;

  // A regular expression based on the query that can be used to find
  // matching values within the field-level matches.
  string field_match_regex = 3;

  // Indicates if there are more value matches available but were not returned
  // due to the `limit`.
  // This field replaces the deprecated `next_page_token` field.
  bool has_more_matches = 5;
}

// Request message to get the enriched event.
message FetchEnrichedEventRequest {
  // Required. The ID of the event to retrieve.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/events/{event}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = { type: "chronicle.googleapis.com/Event" }
  ];

  // Optional. The detection_id to return event data for. Events that are copied
  // to a detection can have different enrichment than the equivalent standalone
  // events, or the same event copied to a different detection.
  string detection_id = 2 [(google.api.field_behavior) = OPTIONAL];
}

// The sources of enrichment.
message EnrichmentSources {
  // Output only. The sources of enrichment for a given enriched field. This is
  // needed for on-the-fly Provenance where at read time we cannot determine the
  // enrichment source for a given field if more than one source is present.
  repeated EnrichingSource sources = 1
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Represents information about the enrichment source of an enriched field.
message EnrichingSource {
  // The source of the enrichment.
  oneof source {
    // Output only. The resource name of the Event that the enrichment data was
    // taken from.
    string event = 1 [
      (google.api.field_behavior) = OUTPUT_ONLY,
      (google.api.resource_reference) = {
        type: "chronicle.googleapis.com/Event"
      }
    ];

    // Output only. The resource name of the Entity that the enrichment data was
    // taken from.
    string entity = 2 [
      (google.api.field_behavior) = OUTPUT_ONLY,
      (google.api.resource_reference) = {
        type: "chronicle.googleapis.com/Entity"
      }
    ];
  }

  // Output only. The source of enrichment. For example, "GeoIP" or "Google
  // Threat Intel".
  string display_name = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Response message for FetchEnrichedEvent.
message FetchEnrichedEventResponse {
  // The enriched UDM event.
  backstory.UDM udm = 1;

  // A map of enriched fields in the parent event to information about where the
  // enriched data originated. The key of the map is the field path of the UDM
  // field. For example, "principal.user.windows_sid".
  // .
  // @deprecated Use udm_enriched_fields instead.
  map<string, EnrichingSource> enriched_fields = 2;

  // A map of enriched fields in the parent event to information about where the
  // enriched data originated. The key of the map is the field path of the UDM
  // field. For example, "principal.user.windows_sid".
  // The value is a list of sources that the enriched data was taken from.
  // This is needed for on-the-fly Provenance where at read time we cannot
  // determine the enrichment source for a given field if more than one source
  // is present.
  map<string, EnrichmentSources> udm_enriched_fields = 3;
}
