syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/cloud/chronicle/v1beta/event.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "UserDataEntriesProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";

// SharingMode specifies how a resource is shared with other users.
enum SharingMode {
  // Only the user that created the resource can read it.
  MODE_PRIVATE = 0;

  // Other users within the same customer can read this resource.
  MODE_SHARED_WITH_CUSTOMER = 1;
}

// Represents a Search Query from a Chronicle user.
message SearchQuery {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/SearchQuery"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/users/{user}/searchQueries/{search_uery}"
    plural: "searchQueries"
    singular: "searchQuery"
  };

  // Output only. Identifier. The resource name of the SearchQuery.
  string name = 1 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.field_behavior) = IDENTIFIER
  ];

  // Optional. Metadata about the search query.
  EntryMetadata metadata = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Name of the query to be shown in the UI.
  string display_name = 3 [(google.api.field_behavior) = OPTIONAL];

  // Required. The query the user is saving.
  string query = 4 [(google.api.field_behavior) = REQUIRED];

  // Optional. The 16 byte UUID for this query.
  bytes query_id = 5 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The user ID for this query.
  string user_id = 6 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Description of the overall query, to be shown in the UI.
  string description = 7 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Name of query placeholder value, to be shown in the UI. Each
  // element's position corresponds to the description in the
  // placeholder_descriptions field.
  repeated string placeholder_names = 8
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. Description of the placeholder value, to be shown in the UI.
  repeated string placeholder_descriptions = 9
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. The query type.
  QueryType query_type = 10 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If applicable, the natural language query used to generate the
  // UDM Search Query.
  string natural_language_query = 11 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If true, the search was performed in a case-insensitive manner.
  bool case_insensitive = 12 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The label of the column set added to the search query.
  // `column_set_label` maps to the `column_sets` field in the `PreferenceSet`
  // resource.
  string column_set_label = 13 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The query language.
  QueryLanguage query_language = 14 [(google.api.field_behavior) = OPTIONAL];
}

// Represents a SavedColumnSet from a Chronicle user. This contains a set of
// columns. which will be shown in the UI tables. This resource can also be
// shared with other users in the same customer.
message SavedColumnSet {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/SavedColumnSet"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/savedColumnSets/{saved_column_set}"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/users/{user}/savedColumnSets/{saved_column_set}"
    plural: "savedColumnSets"
    singular: "savedColumnSet"
  };

  // Identifier. The resource name of the SavedColumnSet.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/users/{user}/savedColumnSets/{saved_column_set}
  // Although note that it is not user settable.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Optional. Metadata about the SavedColumn.
  EntryMetadata metadata = 2 [(google.api.field_behavior) = OPTIONAL];

  // Required. Name of the SavedColumnSet to be shown in the UI.
  string display_name = 3 [(google.api.field_behavior) = REQUIRED];

  // Required. The list of column ids to show in the table.
  repeated string column_ids = 4 [(google.api.field_behavior) = REQUIRED];

  // Optional. Description of the overall SavedColumnSet, to be shown in the UI.
  string description = 5 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Whether the current user is the owner of the SavedColumnSet.
  optional bool owner = 6 [(google.api.field_behavior) = OPTIONAL];
}

// Metadata necessary for storage in the UserDataService backend.
message EntryMetadata {
  // Optional. Whether other users in the same customer can read this entry.
  SharingMode sharing_mode = 1 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The time that this entry was created.
  google.protobuf.Timestamp create_time = 2
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. The last time the entry was updated.
  google.protobuf.Timestamp update_time = 3
      [(google.api.field_behavior) = OPTIONAL];
}
