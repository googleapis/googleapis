syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "InstanceProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";

// InstanceService provides the entry interface for the Chronicle API.
service InstanceService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // Gets a Instance.
  rpc GetInstance(GetInstanceRequest) returns (Instance) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Updates an Instance.
  rpc UpdateInstance(UpdateInstanceRequest) returns (Instance) {
    option (google.api.http) = {
      patch: "/v1beta/{instance.name=projects/*/locations/*/instances/*}"
      body: "instance"
    };
    option (google.api.method_signature) = "instance,update_mask";
  }

  // GenerateCollectionAgentAuth generates an auth json file for the collection
  // agent.
  rpc GenerateCollectionAgentAuth(GenerateCollectionAgentAuthRequest)
      returns (GenerateCollectionAgentAuthResponse) {
    option (google.api.http) = {
      post: "/v1beta/{name=projects/*/locations/*/instances/*}:generateCollectionAgentAuth"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }
}

// A Instance represents an instantiation of the Instance product.
message Instance {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/Instance"
    pattern: "projects/{project}/locations/{location}/instances/{instance}"
    plural: "instances"
    singular: "instance"
  };

  // Frontend paths - workforce pool provider id mapping of the instance.
  message FrontendPathConfig {
    // Output only. Frontend path that is part of the instance.
    string frontend_path = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

    // Output only. Workforce pool provider id connected to the frontend path.
    // Format:
    // `locations/{location}/workforcePools/{workforce_pool_id}/providers/{provider_id}`
    string workforce_pool_provider_id = 2
        [(google.api.field_behavior) = OUTPUT_ONLY];
  }

  // Compliance requirements.
  message ComplianceRequirements {
    // Optional. A list of compliance certifications.
    repeated ComplianceCertification compliance_certifications = 1
        [(google.api.field_behavior) = OPTIONAL];
  }

  // Instance Configs represents the features that can be
  // enabled/disabled/configured by the customer
  message InstanceConfig {
    // Optional. The desired access state (true for enabled).
    bool secops_ui_enabled = 1 [(google.api.field_behavior) = OPTIONAL];

    // Optional. The desired access state for Data RBAC (true for enabled).
    bool data_rbac_enabled = 2 [(google.api.field_behavior) = OPTIONAL];

    // Optional. The desired access state for Triage Agent (true for enabled).
    bool triage_agent_enabled = 3 [(google.api.field_behavior) = OPTIONAL];

    // Optional. Whether the customer has opted into the STS migration.
    bool sts_migration_enrolled = 4 [(google.api.field_behavior) = OPTIONAL];
  }

  // Entitlement for the instance.
  message Entitlement {
    // DRE alignment state information.
    message DREAlignmentStateInfo {
      // Output only. Grace period start time.
      google.protobuf.Timestamp grace_period_start_time = 1
          [(google.api.field_behavior) = OUTPUT_ONLY];

      // Output only. Grace period end time.
      google.protobuf.Timestamp grace_period_end_time = 2
          [(google.api.field_behavior) = OUTPUT_ONLY];

      // Output only. DRE alignment state.
      DREAlignmentState state = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
    }

    // Output only. The customer's package tier.
    PackageTier package_tier = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

    // Output only. The customer's data retention duration.
    RetentionDuration data_retention_duration = 2
        [(google.api.field_behavior) = OUTPUT_ONLY];

    // Output only. The customer's billing account id.
    string billing_account_id = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

    // Output only. The service start time.
    google.protobuf.Timestamp service_start_time = 4
        [(google.api.field_behavior) = OUTPUT_ONLY];

    // Output only. The service end time.
    google.protobuf.Timestamp service_end_time = 5
        [(google.api.field_behavior) = OUTPUT_ONLY];

    // Output only. The data volume purchased in GB.
    string data_volume = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

    // Output only. DRE alignment state info.
    DREAlignmentStateInfo dre_alignment_state_info = 7
        [(google.api.field_behavior) = OUTPUT_ONLY];
  }

  // The wipeout status of the instance.
  enum WipeoutState {
    // The default value.
    WIPEOUT_STATE_UNSPECIFIED = 0;

    // The instance has requested deletion.
    DELETE_REQUESTED = 1;

    // The instance is in the process of being soft-deleted.
    SOFT_DELETE_IN_PROGRESS = 2;

    // The instance has been soft-deleted.
    SOFT_DELETE_COMPLETED = 3;

    // The instance has requested undeletion.
    UNDELETE_REQUESTED = 4;

    // The instance is in the process of being data deleted.
    DATA_DELETION_IN_PROGRESS = 5;

    // The instance has an error during wipeout.
    ERROR = 6;

    // The instance has been wiped out.
    WIPED_OUT = 7;

    // The instance has been undeleted.
    UNDELETE_COMPLETED = 8;
  }

  // The state of the instance.
  enum State {
    // The default value.
    STATE_UNSPECIFIED = 0;

    // The instance is active.
    ACTIVE = 1;

    // The instance is soft-deleted.
    SOFT_DELETED = 2;

    // The instance is in the process of being soft-deleted.
    SOFT_DELETE_INITIATED = 3;

    // The instance is in the process of being undeleted.
    UNDELETE_INITIATED = 4;
  }

  // Compliance certifications.
  enum ComplianceCertification {
    // Unspecified compliance certification.
    COMPLIANCE_CERTIFICATION_UNSPECIFIED = 0;

    // FedRAMP Moderate.
    FEDRAMP_MODERATE = 1;

    // HIPAA.
    HIPAA = 2;

    // PCI DSS.
    PCI_DSS = 3;

    // FedRAMP High.
    FEDRAMP_HIGH = 4;

    // IL4.
    IL4 = 5;

    // IL5.
    IL5 = 6;

    // Chronicle CMEK V1.
    CHRONICLE_CMEK_V1 = 7;

    // DRZ_ADVANCED.
    DRZ_ADVANCED = 8;

    // EU Data Boundary.
    EU_DATA_BOUNDARY = 9;

    // Regional Data Boundary.
    REGIONAL_DATA_BOUNDARY = 10;

    // Australia Data Boundary and Support.
    AUSTRALIA_DATA_BOUNDARY_AND_SUPPORT = 11;

    // US Data Boundary for Healthcare and Life Sciences.
    US_DATA_BOUNDARY_FOR_HEALTHCARE_AND_LIFE_SCIENCES = 12;

    // US Data Boundary for Healthcare and Life Sciences with Support.
    US_DATA_BOUNDARY_FOR_HEALTHCARE_AND_LIFE_SCIENCES_WITH_SUPPORT = 13;

    // KSA Data Boundary with Access Justifications.
    KSA_DATA_BOUNDARY_WITH_ACCESS_JUSTIFICATIONS = 14;

    // Data Boundary for IRS Publication 1075.
    DATA_BOUNDARY_FOR_IRS_PUBLICATION_1075 = 15;

    // Data Boundary for Canada Protected B.
    DATA_BOUNDARY_FOR_CANADA_PROTECTED_B = 16;

    // Data Boundary for IL2.
    DATA_BOUNDARY_FOR_IL2 = 17;

    // US Data Boundary and Support.
    US_DATA_BOUNDARY_AND_SUPPORT = 18;

    // Japan Data Boundary.
    JAPAN_DATA_BOUNDARY = 19;

    // Israel Data Boundary and Support.
    ISRAEL_DATA_BOUNDARY_AND_SUPPORT = 20;

    // Canada Data Boundary and Support.
    CANADA_DATA_BOUNDARY_AND_SUPPORT = 21;
  }

  // Data retention duration for the instance.
  enum RetentionDuration {
    // Default retention period (unspecified).
    RETENTION_DURATION_UNSPECIFIED = 0;

    // ONE_YEAR retention period (365 days).
    ONE_YEAR = 1;

    // EIGHTEEN_MONTHS is a normalized value.
    EIGHTEEN_MONTHS = 2;

    // SIX_MONTHS is a normalized value.
    SIX_MONTHS = 3;

    // TWO_YEARS or 24 months retention
    TWO_YEARS = 4;

    // 3 YEARS or 36 months retention
    THREE_YEARS = 5;

    // 4 YEARS or 48 months retention
    FOUR_YEARS = 6;

    // 5 YEARS or 60 months retention
    FIVE_YEARS = 7;

    // 13 MONTHS of retention
    THIRTEEN_MONTHS = 8;

    // 63 DAYS of retention
    SIXTY_THREE_DAYS = 9;

    // 3 MONTHS of retention
    THREE_MONTHS = 10;

    // Unlimited data retention
    UNLIMITED = 11;
  }

  // Package tier for the customer.
  enum PackageTier {
    // Default tier which should never be used.
    PACKAGE_TIER_UNSPECIFIED = 0;

    // SIEM standalone.
    LEVEL_ONE = 1;

    // Enterprise package.
    LEVEL_TWO = 2;

    // Advanced package.
    LEVEL_THREE = 3;

    // dedicated tier for Nexus
    NEXUS = 4;

    // SCCE Level One.
    SCCE_LEVEL_ONE = 5;

    // SCCE Level Two.
    SCCE_LEVEL_TWO = 6;

    // SCCE Level Three.
    SCCE_LEVEL_THREE = 7;

    // SOAR standalone standard.
    SOAR_STANDALONE_STANDARD = 8;

    // SOAR standalone pro.
    SOAR_STANDALONE_PRO = 9;

    // Google Unified Security.
    GUS = 10;
  }

  // DRE alignment state.
  enum DREAlignmentState {
    // Default value, should not be used.
    DRE_ALIGNMENT_STATE_UNSPECIFIED = 0;

    // Discrepancy detected between contractual and effective DRE.
    MISMATCH_FOUND = 1;

    // Grace period for a mismatch has been extended.
    GRACE_PERIOD_EXTENDED = 2;

    // Alignment process is complete, effective DRE matches contractual DRE.
    ALIGNMENT_COMPLETED = 3;

    // Customer is exempted from DRE alignment.
    EXEMPTED = 4;

    // An error occurred during the alignment process.
    ALIGNMENT_ERROR = 5;
  }

  // Identifier. The resource name of this instance.
  // Format: `projects/{project}/locations/{location}/instances/{instance}`
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Output only. The state of the instance.
  State state = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The earliest time that soft-deleted instances will be
  // permanently deleted and will no longer be able to be undeleted.
  google.protobuf.Timestamp purge_time = 3
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The time at which the instance was soft-deleted.
  google.protobuf.Timestamp delete_time = 4
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The wipeout status of the instance.
  WipeoutState wipeout_status = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The display name of the instance.
  string display_name = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. URL of the SecOps instance for the instance.
  // https://{frontend_path}.backstory.chronicle.security
  repeated string secops_urls = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. An acronym related to the company name.
  string customer_code = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The time at which the instance was created.
  google.protobuf.Timestamp create_time = 9
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Compliance requirements for the instance.
  ComplianceRequirements compliance_requirements = 10
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. Instance Configs represents the features that can be
  // enabled/disabled by the customer
  InstanceConfig instance_config = 11 [(google.api.field_behavior) = OPTIONAL];

  // Output only. List of frontend path - workforce pool provider id configs of
  // the instance.
  repeated FrontendPathConfig frontend_path_configs = 12
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Entitlement information for the Chronicle instance, including
  // details about the customer's package tier, data retention period, billing,
  // and service dates.
  Entitlement entitlement = 13 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Request to get a Instance.
message GetInstanceRequest {
  // Required. The name of the instance to retrieve.
  // Format:
  // `projects/{project_id}/locations/{location}/instances/{instance}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Instance"
    }
  ];
}

// Request message for UpdateInstance method.
message UpdateInstanceRequest {
  // Required. The Instance to update.
  // The Instance's `name` field is used to identify the instance to update.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}
  Instance instance = 1 [(google.api.field_behavior) = REQUIRED];

  // Optional. The list of fields to update.
  // 1. If update_mask is not included in the request, error will be returned.
  // 2. If update_mask is present and paths includes only "*" then all the
  // fields which are supported by UpdateInstance will be updated irrespective
  // of whether they are present in the request or not. Fields which are not
  // present in the request will be set to nil/false value.
  // 3. To update partial flags in instance_config, the relevant flags
  // should be provided like instance_config.<flag_name> for each flag. For eg
  // to update secops_ui_enabled flag, instance_config.secops_ui_enabled should
  // be provided in the paths of the update_mask. If the flag is present in the
  // paths but not present in the request, it will be set to false.
  // 4. If only `instance_config` is provided in the paths, all the flags in
  // instance_config will be updated and those flags which are not present in
  // the request will be set to false.
  google.protobuf.FieldMask update_mask = 2
      [(google.api.field_behavior) = OPTIONAL];
}

// Request to generate a collection agent auth json file.
message GenerateCollectionAgentAuthRequest {
  // Required. The name of the chronicle instance to generate a collection agent
  // auth json file for. Format:
  // `projects/{project_id}/locations/{location}/instances/{instance}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Instance"
    }
  ];
}

// Response with a generated collection agent auth json file.
message GenerateCollectionAgentAuthResponse {
  // The auth json file.
  string auth_json = 1;
}
