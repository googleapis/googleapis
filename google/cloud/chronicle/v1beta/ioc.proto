syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/field_info.proto";
import "google/api/resource.proto";
import "google/cloud/chronicle/common/field_and_value.proto";
import "google/protobuf/timestamp.proto";
import "google/type/latlng.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "IocProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";

// IocService interface exposes methods relating to an Indicator of Compromise
// (Iocs).
service IocService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // Get an Ioc.
  rpc GetIoc(GetIocRequest) returns (Ioc) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/iocs/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Gets a batch (list) of iocs given a list of names and a parent.
  rpc BatchGetIocs(BatchGetIocsRequest) returns (BatchGetIocsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/iocs:batchGet"
    };
    option (google.api.method_signature) = "parent";
  }

  // Get an Ioc Association by resource name.
  rpc GetIocAssociation(GetIocAssociationRequest) returns (IocAssociation) {
    option (google.api.http) = {
      get: "/v1beta/{name=projects/*/locations/*/instances/*/iocAssociations/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Gets a batch (list) of IocAssociations given a list of names and a parent.
  rpc BatchGetIocAssociations(BatchGetIocAssociationsRequest)
      returns (BatchGetIocAssociationsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/iocAssociations:batchGet"
    };
    option (google.api.method_signature) = "parent";
  }

  // List related IOCs for a given threat resource.
  rpc FetchRelatedIocs(FetchRelatedIocsRequest)
      returns (FetchRelatedIocsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/iocs:fetchRelated"
    };
    option (google.api.method_signature) = "parent";
  }

  // List related Associations (Threat Actors or Malware Families) for a given
  // threat resource.
  rpc FetchRelatedAssociations(FetchRelatedAssociationsRequest)
      returns (FetchRelatedAssociationsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/iocAssociations:fetchRelated"
    };
    option (google.api.method_signature) = "parent";
  }

  // Gets a list of Iocs given a list of parameters that uniquely identify them.
  rpc FindIocs(FindIocsRequest) returns (FindIocsResponse) {
    option (google.api.http) = {
      post: "/v1beta/{parent=projects/*/locations/*/instances/*}/iocs:find"
      body: "*"
    };
    option (google.api.method_signature) = "parent";
  }
}

// Represents an Ioc (Indicator of Compromise) which is flagged as suscpicious
// by customer's security infrastructure or by IoC partners of Google. Each Ioc
// comes from a single source feed so there can be multiple Iocs with same Ioc
// value.
message Ioc {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/Ioc"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/iocs/{ioc}"
    plural: "iocs"
    singular: "ioc"
  };

  // Different Types of IoCs currently supported.
  enum IocType {
    // Ioc type is unspecified
    IOC_TYPE_UNSPECIFIED = 0;

    // Ioc Type is Domain
    DOMAIN = 1;

    // Ioc Type is IP
    IP = 2;

    // Ioc Type is FILE_HASH
    FILE_HASH = 3;

    // Ioc Type is URL
    URL = 4;

    // Ioc Type is USER_EMAIL
    USER_EMAIL = 5;

    // Ioc Type is MUTEX
    MUTEX = 6;

    // Ioc Type is FILE_HASH_MD5
    FILE_HASH_MD5 = 7;

    // Ioc Type is FILE_HASH_SHA1
    FILE_HASH_SHA1 = 8;

    // Ioc Type is FILE_HASH_SHA256
    FILE_HASH_SHA256 = 9;

    // Ioc Type is RESOURCE
    IOC_TYPE_RESOURCE = 10;
  }

  // Priority of an IoC
  enum Priority {
    // The default value of the priority
    PRIORITY_UNSPECIFIED = 0;

    // Low Priority Ioc match
    LOW = 1;

    // Medium Priority Ioc match
    MEDIUM = 2;

    // High Priority Ioc match
    HIGH = 3;

    // Ioc match priority is ACTIVE BREACH
    ACTIVE_BREACH = 4;
  }

  // An indicator for locating one or multiple assets with matching property.
  // The indicator can be hostname, ip address or mac address.
  enum ConfidenceBucket {
    // Confidence score not specified
    CONFIDENCE_BUCKET_UNSPECIFIED = 0;

    // Confidence score is low
    LOW_CONFIDENCE = 1;

    // Confidence score is medium
    MEDIUM_CONFIDENCE = 2;

    // Confidence score is high
    HIGH_CONFIDENCE = 3;
  }

  // Identifier. The resource name of this IndicatorOfCompromise (Ioc).
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // The category/type of this indicator.
  // Ex: "Spyware", "Bitcoin_Related", etc.
  string categorization = 2;

  // Raw description of the IoC.
  string description = 3;

  // Original Feed name from where the indicator originated.
  string source_feed = 5;

  // Immutable. Different types of IOCs.
  IocType ioc_type = 6 [(google.api.field_behavior) = IMMUTABLE];

  // Ioc LogType.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/logTypes/{log_type}
  string log_type = 7 [(google.api.resource_reference) = {
    type: "chronicle.googleapis.com/LogType"
  }];

  // Optional. An indicator to an artifact. An artifact is an identifier like a
  // website domain, file hash, or IP address that is used to identify a
  // malicious website, file, or computer system that might be contacted or used
  // by a device in customer's environment.
  IocArtifactIndicator artifact_indicator = 8
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. Priority of an IoC. Priority is determined from GCTI rules based
  // on the indicator and ingested event.
  Priority priority = 9 [(google.api.field_behavior) = OPTIONAL];

  // Immutable. Value of an IOC which can be either a domain, ip address or file
  // hash (MD5, SHA1, SHA256).
  string display_name = 10 [(google.api.field_behavior) = IMMUTABLE];

  // Timestamp when the IoC was first received from ANY feed. This is the
  // earliest timestamp of receipt by Malachite, given that the artifact might
  // have been sent in multiple feeds at different times.
  google.protobuf.Timestamp ioc_ingestion_time = 11;

  // First time the ioc was discovered by provider
  google.protobuf.Timestamp discovery_time = 12;

  // Last time the IoC was seen by mandiant
  google.protobuf.Timestamp last_update_time = 13;

  // Associations represents different metadata about malware and threat actors
  // involved with an IoC.
  repeated IocAssociation associations = 14;

  // Verdict information about the IoC from the provider.
  // Describes the threat verdict provided by human analysts and machine
  // learning models.
  repeated IocVerdictInfo verdict_info = 15;

  // Optional. Global customer id of an IOC
  bytes global_customer_id = 16 [(google.api.field_behavior) = OPTIONAL];

  // IoC confidence score. Raw confidence level from the IoC source, higher
  // score means more confidence. If there is no confidence score in the
  // raw data, this will not be set.
  string confidence_score = 17;

  // IoC confidence score, bucketed into e.g. low/medium/high.
  ConfidenceBucket confidence_bucket = 18;

  // The indicator's raw severity.
  string raw_severity = 19;

  // List of campaigns this IoC was observed.
  repeated string campaigns = 20;

  // Output only. Google Threat Intelligence threat score of the IoC.
  int32 gti_threat_score = 21 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Associations represents different metadata about malware and threat actors
// involved with an IoC.
message IocAssociation {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/IocAssociation"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/iocAssociations/{ioc_association}"
    plural: "iocAssociations"
    singular: "iocAssociation"
  };

  // Association Alias  Used to represent Mandiant Threat intel.
  message IocAssociationAlias {
    // Output only. Name of the alias.
    string association_name = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

    // Output only. Name of the provider who gave the association's name.
    string provider = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
  }

  // Represents different possible Association types. Can be threat or
  // malware. Used to represent Mandiant threat intelligence.
  enum AssociationType {
    // The default Association Type.
    ASSOCIATION_TYPE_UNSPECIFIED = 0;

    // Association type Threat actor.
    THREAT_ACTOR = 1;

    // Association type Malware.
    MALWARE = 2;

    // Association type Software toolkit.
    SOFTWARE_TOOLKIT = 3;
  }

  // Output only. Identifier. The resource name of this IocAssociation.
  // Format: projects/{project}/locations/{location}/instances/{instance}/
  // iocAssociations/{ioc_association}
  string name = 12 [
    (google.api.field_behavior) = IDENTIFIER,
    (google.api.field_behavior) = OUTPUT_ONLY
  ];

  // Output only. Association identifier. This can be used to request details of
  // the IocAssociation from the Google Threat Intelligence API
  // (https://gtidocs.virustotal.com/reference/get-threat)
  string id = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Deprecated. Use region_code instead.
  // Country from which the threat actor originated.
  repeated string country_code = 2
      [deprecated = true, (google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Name of the country the threat is originating from.
  AssociationLocation region_code = 3
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Signifies the type of association.
  AssociationType type = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Name of the threat actor/malware.
  string threat_display_name = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Human readable description about the association.
  string description = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Different aliases of the threat actor given by different
  // sources.
  repeated IocAssociationAlias alias = 7
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. First time the threat actor was referenced or seen.
  google.protobuf.Timestamp first_reference_time = 8
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Last time the threat actor was referenced or seen.
  google.protobuf.Timestamp last_reference_time = 9
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. List of industries the threat actor affects.
  repeated string industries_affected = 10
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. List of associated threat actors for a malware.
  // Not applicable for threat actors.
  repeated IocAssociation associated_actors = 11
      [deprecated = true, (google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. List of roles associated with the malware. Not applicable for
  // threat actors.
  repeated string roles = 13 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. List of operating systems that associated with the malware.
  // Not applicable for threat actors.
  repeated string operating_systems = 14
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The resource names of the Iocs that are related to this
  // IocAssociation. Format:
  // projects/{project}/locations/{location}/instances/{instance}/iocs/{ioc}
  repeated string iocs = 15 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = { type: "chronicle.googleapis.com/Ioc" }
  ];
}

// Information about a location.
message AssociationLocation {
  // Output only. The city.
  string city = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The state.
  string state = 2;

  // The country or region.
  string country_or_region = 3;

  // Custom location name (e.g. building or site name like "London Office").
  // For cloud environments, this is the region (e.g. "us-west2").
  string location = 4;

  // Desk name or individual location, typically for an employee in an
  // office.
  // (e.g. "IN-BLR-BCPC-11-1121D").
  string desk = 5;

  // Floor name, number or a combination of the two for a building.
  // (e.g. "1-A").
  string floor = 6;

  // Coordinates for the associated region.
  google.type.LatLng region_coordinates = 7;
}

// Describes the threat verdict provided by human analysts and machine
// learning models. These fields are used to model Mandiant sources.
message IocVerdictInfo {
  // Category of the verdict.
  enum VerdictType {
    // Verdict category not specified.
    VERDICT_TYPE_UNSPECIFIED = 0;

    // MLVerdict result provided from threat providers, like Mandiant. These
    // fields are used to model Mandiant sources.
    PROVIDER_ML_VERDICT = 1;

    // Verdict provided by the human analyst. These fields are used to model
    // Mandiant sources.
    ANALYST_VERDICT = 2;
  }

  // Represents different verdict types. Used to represent Mandiant
  // threat intelligence.
  enum VerdictResponse {
    // The default verdict response type.
    VERDICT_RESPONSE_UNSPECIFIED = 0;

    // VerdictResponse resulted a threat as malicious.
    MALICIOUS = 1;

    // VerdictResponse resulted a threat as benign.
    BENIGN = 2;
  }

  // Number of sources from which intel was extracted.
  int32 source_count = 1;

  // Total response count across all sources.
  int32 response_count = 2;

  // Describes the near neighbor influence of the verdict.
  string neighbour_influence = 3;

  // Type of verdict.
  VerdictType verdict_type = 4;

  // Source provider giving the machine learning verdict.
  string source_provider = 5;

  // Count of responses where this IoC was marked as benign.
  int32 benign_count = 6;

  // Count of responses where this IoC was marked as malicious.
  int32 malicious_count = 7;

  // Confidence score of the verdict. Range of Confidence Score is 0-100.
  int32 confidence_score = 8;

  // List of IocStats from which the verdict was generated.
  repeated IocStats ioc_stats = 9;

  // Timestamp when the verdict was generated.
  google.protobuf.Timestamp verdict_time = 11;

  // Details about the verdict.
  VerdictResponse verdict_response = 12;

  // Global customer count over the last 30 days
  int32 global_customer_count = 13;

  // Global hit count over the last 30 days.
  int32 global_hits_count = 14;

  // Whether one or more Mandiant incident response customers had this
  // indicator in their environment.
  bool pwn = 15;

  // Tags related to the verdict.
  string category_details = 16;

  // The timestamp of the first time a pwn was associated to this entity.
  google.protobuf.Timestamp pwn_first_tagged_time = 17;
}

// Information about the threat intel source. These fields are used to
// model Mandiant sources.
message IocStats {
  // Type of IoCStat based on source.
  enum IocStatsType {
    // IoCStat source is unidentified.
    UNSPECIFIED_IOC_STATS_TYPE = 0;

    // IoCStat is from a Mandiant Source.
    MANDIANT_SOURCES = 1;

    // IoCStat is from a third-party source.
    THIRD_PARTY_SOURCES = 2;

    // IoCStat is from a threat intelligence feed.
    THREAT_INTELLIGENCE_IOC_STATS = 3;
  }

  // A level of confidence in the result.
  enum ProductConfidence {
    // The default confidence level.
    PRODUCT_CONFIDENCE_UNSPECIFIED = 0;

    // Low confidence.
    LOW_CONFIDENCE = 200;

    // Medium confidence.
    MEDIUM_CONFIDENCE = 300;

    // High confidence.
    HIGH_CONFIDENCE = 400;
  }

  // Describes the source of the IoCStat.
  IocStatsType ioc_stats_type = 1;

  // Name of first level IoC source, for example Mandiant or a third-party.
  string first_level_source = 2;

  // Name of the second-level IoC source, for example Crowdsourced Threat
  // Analysis or Knowledge Graph.
  string second_level_source = 3;

  // Count of responses where the IoC was identified as benign.
  int32 benign_count = 4;

  // Level of confidence in the IoC mapping extracted from the source.
  ProductConfidence quality = 5;

  // Count of responses where the IoC was identified as malicious.
  int32 malicious_count = 6;

  // Total number of response from the source.
  int32 response_count = 7;

  // Number of sources from which information was extracted.
  int32 source_count = 8;
}

// An indicator to identify an artifact.
// Artifact indicator can be one of domain name, destination ip address,
// md5 hash, sha1 hash, or sha256 hash.
message IocArtifactIndicator {
  // An artifact.
  oneof artifact {
    // A domain name.
    string domain = 1;

    // A destination ip address.
    string destination_ip_address = 2
        [(google.api.field_info).format = IPV4_OR_IPV6];

    // A MD5 file hash.
    string hash_md5 = 3;

    // A SHA1 file hash.
    string hash_sha1 = 4;

    // A SHA256 file hash.
    string hash_sha256 = 5;

    // A URL.
    string url = 6;
  }
}

// Request message to get an Ioc information.
message GetIocRequest {
  // Required. The name of the ioc to retrieve.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/iocs/{ioc}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = { type: "chronicle.googleapis.com/Ioc" }
  ];
}

// Request message to retrieve a batch of iocs.
message BatchGetIocsRequest {
  // Required. Parent that owns this batch of iocs.
  // Format: projects/{project}/locations/{region}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/Ioc"
    }
  ];

  // Required. Ioc names to retrieve
  repeated string names = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = { type: "chronicle.googleapis.com/Ioc" }
  ];
}

// Response message for BatchGetIocs. This is a list of iocs.
message BatchGetIocsResponse {
  // Retrieved iocs.
  repeated Ioc iocs = 1;
}

// Request message to get an IocAssociation.
message GetIocAssociationRequest {
  // Required. The name of the ioc association to retrieve.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/iocAssociations/{ioc_association}
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/IocAssociation"
    }
  ];
}

// Request message to retrieve a batch of IocAssociations.
message BatchGetIocAssociationsRequest {
  // Required. Parent that owns this batch of ioc associations.
  // Format: projects/{project}/locations/{region}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/IocAssociation"
    }
  ];

  // Required. The names of the IocAssociations to retrieve.
  // A maximum of 1000 IocAssociations can be retrieved in a batch.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/iocAssociations/{ioc_association}
  repeated string names = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/IocAssociation"
    }
  ];
}

// Response message to get a batch of IocAssociations.
message BatchGetIocAssociationsResponse {
  // The list of IocAssociations requested.
  repeated IocAssociation associations = 1;
}

// Request to list related IOCs.
message FetchRelatedIocsRequest {
  // The threat resource to get the related IOCs for.
  oneof threat_resource {
    // Optional. The name of the IocAssociation resource (Threat Actor or
    // Malware Family) to get the related IOCs for. Format:
    // projects/{project}/locations/{location}/instances/{instance}/iocAssociations/{ioc_association}
    string ioc_association = 2 [
      (google.api.field_behavior) = OPTIONAL,
      (google.api.resource_reference) = {
        type: "chronicle.googleapis.com/IocAssociation"
      }
    ];

    // Optional. The name of the ThreatCollection resource (GTI Campaign or
    // Report) to get the related IOCs for. Format:
    // projects/{project}/locations/{location}/instances/{instance}/threatCollections/{threat_collection}
    string threat_collection = 4 [
      (google.api.field_behavior) = OPTIONAL,
      (google.api.resource_reference) = {
        type: "chronicle.googleapis.com/ThreatCollection"
      }
    ];
  }

  // Required. The parent resource of the IOCs. Format:
  // projects/{project}/locations/{location}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Instance"
    }
  ];

  // Required. The type of related IOCs to return.
  // Only supports DOMAIN, IP, FILE_HASH.*, and URL types.
  Ioc.IocType ioc_type = 5 [(google.api.field_behavior) = REQUIRED];

  // Optional. The maximum number of IOCs to return. The default is 10, and the
  // maximum value is 40.
  int32 page_size = 6 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A page token, received from a previous `FetchRelatedIocs` call.
  // Provide this to retrieve the subsequent page. When paginating, all other
  // parameters provided to `FetchRelatedIocs` must match the call that provided
  // the page token.
  string page_token = 7 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The order to sort the returned IOCs by. Default is descending
  // name-. The supported order syntax matches the fields
  // defined in the GTI API docs here:
  // https://gtidocs.virustotal.com/reference/list-threats#allowed-orders
  //
  // Supported orders:
  // - name: sorts objects alphabetically by name, ascending + or descending -.
  // Name in this context refers to the display_name for an IOC.
  string order_by = 8 [(google.api.field_behavior) = OPTIONAL];
}

// Response containing a list of related IOCs for a given threat resource.
message FetchRelatedIocsResponse {
  // Output only. The list of related IOCs.
  repeated Ioc iocs = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. A token that can be sent as `page_token` to retrieve the next
  // page. If this field is omitted, there are no subsequent pages.
  string next_page_token = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The total number of IOCs that match the request. The count of
  // `iocs` returned by pagination may be less than the `total_size` that
  // matches.
  int32 total_size = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Request to list related Associations (Threat Actors and Malware Families).
message FetchRelatedAssociationsRequest {
  // The threat resource to get the related associations (Threat Actors or
  // Malware Families) for.
  oneof threat_resource {
    // Optional. The name of the IocAssociation resource (Threat Actor or
    // Malware Family) to get the related associations (Threat Actors or Malware
    // Families) for. Format:
    // projects/{project}/locations/{location}/instances/{instance}/iocAssociations/{ioc_association}
    string ioc_association = 2 [
      (google.api.field_behavior) = OPTIONAL,
      (google.api.resource_reference) = {
        type: "chronicle.googleapis.com/IocAssociation"
      }
    ];

    // Optional. The name of the ioc resource to get the related associations
    // (Threat Actors or Malware Families) for. Format:
    // projects/{project}/locations/{location}/instances/{instance}/iocs/{ioc}
    string ioc = 3 [
      (google.api.field_behavior) = OPTIONAL,
      (google.api.resource_reference) = { type: "chronicle.googleapis.com/Ioc" }
    ];

    // Optional. The name of the ThreatCollection resource (GTI Campaign or
    // Report) to get the related associations (Threat Actors or Malware
    // Families) for. Format:
    // projects/{project}/locations/{location}/instances/{instance}/threatCollections/{threat_collection}
    string threat_collection = 4 [
      (google.api.field_behavior) = OPTIONAL,
      (google.api.resource_reference) = {
        type: "chronicle.googleapis.com/ThreatCollection"
      }
    ];
  }

  // Required. The parent resource of the Associations (Threat Actors or Malware
  // Families). Format:
  // projects/{project}/locations/{location}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "chronicle.googleapis.com/Instance"
    }
  ];

  // Required. The type (Threat Actor or Malware Family) of related Associations
  // to return.
  IocAssociation.AssociationType association_type = 5
      [(google.api.field_behavior) = REQUIRED];

  // Optional. The maximum number of Associations (Threat Actors or Malware
  // Families) to return. The default is 10, and the maximum value is 40.
  int32 page_size = 6 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A page token, received from a previous
  // `FetchRelatedAssociations` call. Provide this to retrieve the
  // subsequent page. When paginating, all other parameters provided to
  // `FetchRelatedAssociations` must match the call that provided
  // the page token.
  string page_token = 7 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The order to sort the returned Associations by. Default is
  // descending last_modification_date. The supported order syntax matches the
  // fields defined in the GTI API docs here:
  // https://gtidocs.virustotal.com/reference/list-threats#allowed-orders
  //
  // Supported orders:
  // - name: sorts objects alphabetically by name, ascending + or descending -.
  // Name in this context refers to the threat_display_name for an Association.
  // - last_modification_date: sorts objects descending - by most recently
  // modified objects first, or ascending + by firstly modified objects first.
  // This refers to the last_reference_time field for an Association.
  string order_by = 8 [(google.api.field_behavior) = OPTIONAL];
}

// Response containing a list of related associations (Threat Actors or Malware
// Families) for a given threat resource.
message FetchRelatedAssociationsResponse {
  // Output only. The list of related associations (Threat Actors or Malware
  // Families).
  repeated IocAssociation ioc_associations = 1
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. A token that can be sent as `page_token` to retrieve the next
  // page. If this field is omitted, there are no subsequent pages.
  string next_page_token = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The total number of associations (Threat Actors or Malware
  // Families) that match the request. The count of `ioc_associations` returned
  // by pagination may be less than the `total_size` that matches.
  int32 total_size = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// A request to find a list of Iocs with specified types and indicators.
message FindIocsRequest {
  // Required. The parent, which is the SecOps instance.
  // Format: projects/{project}/locations/{location}/instances/{instance}
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/Ioc"
    }
  ];

  // Required. Parameters to identify the IOCs. Each item should uniquely
  // identify one Ioc record. Only `value_type` is supported, and only the
  // following ValueType options:
  // -  HASH_MD5
  // -  HASH_SHA1
  // -  HASH_SHA256
  // -  DOMAIN_NAME
  // -  RESOLVED_IP_ADDRESS
  repeated google.cloud.chronicle.common.FieldAndValue field_and_value = 2
      [(google.api.field_behavior) = REQUIRED];
}

// The response to a FindIocs request.
message FindIocsResponse {
  // The Iocs that match the request.
  // Note this returns a max of 1000 IOCs, in the order requested.
  repeated Ioc iocs = 1;
}
