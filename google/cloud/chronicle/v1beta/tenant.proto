syntax = "proto3";

package google.cloud.chronicle.v1beta;

import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/cloud/chronicle/v1beta/instance.proto";
import "google/protobuf/field_mask.proto";

option csharp_namespace = "Google.Cloud.Chronicle.V1Beta";
option go_package = "cloud.google.com/go/chronicle/apiv1beta/chroniclepb;chroniclepb";
option java_multiple_files = true;
option java_outer_classname = "TenantProto";
option java_package = "com.google.cloud.chronicle.v1beta";
option php_namespace = "Google\\Cloud\\Chronicle\\V1beta";
option ruby_package = "Google::Cloud::Chronicle::V1beta";

// TenantService provides Partners ability to create/get/list their tenants
service TenantService {
  option (google.api.default_host) = "chronicle.googleapis.com";
  option (google.api.oauth_scopes) =
      "https://www.googleapis.com/auth/chronicle,"
      "https://www.googleapis.com/auth/chronicle.readonly,"
      "https://www.googleapis.com/auth/cloud-platform";

  // Allow partners to list their tenants.
  rpc ListTenants(ListTenantsRequest) returns (ListTenantsResponse) {
    option (google.api.http) = {
      get: "/v1beta/{parent=projects/*/locations/*/instances/*}/tenants"
    };
    option (google.api.method_signature) = "parent";
  }

  // UpdateTenant allows partners to update their tenants.
  // It supports update for AuthMethod and WorkforcePoolProviderId.
  rpc UpdateTenant(UpdateTenantRequest) returns (Tenant) {
    option (google.api.http) = {
      patch: "/v1beta/{tenant.name=projects/*/locations/*/instances/*/tenants/*}"
      body: "tenant"
    };
    option (google.api.method_signature) = "tenant,update_mask";
  }
}

// Tenant represents a tenant of a partner.
message Tenant {
  option (google.api.resource) = {
    type: "chronicle.googleapis.com/Tenant"
    pattern: "projects/{project}/locations/{location}/instances/{instance}/tenants/{tenant}"
    plural: "tenants"
    singular: "tenant"
  };

  // Auth Method of the Tenant.
  enum AuthMethod {
    // The default value.
    AUTH_METHOD_UNSPECIFIED = 0;

    // Workforce Identity Federation
    WORKFORCE_IDENTITY_FEDERATION = 1;

    // Cloud Identity
    CLOUD_IDENTITY = 2;
  }

  // Provisioning flow.
  enum ProvisioningFlow {
    // Unspecified provisioning flow.
    PROVISIONING_FLOW_UNSPECIFIED = 0;

    // Provisioning flow triggered to have parity with  Backstory API.
    BACKSTORY_API_PARITY = 1;

    // Provisioning flow triggered with tenant attribution.
    TENANT_ATTRIBUTION = 2;
  }

  // Identifier. The resource name of this tenant.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance}/tenants/{tenant_id}

  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Required. Project name of the tenant's BYOP project.
  // Format: projects/{project_id} or projects/{project_number}
  string tenant_gcp_project = 2 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      type: "cloudresourcemanager.googleapis.com/Project"
    }
  ];

  // Output only. The state of the Tenant.
  Instance.State state = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Required. The display name of the tenant.
  string display_name = 4 [(google.api.field_behavior) = REQUIRED];

  // Output only. Customer code associated with the tenant.
  string customer_code = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Required. Customer's contractually agreed data retention duration.
  Instance.RetentionDuration retention_duration = 7
      [(google.api.field_behavior) = REQUIRED];

  // Optional. Auth Method used by tenant
  AuthMethod auth_method = 8 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Configuration for the tenant's frontend paths.
  repeated Instance.FrontendPathConfig frontend_path_configs = 9
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. The provisioning flow of the tenant.
  ProvisioningFlow provisioning_flow = 10
      [(google.api.field_behavior) = OPTIONAL];

  // Optional. The billing account ID of the customer.
  string billing_account = 11 [
    (google.api.field_behavior) = OPTIONAL,
    (google.api.resource_reference) = {
      type: "cloudbilling.googleapis.com/BillingAccount"
    }
  ];
}

// ListTenants request message.
message ListTenantsRequest {
  // Required. The parent, which owns this collection of tenants.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {
      child_type: "chronicle.googleapis.com/Tenant"
    }
  ];

  // Optional. Maximum number of tenants to return.
  // Maximum page size - 100.
  // Default page size - 10.
  int32 page_size = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A page token, received from a previous `ListTenants` call.
  // Provide this to retrieve the subsequent page.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];
}

// ListTenants response message.
message ListTenantsResponse {
  // List of tenants.
  repeated Tenant tenants = 1;

  // A token, which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  string next_page_token = 2;
}

// UpdateTenant request message.
message UpdateTenantRequest {
  // Required. The tenant to update.
  // The tenant's `name` field is used to identify the tenant to update.
  // Format:
  // projects/{project}/locations/{location}/instances/{instance_id}/tenants/{tenant_id}
  Tenant tenant = 1 [(google.api.field_behavior) = REQUIRED];

  // Optional. The list of fields to update.
  google.protobuf.FieldMask update_mask = 2
      [(google.api.field_behavior) = OPTIONAL];
}
