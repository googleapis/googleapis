type: google.api.Service
config_version: 3
name: developerknowledge.googleapis.com
title: Developer Knowledge API

apis:
- name: google.developers.knowledge.v1.DeveloperKnowledge

documentation:
  summary: The Developer Knowledge API provides access to Google's developer knowledge.

authentication:
  rules:
  - selector: 'google.developers.knowledge.v1.DeveloperKnowledge.*'
    oauth:
      canonical_scopes: |-
        https://www.googleapis.com/auth/cloud-platform

publishing:
  new_issue_uri: https://issuetracker.google.com/issues/new?component=190865&template=1161103
  documentation_uri: https://developers.google.com/knowledge
  api_short_name: developerknowledge
  github_label: 'api: developerknowledge'
  doc_tag_prefix: developerknowledge
  organization: CLOUD
  library_settings:
  - version: google.developers.knowledge.v1
    launch_stage: GA
    java_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    cpp_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    php_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    python_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    node_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    dotnet_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    ruby_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    go_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
  proto_reference_documentation_uri: https://developers.google.com/knowledge/reference/rpc
