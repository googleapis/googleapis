syntax = "proto3";

package google.devtools.artifactregistry.logging.v1;

import "google/protobuf/struct.proto";
import "google/rpc/status.proto";

option csharp_namespace = "Google.Cloud.ArtifactRegistry.Logging.V1";
option go_package = "cloud.google.com/go/artifactregistry/logging/apiv1/loggingpb;loggingpb";
option java_multiple_files = true;
option java_outer_classname = "RequestLogProto";
option java_package = "com.google.devtools.artifactregistry.logging.v1";
option php_namespace = "Google\\Cloud\\ArtifactRegistry\\Logging\\V1";
option ruby_package = "Google::Cloud::ArtifactRegistry::Logging::V1";

// Log message that contains information about an AR request.
message RequestLog {
  // The status of the overall operation.
  google.rpc.Status status = 1;

  // The request parameters. It may not include all of them, such as those that
  // are too large or privacy-sensitive.
  google.protobuf.Struct request = 2;

  // The response elements. it may not include all of them, such as those that
  // are too large or privacy-sensitive.
  google.protobuf.Struct response = 3;

  // Other service-specific data about current request that is not included in
  // the request parameters received from the user or in the response sent back.
  // For example, the number or list of versions that have been deleted, when
  // the user requested to delete a package.
  google.protobuf.Struct metadata = 4;
}
