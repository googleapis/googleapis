type: google.api.Service
config_version: 3
name: health.googleapis.com
title: Google Health API

apis:
- name: google.devicesandservices.health.v4.DataPointsService
- name: google.devicesandservices.health.v4.HealthProfileService

types:
- name: google.devicesandservices.health.v4.DataType

documentation:
  summary: |-
    The Google Health API lets you view and manage health and fitness metrics
    and measurement data.

publishing:
  new_issue_uri: https://issuetracker.google.com/issues/new?component=1914241
  documentation_uri: https://developers.google.com/health/api
  api_short_name: health
  github_label: 'api: health'
  doc_tag_prefix: health
  organization: CLOUD
  library_settings:
  - version: google.devicesandservices.health.v4
    launch_stage: GA
    java_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    python_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    node_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
    dotnet_settings:
      common:
        destinations:
        - PACKAGE_MANAGER
  proto_reference_documentation_uri: https://developers.google.com/health/api/reference/rpc
