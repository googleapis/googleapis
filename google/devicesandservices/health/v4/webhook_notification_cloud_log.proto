syntax = "proto3";

package google.devicesandservices.health.v4;

import "google/api/field_behavior.proto";
import "google/rpc/http.proto";

option csharp_namespace = "Google.DevicesAndServices.Health.V4";
option go_package = "google.golang.org/genproto/googleapis/devicesandservices/health/apiv4main;healthpb";
option java_multiple_files = true;
option java_outer_classname = "WebhookNotificationCloudLogProto";
option java_package = "com.google.devicesandservices.health.v4";
option php_namespace = "Google\\DevicesAndServices\\Health\\V4";
option ruby_package = "Google::DevicesAndServices::Health::V4";

// Log message for a webhook notification sent by the Google Health API to a
// subscriber's endpoint. Includes the HTTP response received from the endpoint.
message WebhookNotificationCloudLog {
  // Required. Represents the HTTP response.
  // This message includes the status code, reason phrase, headers, and body.
  google.rpc.HttpResponse http_response = 1
      [(google.api.field_behavior) = REQUIRED];
}
