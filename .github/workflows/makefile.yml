name: Makefile CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler libprotobuf-dev build-essential cmake pkg-config libssl-dev

    - name: Build and install gRPC plugin
      run: |
        cd /tmp
        git clone --depth 1 https://github.com/grpc/grpc.git
        cd grpc
        mkdir -p cmake/build
        cd cmake/build
        cmake ../..
        make -j4 grpc_cpp_plugin
        sudo cp grpc_cpp_plugin /usr/local/bin/

    - name: Install dependencies
      run: make

    - name: Run check
      run: make check

    - name: Run distcheck
      run: make distcheck
