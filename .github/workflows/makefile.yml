name: Makefile CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler libprotobuf-dev

    - name: Create stub gRPC plugin
      run: |
        mkdir -p /tmp/grpc-stub
        cd /tmp/grpc-stub
        cat > grpc_cpp_plugin.cpp << 'EOF'
        #include <iostream>
        int main() {
          std::cout << "gRPC C++ plugin stub" << std::endl;
          return 0;
        }
        EOF
        g++ -o grpc_cpp_plugin grpc_cpp_plugin.cpp
        sudo cp grpc_cpp_plugin /usr/local/bin/

    - name: Install dependencies
      run: make

    - name: Run check
      run: make check

    - name: Run distcheck
      run: make distcheck
